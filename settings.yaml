apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-wing-setting
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: text
          name: site_title
          label: 网站标题
          placeholder: 请输入网站标题
          value:
        - $formkit: text
          name: icp
          label: 备案号
          placeholder: 粤ICP备xxxx号
        - $formkit: datetime-local
          name: site_start_date
          label: 建站时间
          placeholder: 选择建站日期
          help: 用于计算网站运行天数
    - group: layout
      label: 首页布局
      formSchema:
        - $formkit: radio
          name: sidebar_toggle
          label: 左侧边栏
          help: 是否显示左侧导航菜单
          options:
            show: 显示
            hide: 隐藏
          value: show
        - $formkit: radio
          name: right_sidebar_toggle
          label: 右侧边栏
          help: 是否显示右侧热力图
          options:
            show: 显示
            hide: 隐藏
          value: show
        - $formkit: radio
          name: homepage_content
          id: homepage_content
          key: homepage_content
          label: 首页显示内容
          help: 选择首页 (/) 显示笔记还是文章；切换后另一项通过自定义页面访问
          options:
            moments: 笔记
            posts: 文章
          value: moments
        - $formkit: text
          if: $get(homepage_content).value == 'moments'
          name: posts_page_slug
          label: 文章页路径
          placeholder: posts
          value: posts
          help: 笔记首页模式下，文章列表页的路径（不含斜杠），需与后台自定义页面的 Slug 保持一致
    - group: style
      label: 外观与样式
      formSchema:
        - $formkit: text
          name: default_cover
          label: 默认文章封面
          placeholder: https://...
          value: https://s3.api.waistu.com/bucket-alpha-bravo-charlie-12345/upload/2026/04/01/69cc5e4fa7db4.webp
          help: 文章没有设置封面时使用的默认图片链接
        - $formkit: radio
          name: theme_mode
          id: theme_mode
          key: theme_mode
          label: 主题模式
          help: 浅色/深色强制固定；自动模式按时间段切换，用户手动点击按钮可临时覆盖
          options:
            auto: 自动
            light: 浅色
            dark: 深色
          value: auto
        - $formkit: group
          if: $get(theme_mode).value == 'auto'
          name: auto_theme_time
          key: auto_theme_time
          label: 自动模式时间段
          help: 设置浅色/深色模式的起止时间（24小时制，格式 HH:MM）
          value:
            light_start: "06:00"
            dark_start: "22:00"
          children:
            - $formkit: text
              name: light_start
              label: 浅色模式开始时间
              placeholder: "06:00"
              value: "06:00"
              help: 格式 HH:MM，超过此时间切换为浅色模式
            - $formkit: text
              name: dark_start
              label: 深色模式开始时间
              placeholder: "22:00"
              value: "22:00"
              help: 格式 HH:MM，超过此时间切换为深色模式
        - $formkit: select
          name: color_scheme
          label: 主题配色
          help: 选择网站的主题强调色
          value: rose
          options:
            - label: 玫瑰红 (Rose)
              value: rose
            - label: 蓝色 (Blue)
              value: blue
            - label: 翠绿 (Emerald)
              value: emerald
            - label: 紫罗兰 (Violet)
              value: violet
            - label: 琥珀橙 (Amber)
              value: amber
            - label: 灰褐 (Taupe)
              value: taupe
            - label: 洋红 (Fuchsia)
              value: fuchsia
            - label: 石板灰 (Slate)
              value: slate
    - group: comment
      label: 评论与互动
      formSchema:
        - $formkit: select
          name: comment_provider
          id: comment_provider
          key: comment_provider
          label: 评论系统
          value: halo
          options:
            - label: Halo 官方评论
              value: halo
            - label: Twikoo 评论
              value: twikoo
        - $formkit: switch
          if: $get(comment_provider).value == 'twikoo'
          name: anonymous_comment
          id: anonymous_comment
          key: anonymous_comment
          label: 匿名评论
          value: false
          help: Twikoo 模式下有效，开启后用户点击匿名评论按钮自动填充预设信息
        - $formkit: group
          if: $get(anonymous_comment).value == true
          name: anonymous_config
          key: anonymous_config
          label: 匿名评论配置
          value:
            anonymous_email: anonymous@yourdomain.com
            anonymous_nickname: momo
          children:
            - $formkit: email
              name: anonymous_email
              label: 匿名邮箱
              placeholder: anonymous@example.com
              value: anonymous@yourdomain.com
              help: 匿名评论使用的邮箱
            - $formkit: text
              name: anonymous_nickname
              label: 匿名昵称
              placeholder: 匿名网友
              value: momo
              help: 匿名评论使用的昵称
        - $formkit: url
          name: privacy_policy_url
          label: 隐私协议链接
          placeholder: https://
          value: /privacy
          help: 隐私协议超链接地址
        - $formkit: group
          if: $get(comment_provider).value == 'twikoo'
          name: twikoo_config
          key: twikoo_config
          label: Twikoo 评论配置
          help: 文档：https://twikoo.js.org/
          value:
            twikoo_env_id: ""
            twikoo_token: ""
            twikoo_js_url: "https://cdn.cbd.int/twikoo@1.7.0/dist/twikoo.nocss.js"
          children:
            - $formkit: url
              name: twikoo_env_id
              key: twikoo_env_id
              label: Twikoo 评论 - 环境id/后端URL
              placeholder: https://twikoo.xxx.com/
              help: 详情请查看文档 (后缀带 / )
            - $formkit: text
              name: twikoo_token
              key: twikoo_token
              label: Twikoo 评论 - 管理员令牌
              placeholder: 在浏览器F12的控制台中获取
              help: 用于显示弹幕，详情请查看文档
            - $formkit: url
              name: twikoo_js_url
              key: twikoo_js_url
              label: Twikoo 评论 - JS 地址
              placeholder: https://cdn.jsdelivr.net/npm/twikoo@1.7.0/dist/twikoo.nocss.js
              help: 使用 nocss 版本（推荐），主题会自动注入自定义样式。如填写 all.min.js 也会自动转换为 nocss 版本。
              value: https://cdn.cbd.int/twikoo@1.7.0/dist/twikoo.nocss.js
    - group: links
      label: 友链页面
      formSchema:
        - $formkit: radio
          name: enable_comment
          label: 启用评论
          help: 在友链页面底部显示评论组件（需要安装评论插件）
          options:
            - label: 开启
              value: true
            - label: 关闭
              value: false
          value: false
        - $formkit: array
          name: link_accordions
          label: 折叠信息
          help: 在友链列表下方添加可折叠的信息区块，如友链申请须知、网站介绍等
          value:
            - title: 友链申请须知
              subtitle: 申请前请阅读以下要求
              expanded: true
              content: |
                1. 网站内容健康，无违法违规信息
                2. 网站稳定运行，无频繁无法访问
                3. 申请时请提供网站名称、链接和简介
                4. 审核通过后会在 3 个工作日内添加
          itemLabels:
            - type: text
              label: "$value.title"
          children:
            - $formkit: text
              name: title
              label: 标题
              placeholder: 如：友链申请须知
              validation: required
            - $formkit: text
              name: subtitle
              label: 副标题
              placeholder: 如：申请前请阅读以下要求
            - $formkit: textarea
              name: content
              label: 内容
              placeholder: 支持 Markdown 格式
              rows: 6
            - $formkit: radio
              name: expanded
              label: 默认展开
              options:
                - label: 展开
                  value: true
                - label: 收起
                  value: false
              value: false
    - group: author
      label: 作者卡片
      formSchema:
        - $formkit: text
          name: name
          label: 作者名称
          placeholder: 留空则显示站点标题
          help: 作者卡片上显示的名称，留空则使用站点标题
        - $formkit: text
          name: avatar
          label: 头像图片
          placeholder: 请输入头像图片URL
        - $formkit: text
          name: cover
          label: 封面图片
          placeholder: 请输入封面图片URL
        - $formkit: text
          name: bio
          label: 个人简介
          placeholder: 请输入个人简介
        - $formkit: text
          name: follow_btn_icon
          label: 关注按钮图标
          placeholder: czs-add
          value: czs-add
          help: 图标类名，如 czs-add、czs-github-logo、czs-link
        - $formkit: text
          name: follow_btn_text
          label: 关注按钮文字
          placeholder: 关注
          value: 关注
        - $formkit: url
          name: follow_btn_url
          label: 关注按钮链接
          placeholder: https://
        - $formkit: array
          name: socials
          label: 社交媒体
          help: 最多添加4个社交媒体链接
          value:
            - icon: czs-weibo
              label: 微博
              url: ""
            - icon: czs-github-logo
              label: GitHub
              url: ""
            - icon: czs-rss
              label: RSS
              url: ""
            - icon: czs-bilibili
              label: 哔哩哔哩
              url: ""
          itemLabels:
            - type: text
              label: "$value.label"
          children:
            - $formkit: text
              name: icon
              label: 图标
              placeholder: czs-weibo
              help: 图标类名，如 czs-weibo、czs-github-logo
            - $formkit: text
              name: label
              label: 名称
              placeholder: 微博
            - $formkit: url
              name: url
              label: 链接
              placeholder: https://
