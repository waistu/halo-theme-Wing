apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-wing-setting
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: text
          name: site_title
          label: 网站标题
          placeholder: 请输入网站标题
          value:
        - $formkit: text
          name: icp
          label: 备案号
          placeholder: 粤ICP备xxxx号
        - $formkit: datetime-local
          name: site_start_date
          label: 建站时间
          placeholder: 选择建站日期
          help: 用于计算网站运行天数
        - $formkit: select
          name: color_scheme
          label: 主题配色
          help: 选择网站的主题强调色
          value: rose
          options:
            - label: 玫瑰红 (Rose)
              value: rose
            - label: 蓝色 (Blue)
              value: blue
            - label: 翠绿 (Emerald)
              value: emerald
            - label: 紫罗兰 (Violet)
              value: violet
            - label: 琥珀橙 (Amber)
              value: amber
            - label: 灰褐 (Taupe)
              value: taupe
            - label: 洋红 (Fuchsia)
              value: fuchsia
            - label: 石板灰 (Slate)
              value: slate
        - $formkit: radio
          name: homepage_content
          id: homepage_content
          key: homepage_content
          label: 首页显示内容
          help: 选择首页 (/) 显示笔记还是文章；切换后另一项通过自定义页面访问
          options:
            moments: 笔记
            posts: 文章
          value: moments
        - $formkit: text
          if: $get(homepage_content).value == 'moments'
          name: posts_page_slug
          label: 文章页路径
          placeholder: posts
          value: posts
          help: 笔记首页模式下，文章列表页的路径（不含斜杠），需与后台自定义页面的 Slug 保持一致
        - $formkit: radio
          name: sidebar_toggle
          label: 左侧边栏
          help: 是否显示左侧导航菜单
          options:
            show: 显示
            hide: 隐藏
          value: show
        - $formkit: radio
          name: right_sidebar_toggle
          label: 右侧边栏
          help: 是否显示右侧热力图
          options:
            show: 显示
            hide: 隐藏
          value: show
        - $formkit: select
          name: code_highlight_theme
          label: 代码高亮风格
          help: 选择代码块的语法高亮主题风格
          value: okaidia
          options:
            - label: Okaidia (暗色经典)
              value: okaidia
            - label: Dracula (暗色流行)
              value: dracula
            - label: Dark (暗色简洁)
              value: dark
            - label: Tomorrow (暗色现代)
              value: tomorrow
            - label: Twilight (暗色深蓝)
              value: twilight
            - label: Coy (亮色卡片)
              value: coy
            - label: Funky (亮色彩色)
              value: funky
            - label: Solarized Light (亮色护眼)
              value: solarizedlight
    - group: comment
      label: 评论设置
      formSchema:
        - $formkit: select
          name: comment_provider
          id: comment_provider
          key: comment_provider
          label: 评论系统
          help: 选择要使用的评论系统，默认使用 Halo 官方评论
          value: halo
          options:
            - label: Halo 官方评论
              value: halo
            - label: Twikoo 评论
              value: twikoo
        - $formkit: group
          if: $get(comment_provider).value == 'twikoo'
          name: twikoo_config
          key: twikoo_config
          label: Twikoo 评论配置
          help: 文档：https://twikoo.js.org/
          value:
            twikoo_env_id: ""
            twikoo_token: ""
            twikoo_js_url: "https://cdn.cbd.int/twikoo@1.7.0/dist/twikoo.nocss.js"
          children:
            - $formkit: url
              name: twikoo_env_id
              key: twikoo_env_id
              label: Twikoo 评论 - 环境id/后端URL
              placeholder: https://twikoo.xxx.com/
              help: 详情请查看文档 (后缀带 / )
            - $formkit: text
              name: twikoo_token
              key: twikoo_token
              label: Twikoo 评论 - 管理员令牌
              placeholder: 在浏览器F12的控制台中获取
              help: 用于显示弹幕，详情请查看文档
            - $formkit: url
              name: twikoo_js_url
              key: twikoo_js_url
              label: Twikoo 评论 - JS 地址
              placeholder: https://cdn.jsdelivr.net/npm/twikoo@1.7.0/dist/twikoo.nocss.js
              help: 使用 nocss 版本（推荐），主题会自动注入自定义样式。如填写 all.min.js 也会自动转换为 nocss 版本。
              value: https://cdn.cbd.int/twikoo@1.7.0/dist/twikoo.nocss.js
    - group: author
      label: 作者卡片
      formSchema:
        - $formkit: text
          name: name
          label: 作者名称
          placeholder: 留空则显示站点标题
          help: 作者卡片上显示的名称，留空则使用站点标题
        - $formkit: text
          name: avatar
          label: 头像图片
          placeholder: 请输入头像图片URL
        - $formkit: text
          name: cover
          label: 封面图片
          placeholder: 请输入封面图片URL
        - $formkit: text
          name: bio
          label: 个人简介
          placeholder: 请输入个人简介
        - $formkit: text
          name: follow_btn_icon
          label: 关注按钮图标
          placeholder: czs-add
          value: czs-add
          help: 图标类名，如 czs-add、czs-github-logo、czs-link
        - $formkit: text
          name: follow_btn_text
          label: 关注按钮文字
          placeholder: 关注
          value: 关注
        - $formkit: url
          name: follow_btn_url
          label: 关注按钮链接
          placeholder: https://
        - $formkit: array
          name: socials
          label: 社交媒体
          help: 最多添加4个社交媒体链接
          value:
            - icon: czs-weibo
              label: 微博
              url: ""
            - icon: czs-github-logo
              label: GitHub
              url: ""
            - icon: czs-rss
              label: RSS
              url: ""
            - icon: czs-bilibili
              label: 哔哩哔哩
              url: ""
          itemLabels:
            - type: text
              label: "$value.label"
          children:
            - $formkit: text
              name: icon
              label: 图标
              placeholder: czs-weibo
              help: 图标类名，如 czs-weibo、czs-github-logo
            - $formkit: text
              name: label
              label: 名称
              placeholder: 微博
            - $formkit: url
              name: url
              label: 链接
              placeholder: https://
