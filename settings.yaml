apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-wring-setting
spec:
  forms:
    - group: basic
      label: 基础设置
      formSchema:
        - $formkit: text
          name: site_title
          label: 网站标题
          placeholder: 请输入网站标题
          value:
        - $formkit: text
          name: icp
          label: 备案号
          placeholder: 粤ICP备xxxx号
        - $formkit: datetime-local
          name: site_start_date
          label: 建站时间
          placeholder: 选择建站日期
          help: 用于计算网站运行天数
        - $formkit: radio
          name: sidebar_toggle
          label: 左侧边栏
          help: 是否显示左侧导航菜单
          options:
            show: 显示
            hide: 隐藏
          value: show
        - $formkit: radio
          name: right_sidebar_toggle
          label: 右侧边栏
          help: 是否显示右侧热力图
          options:
            show: 显示
            hide: 隐藏
          value: show
    - group: author
      label: 作者卡片
      formSchema:
        - $formkit: text
          name: avatar
          label: 头像图片
          placeholder: 请输入头像图片URL
        - $formkit: text
          name: cover
          label: 封面图片
          placeholder: 请输入封面图片URL
        - $formkit: text
          name: bio
          label: 个人简介
          placeholder: 请输入个人简介
        - $formkit: array
          name: socials
          label: 社交媒体
          help: 最多添加4个社交媒体链接
          value:
            - icon: czs-weibo
              label: 微博
              url: ''
            - icon: czs-github-logo
              label: GitHub
              url: ''
            - icon: czs-rss
              label: RSS
              url: ''
            - icon: czs-bilibili
              label: 哔哩哔哩
              url: ''
          itemLabels:
            - type: text
              label: "$value.label"
          children:
            - $formkit: text
              name: icon
              label: 图标
              placeholder: czs-weibo
              help: 图标类名，如 czs-weibo、czs-github-logo
            - $formkit: text
              name: label
              label: 名称
              placeholder: 微博
            - $formkit: url
              name: url
              label: 链接
              placeholder: https://
