<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${site.title}"></title>
    <link rel="stylesheet" th:href="@{/assets/css/normalize.css}" />
    <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
    <link rel="stylesheet" th:href="@{/assets/iconfont/caomei/style.css}">
    <script th:src="@{/assets/js/dayjs.min.js}"></script>
    <script th:src="@{/assets/js/relativeTime.js}"></script>
    <script th:src="@{/assets/js/zh-cn.js}"></script>
    <!-- 打开搜索弹窗 -->
    <script>
        if (window.location.hash === '#open-search') {
            setTimeout(() => {
                if (window.SearchWidget) SearchWidget.open('');
            }, 100);
        }
    </script>
    <script th:src="@{/assets/js/main.js}"></script>
</head>

<body>
    <!-- 插入头部组件 -->
    <div th:replace="includes/header :: header"></div>
    <!-- 页面主体容器 -->
    <div class="container" th:with="allPosts=${postFinder.listAll()}, stats=${siteStatsFinder.getStats()}">
        <!-- 左侧：窄栏（菜单 + 小组件） -->
        <aside class="sidebar" th:style="${theme.config.basic.sidebar_toggle == 'hide' ? 'display:none' : ''}">
            <!-- nav -->
            <div th:replace="includes/nav :: nav"></div>
            <!-- author card -->
            <div th:replace="includes/authorCard :: authorCard(postCount=${allPosts.size()}, stats=${stats})"></div>
        </aside>
        <!-- 右侧：主内容大盒子 -->
        <div class="content">
            <div id="notes" class="notes-layout">
                <main class="notes-core">
                    <div class="notes-tabbar sticky bg-blur">
                        <ul class="tab global-list">
                            <li class="tab-item" data-type="all">
                                <a th:href="@{/}">全部</a>
                            </li>
                            <li class="tab-item" data-type="note">
                                <a th:href="@{/moments}">笔记</a>
                            </li>
                            <li class="tab-item" data-type="post">
                                <a th:href="@{/article}">文章</a>
                            </li>
                        </ul>
                    </div>

                    <!-- 骨架屏占位符 -->
                    <div class="article-list skeleton-container" id="skeletonContainer">
                        <th:block th:each="i : ${#numbers.sequence(1, 6)}">
                            <div class="skeleton-card">
                                <div class="skeleton-title"></div>
                                <div class="skeleton-content">
                                    <div class="skeleton-text"></div>
                                    <div class="skeleton-text short"></div>
                                </div>
                                <div class="skeleton-meta">
                                    <div class="skeleton-date"></div>
                                    <div class="skeleton-btn"></div>
                                </div>
                            </div>
                        </th:block>
                    </div>

                    <!-- 服务端渲染前10篇文章，客户端分页加载 -->
                    <div class="article-list" id="articleList" style="display:none">
                        <th:block th:each="item, iterStat : ${allPosts}" th:if="${iterStat.index < 10}">
                            <div th:replace="includes/noteCard :: noteCard(
                  type = 'post',
                  title = ${item.spec.title},
                  excerpt = ${item.status.excerpt},
                  date = ${item.spec.publishTime},
                  cover = ${item.spec.cover},
                  permalink = ${item.status.permalink},
                  comments = ${item.stats.comment}
              )"></div>
                        </th:block>
                        <!-- 存储所有文章数据供客户端分页使用 -->
                        <script th:inline="javascript">
                            window.allPosts = /*[[${allPosts}]]*/[];
                        </script>
                    </div>

                    <div class="pagination" id="pagination"
                        th:style="${allPosts.size() > 10 ? 'display:flex' : 'display:none'}">
                        <span class="page-info">共 <span th:text="${allPosts.size()}">0</span> 篇文章</span>
                        <div class="page-numbers">
                            <span class="page-number active" data-page="1">1</span>
                        </div>
                    </div>
                </main>
                <aside class="notes-aside"
                    th:style="${theme.config.basic.right_sidebar_toggle == 'hide' ? 'display:none' : ''}">
                    <div class="heatmap-box">
                        <div th:replace="includes/heatmap :: heatmap"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>
    <!-- 页脚部分 -->
    <div th:replace="includes/footer :: footer"></div>
    <script>
        (function () {
            var path = window.location.pathname;
            var tabs = document.querySelectorAll('.notes-tabbar .tab-item');
            tabs.forEach(function (tab) {
                var link = tab.querySelector('a');
                if (!link) return;
                var href = link.getAttribute('href');
                if (!href) return;

                // 首页
                if (path === '/' || path === '' || path === '/index' || path === '/index.html') {
                    if (href === '/' || href.endsWith('/')) {
                        tab.classList.add('active');
                    }
                }
                // 笔记页面
                else if (path.startsWith('/moments')) {
                    if (href === '/moments') {
                        tab.classList.add('active');
                    }
                }
                // 文章页面
                else if (path.startsWith('/article')) {
                    if (href === '/article') {
                        tab.classList.add('active');
                    }
                }
            });
        })();
    </script>
</body>

</html>
