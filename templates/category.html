<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${category.spec.displayName} + ' - ' + ${site.title}"></title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
</head>

<body>
  <div th:replace="~{includes/components/header :: header}"></div>
  <div class="container">
    <aside class="sidebar" th:with="stats=${siteStatsFinder.getStats()}">
      <div th:replace="~{includes/components/nav :: nav}"></div>
      <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})"></div>
    </aside>

    <div class="content">
      <div class="tag-page">
        <div class="tag-header" th:text="${category.spec.displayName}"></div>

        <div class="post-card-list">
          <div th:each="post : ${posts.items}" class="post-card">
            <div class="post-card-cover">
              <img th:if="${not #strings.isEmpty(post.spec.cover)}" th:src="${post.spec.cover}" alt="封面">
              <div th:if="${#strings.isEmpty(post.spec.cover)}" class="post-card-cover-empty"></div>
            </div>
            <div class="post-card-content">
              <h2 class="post-card-title">
                <a th:href="${post.status.permalink}" th:text="${post.spec.title}"></a>
              </h2>
              <div class="post-card-meta">
                <span th:text="${#dates.format(post.spec.publishTime, 'yyyy-MM-dd')}"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- 分页 -->
        <div th:replace="includes/components/pagination :: pagination(
               page=${posts.page},
               totalPages=${posts.totalPages},
               baseUrl=${category.status.permalink}
             )"></div>
      </div>
    </div>
  </div>

  <div th:replace="~{includes/components/footer :: footer}"></div>
  <!-- Header 滚动隐藏脚本 -->
  <script>
    (function() {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      window.onscroll = function() {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
      };
    })();
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</body>

</html>
