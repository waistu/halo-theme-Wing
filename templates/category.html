<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${category.spec.displayName} + ' - ' + ${site.title}"></title>
  <link rel="stylesheet" th:href="@{/assets/css/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
  <link rel="stylesheet" th:href="@{/assets/iconfont/caomei/style.css}">
</head>

<body>
  <div th:replace="~{includes/header :: header}"></div>
  <div class="container">
    <aside class="sidebar" th:with="stats=${siteStatsFinder.getStats()}">
      <div th:replace="~{includes/nav :: nav}"></div>
      <div th:replace="includes/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})"></div>
    </aside>

    <div class="content">
      <div class="tag-page">
        <div class="tag-header" th:text="${category.spec.displayName}"></div>

        <div class="post-card-list">
          <div th:each="post : ${posts.items}" class="post-card">
            <div class="post-card-cover">
              <img th:if="${not #strings.isEmpty(post.spec.cover)}" th:src="${post.spec.cover}" alt="封面">
              <div th:if="${#strings.isEmpty(post.spec.cover)}" class="post-card-cover-empty"></div>
            </div>
            <div class="post-card-content">
              <h2 class="post-card-title">
                <a th:href="${post.status.permalink}" th:text="${post.spec.title}"></a>
              </h2>
              <div class="post-card-meta">
                <span th:text="${#dates.format(post.spec.publishTime, 'yyyy-MM-dd')}"></span>
              </div>
            </div>
          </div>
        </div>

        <div class="pagination" th:if="${posts.totalPages > 1}">
          <a th:if="${posts.page > 1}" th:href="@{${category.status.permalink} + '/page/' + ${posts.page - 1}}"
            class="page-btn">上一页</a>

          <a th:href="@{${category.status.permalink}}" th:class="${posts.page == 1} ? 'active' : ''">1</a>
          <span th:if="${posts.totalPages > 8 and posts.page > 4}">...</span>

          <th:block th:if="${posts.totalPages > 1}">
            <th:block th:if="${posts.totalPages <= 8 and posts.totalPages > 2}">
              <a th:each="i : ${#numbers.sequence(2, posts.totalPages - 1)}"
                th:href="@{${category.status.permalink} + '/page/' + ${i}}" th:text="${i}"
                th:class="${i == posts.page} ? 'active' : ''"></a>
            </th:block>

            <th:block th:if="${posts.totalPages > 8}">
              <a th:if="${posts.page > 2}" th:href="@{${category.status.permalink} + '/page/' + ${posts.page - 1}}"
                th:text="${posts.page - 1}"></a>
              <a class="active" th:if="${posts.page > 1}" th:text="${posts.page}"></a>
              <a th:if="${posts.page < posts.totalPages}"
                th:href="@{${category.status.permalink} + '/page/' + ${posts.page + 1}}"
                th:text="${posts.page + 1}"></a>
            </th:block>
          </th:block>

          <span th:if="${posts.totalPages > 8 and posts.page < posts.totalPages - 3}">...</span>
          <a th:href="@{${category.status.permalink} + '/page/' + ${posts.totalPages}}"
            th:class="${posts.page == posts.totalPages} ? 'active' : ''" th:text="${posts.totalPages}"></a>

          <a th:if="${posts.hasNext()}" th:href="@{${category.status.permalink} + '/page/' + ${posts.page + 1}}"
            class="page-btn">下一页</a>
        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{includes/footer :: footer}"></div>
</body>

</html>
