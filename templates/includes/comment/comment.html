<!--
  评论区模块
  支持 Halo 官方评论和 Twikoo 评论，通过主题设置切换
  
  Halo 官方评论：https://www.halo.run/store/apps/app-YXyaD
  Twikoo 评论：https://twikoo.js.org/
-->
<th:block th:fragment="comment">

    <!-- 根据主题设置选择评论系统 -->
    <th:block th:switch="${theme.config.comment?.comment_provider}">
        
        <!-- Twikoo 评论 -->
        <th:block th:case="'twikoo'">
            <!-- Twikoo 有自己的配置检查逻辑 -->
            <div th:replace="~{includes/comment/twikoo :: twikoo}"></div>
        </th:block>
        
        <!-- Halo 官方评论（默认） -->
        <th:block th:case="*">
            <!--
                haloCommentEnabled：标准模板（post.html/page.html）由 Halo 自动注入；
                自定义模板（links.html 等）不一定注入，null 时视为允许显示。
            -->
            <th:block th:if="${haloCommentEnabled == null or haloCommentEnabled}">
                <div class="article-comment round" id="comment-wrapper">
                    <!--
                        Halo 官方评论组件标签
                        group: 资源分组，文章使用 content.halo.run
                        kind: 资源类型，文章使用 Post，自定义页面使用 SinglePage
                        name: 资源的唯一标识，使用 post.metadata.name 或 singlePage.metadata.name
                    -->
                    <th:block th:with="commentName=${post != null ? post.metadata.name : (singlePage != null ? singlePage.metadata.name : '')}">
                        <th:block th:if="${not #strings.isEmpty(commentName)}">
                            <th:block th:with="commentKind=${post != null ? 'Post' : 'SinglePage'}">
                                <halo:comment
                                    group="content.halo.run"
                                    th:kind="${commentKind}"
                                    th:attr="name=${commentName}"
                                />
                            </th:block>
                        </th:block>
                    </th:block>
                </div>
            </th:block>
        </th:block>
        
    </th:block>

</th:block>
