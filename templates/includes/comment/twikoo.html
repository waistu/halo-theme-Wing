<!--
  Twikoo 评论模块 - HeroUI 风格
  策略：
  - twikoo.nocss.js 存放于 /assets/vendor/，按需动态加载，不影响主 JS 体积
  - 样式（twikoo.css + 主题覆盖）已合并进 dist/css/main.css，无需额外加载
-->
<th:block th:fragment="twikoo">

    <div class="article-comment round hui-card" id="comment-wrapper">
        <div id="twikoo-container"></div>
    </div>

    <script th:inline="javascript">
        (function () {
            var envId = /*[[${theme.config.comment.twikoo_config.twikoo_env_id}]]*/ '';
            if (!envId) {
                document.getElementById('twikoo-container').innerHTML =
                    '<div style="padding:20px;text-align:center;color:#999">' +
                    '<p>Twikoo 评论未配置</p>' +
                    '<p style="font-size:12px">请在主题设置 → 评论设置中填写环境 ID</p>' +
                    '</div>';
                return;
            }

            var script = document.createElement('script');
            script.src = /*[[@{/assets/vendor/twikoo.nocss.js}]]*/ '/assets/vendor/twikoo.nocss.js';
            script.async = true;
            script.onload = function () {
                twikoo.init({
                    envId: envId,
                    el: '#twikoo-container',
                    path: window.location.pathname,
                    lang: 'zh-CN'
                }).then(function() {
                    // Twikoo 初始化完成后，调整评论输入区布局
                    var adjustLayout = function() {
                        var tkInput = document.querySelector('.tk-input');
                        var tkRowActionsStart = document.querySelector('.tk-row-actions-start');
                        var tkSubmit = document.querySelector('.tk-submit');
                        var metaInput = document.querySelector('.tk-meta-input');
                        var sendBtn = document.querySelector('.tk-send');

                        // 把 tk-row-actions-start 移到 tk-input 里面
                        if (tkInput && tkRowActionsStart && tkRowActionsStart.parentNode !== tkInput) {
                            tkInput.appendChild(tkRowActionsStart);
                        }

                        // 移动发送按钮到 meta-input 后面
                        if (metaInput && sendBtn && sendBtn.parentNode !== metaInput.parentNode) {
                            metaInput.parentNode.insertBefore(sendBtn, metaInput.nextSibling);
                        }
                    };

                    // 多次尝试调整
                    setTimeout(adjustLayout, 100);
                    setTimeout(adjustLayout, 300);
                    setTimeout(adjustLayout, 500);
                    setTimeout(adjustLayout, 1000);

                    // 监听 DOM 变化
                    var observer = new MutationObserver(function() {
                        adjustLayout();
                    });
                    var container = document.getElementById('twikoo-container');
                    if (container) {
                        observer.observe(container, { childList: true, subtree: true });
                    }
                });
            };
            script.onerror = function () {
                document.getElementById('twikoo-container').innerHTML =
                    '<div style="padding:20px;text-align:center;color:#999">Twikoo 加载失败</div>';
            };
            document.head.appendChild(script);
        })();
    </script>

</th:block>
