<!--
  Moment 评论模块
  仅支持 Halo 官方评论，因为 Twikoo 不支持 Moment 资源类型
-->
<th:block th:fragment="moment-comment">

    <!-- 判断评论功能是否启用 -->
    <th:block th:if="${haloCommentEnabled}">
        <halo:comment group="moment.halo.run" kind="Moment" version="v1alpha1"
          th:attr="name=${moment.metadata.name}">
        </halo:comment>
    </th:block>

</th:block>
