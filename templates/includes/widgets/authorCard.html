<div th:fragment="authorCard(postCount, stats)" class="author-card widget-box bg-white dark:bg-gray-800 rounded-xl shadow-md border border-gray-200 dark:border-gray-700">
  <!-- 封面背景 -->
  <div class="author-cover">
    <th:block th:if="${not #strings.isEmpty(theme.config.author.cover)}">
      <img th:src="${theme.config.author.cover}" alt="封面">
    </th:block>
    <th:block th:unless="${not #strings.isEmpty(theme.config.author.cover)}">
      <img th:src="@{/assets/images/authorCardbg.jpg}" alt="封面" class="author-cover-default">
    </th:block>
    <button class="author-follow-btn" title="关注">
      <i class="czs czs-add"></i>
    </button>
  </div>

  <!-- 头像 -->
  <div class="author-avatar-wrap">
    <th:block th:if="${theme.config.author.avatar}">
      <img th:src="${theme.config.author.avatar}" alt="头像" class="author-avatar">
    </th:block>
    <th:block th:unless="${theme.config.author.avatar}">
      <img th:src="@{/assets/images/author-avatar.png}" alt="头像" class="author-avatar">
    </th:block>
  </div>

  <!-- 作者信息 -->
  <div class="author-info">
    <h3 class="author-name text-gray-900 dark:text-white" th:text="${site.title}">站点名称</h3>
    <p class="author-bio text-gray-600 dark:text-gray-400"
      th:text="${theme.config.author.bio ?: 'Product Designer who focuses on simplicity & usability.'}">简介</p>
  </div>

  <!-- 统计数据 -->
  <div class="author-stats">
    <div class="stat-item">
      <span class="stat-value text-gray-900 dark:text-white" th:with="upvote=${stats?.upvote ?: 0}"
        th:text="${upvote >= 1000 ? T(java.lang.String).format('%.1fK', upvote / 1000.0) : upvote}">0</span>
      <span class="stat-label text-gray-500 dark:text-gray-400">Like</span>
    </div>
    <div class="stat-item">
      <span class="stat-value text-gray-900 dark:text-white"
        th:text="${postCount >= 1000 ? T(java.lang.String).format('%.1fK', postCount / 1000.0) : postCount}">0</span>
      <span class="stat-label text-gray-500 dark:text-gray-400">Posts</span>
    </div>
    <div class="stat-item">
      <span class="stat-value text-gray-900 dark:text-white" th:with="visit=${stats?.visit ?: 0}"
        th:text="${visit >= 1000 ? T(java.lang.String).format('%.1fK', visit / 1000.0) : visit}">0</span>
      <span class="stat-label text-gray-500 dark:text-gray-400">Views</span>
    </div>
  </div>

  <!-- 社交链接 -->
  <div class="author-social">
    <th:block th:with="socials=${theme.config.author.socials}">
      <th:block th:if="${#lists.isEmpty(socials)}">
        <th:block th:with="socials=${theme.config.author.socials_default}"></th:block>
      </th:block>
      <a th:each="social : ${socials}" th:if="${not #strings.isEmpty(social.url)}" th:href="${social.url}"
        target="_blank" class="social-link text-gray-600 dark:text-gray-400 hover:text-rose-500 dark:hover:text-rose-400" th:title="${social.label}">
        <i th:class="'czs ' + ${social.icon}"></i>
      </a>
    </th:block>
  </div>
</div>
