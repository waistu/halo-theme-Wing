<!-- 斜线阴影标题组件 -->
<!-- 用法: <div th:replace="~{includes/widgets/headingShadow :: headingShadow(text='Fast', shadowColor='black', className='text-5xl font-bold italic')}"></div> -->
<th:block th:fragment="headingShadow(text, shadowColor, className)">
  <span data-heading-shadow
        th:attr="data-text=${text}, data-color=${shadowColor ?: 'black'}"
        th:class="${className ?: 'text-5xl font-bold'}">
  </span>
</th:block>

<!-- ShimmerButton 按钮组件 -->
<!-- 用法: <div th:replace="~{includes/widgets/headingShadow :: shimmerButton(text='申请友链', icon='czs czs-add', onclick='LinkSubmitWidget.open()')}"></div> -->
<div th:fragment="shimmerButton(text, icon, href, onclick, className)"
     data-shimmer-button
     th:attr="data-text=${text}, data-icon=${icon ?: ''}, data-href=${href ?: ''}, data-onclick=${onclick ?: ''}, data-class=${className ?: ''}">
</div>

<!-- 资源引入（只需在页面底部引入一次） -->
<th:block th:fragment="headingShadowResources">
  <link rel="stylesheet" th:href="@{/assets/vendor/magic-ui/style.css}" />
  <script th:src="@{/assets/vendor/magic-ui/heading.js}"></script>
</th:block>
