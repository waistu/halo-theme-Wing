<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" th:content="${site.description}">

    <!-- 网站标题 -->
    <title th:text="${site_title} + (${post.title} ? ' - ' + ${post.title} : '')" th:remove="tag">
        网站标题
    </title>

    <!-- 主题模式早期初始化：必须在 CSS 前执行，避免白闪/黑闪 -->
    <script th:inline="javascript">
    (function() {
      // 从 Thymeleaf 注入的后台配置
      var serverMode    = /*[[${theme.config.style?.theme_mode ?: 'auto'}]]*/ 'auto';
      var lightStart    = /*[[${theme.config.style?.auto_theme_time?.light_start ?: '06:00'}]]*/ '06:00';
      var darkStart     = /*[[${theme.config.style?.auto_theme_time?.dark_start ?: '22:00'}]]*/ '22:00';

      // 把配置透传给后续的 main.js（避免重复 Thymeleaf 取值）
      window.__WING_THEME__ = { serverMode: serverMode, lightStart: lightStart, darkStart: darkStart };

      /**
       * 解析 "HH:MM" 为当天分钟数
       */
      function timeToMinutes(t) {
        var parts = (t || '').split(':');
        return parseInt(parts[0] || 0, 10) * 60 + parseInt(parts[1] || 0, 10);
      }

      /**
       * 根据自动模式时间段判断当前应为 dark 还是 light
       */
      function getAutoTheme() {
        var now = new Date();
        var cur = now.getHours() * 60 + now.getMinutes();
        var ls  = timeToMinutes(lightStart);  // 06:00 → 360
        var ds  = timeToMinutes(darkStart);   // 22:00 → 1320
        // 跨天判断：深色区间 [ds, 次日 ls)
        if (ds > ls) {
          return (cur >= ds || cur < ls) ? 'dark' : 'light';
        } else {
          // 深色区间不跨天：[ds, ls)
          return (cur >= ds && cur < ls) ? 'dark' : 'light';
        }
      }

      function resolveTheme(mode) {
        if (mode === 'light') return 'light';
        if (mode === 'dark')  return 'dark';
        // auto：先看用户在 dropdown 里的选择（wing-user-mode），再按时间算
        var userMode = localStorage.getItem('wing-user-mode');
        if (userMode === 'light') return 'light';
        if (userMode === 'dark')  return 'dark';
        return getAutoTheme();
      }

      var isDark = resolveTheme(serverMode) === 'dark';
      if (isDark) {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
    </script>

    <!-- 引入构建后的 CSS -->
    <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}">
    <!-- Magic UI 组件 CSS -->
    <link rel="stylesheet" th:href="@{/assets/vendor/magic-ui/ripple.css}">
    <link rel="stylesheet" th:href="@{/assets/vendor/magic-ui/border-beam.css}">
    <!-- Header 样式：防止遮挡内容 + 滚动隐藏 -->
    <style>
      #header {
        transition: transform 0.3s ease;
      }
      #header.header-hidden {
        transform: translateY(-100%);
      }
    </style>

    <!-- 可选的额外样式 -->
    <link th:if="${theme.config.custom_css}" rel="stylesheet" th:href="@{${theme.config.custom_css}}">

    <!-- 预加载关键资源 -->
    <link rel="preload" th:href="@{/assets/dist/js/main.js}" as="script">

    <!-- 主题配色方案 -->
    <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>

    <!-- RSS 订阅 -->
    <link rel="alternate" type="application/rss+xml" th:href="@{/atom.xml}" title="RSS">
</head>

<body
    class="min-h-screen flex flex-col bg-rose-50 dark:bg-rose-950 text-gray-800 dark:text-rose-100 transition-colors duration-300">

    <!-- Ripple 涟漪背景 -->
    <div id="ripple-bg" data-ripple-bg class="fixed inset-0 -z-10 pointer-events-none"></div>

    <!-- 头部导航栏 -->
    <header th:replace="~{includes/components/header :: header}"></header>

    <!-- 主内容区域（由子模板填充） -->
    <main class="flex-grow" th:fragment="content">
        <!-- 这里的内容会被子模板替换 -->
        <div th:replace="${content}"></div>
    </main>

    <!-- 页脚 -->
    <footer th:replace="~{includes/components/footer :: footer}"></footer>

    <!-- 移动端导航菜单（可选） -->
    <div th:replace="~{includes/components/mobile-nav :: mobile-nav}"></div>

    <!-- 引入构建后的 JavaScript -->
    <script th:src="@{/assets/dist/js/main.js}"></script>
    <!-- Ripple 涟漪背景 JS -->
    <script th:src="@{/assets/vendor/magic-ui/ripple.js}"></script>
    <!-- Header 滚动隐藏脚本 -->
    <script>
      (function() {
        var header = document.getElementById('header');
        if (!header) return;
        var lastScrollY = 0;
        var ticking = false;
        
        function updateHeader() {
          var currentScrollY = window.scrollY;
          if (currentScrollY > 100) {
            if (currentScrollY > lastScrollY) {
              header.classList.add('header-hidden');
            } else {
              header.classList.remove('header-hidden');
            }
          } else {
            header.classList.remove('header-hidden');
          }
          lastScrollY = currentScrollY;
          ticking = false;
        }
        
        window.addEventListener('scroll', function() {
          if (!ticking) {
            requestAnimationFrame(updateHeader);
            ticking = true;
          }
        }, { passive: true });
      })();
    </script>

    <!-- Magic UI 组件 JS -->
    <script th:src="@{/assets/vendor/magic-ui/border-beam.js}"></script>

    <!-- 自定义脚本（如果有） -->
    <script th:if="${theme.config.custom_js}" th:src="@{${theme.config.custom_js}}"></script>

    <!-- 统计代码（如果有） -->
    <div th:utext="${theme.config.analytics_code}" th:remove="tag"></div>
</body>

</html>
