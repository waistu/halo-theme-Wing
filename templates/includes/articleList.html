<th:block th:fragment="articleContent">
    <article class="post-article">
        <header class="post-header">
            <h1 class="post-title" th:text="${post.spec.title}"></h1>
            <!-- 文章 meta 信息 -->
            <div class="post-meta">
                <!-- 作者 -->
                <span class="meta-item">
                    <i class="czs-user"></i>
                    <span th:text="${post.owner.displayName}">作者</span>
                </span>
                <!-- 日期 -->
                <span class="meta-item">
                    <i class="czs-time"></i>
                    <span th:text="${#dates.format(post.spec.publishTime, 'yyyy-MM-dd')}">日期</span>
                </span>
                <!-- 阅读量 -->
                <span class="meta-item">
                    <i class="czs-eye"></i>
                    <span>0</span>
                </span>
                <!-- 评论 -->
                <span class="meta-item">
                    <i class="czs-talk"></i>
                    <span th:text="${post.status.commentsCount} ?: 0">0</span>
                </span>
            </div>
            <!-- 标签 -->
            <div class="post-tags" th:if="${post.tags}">
                <a th:each="tag : ${post.tags}" th:href="${tag.status.permalink}" class="post-tag"
                    th:text="${tag.spec.displayName}"></a>
            </div>
        </header>
        <div id="content" class="post-content" th:utext="${content}"></div>
    </article>
</th:block>
