<th:block th:fragment="articleContent(content, post)">
    <article class="post-article">
        <header class="post-header">
            <h1 class="post-title text-gray-900 dark:text-white" th:text="${post.spec.title}"></h1>
            <!-- 文章 meta 信息 -->
            <div class="post-meta text-gray-500 dark:text-gray-400">
                <!-- 作者 -->
                <span class="meta-item">
                    <i class="czs-user"></i>
                    <span th:text="${post.owner.displayName}">作者</span>
                </span>
                <!-- 日期 -->
                <span class="meta-item">
                    <i class="czs-time"></i>
                    <span th:text="${#dates.format(post.spec.publishTime, 'yyyy-MM-dd')}">日期</span>
                </span>
                <!-- 阅读量 -->
                <span class="meta-item">
                    <i class="czs-eye"></i>
                    <span th:text="${post.stats?.visit ?: 0}">0</span>
                </span>
                <!-- 点赞 -->
                <span class="meta-item">
                    <i class="czs-heart" id="post-like-btn" style="cursor: pointer;"></i>
                    <span id="post-like-count" th:text="${post.stats?.upvote ?: 0}">0</span>
                </span>
                <!-- 评论 -->
                <span class="meta-item">
                    <i class="czs-talk"></i>
                    <span th:text="${post.stats?.comment ?: 0}">0</span>
                </span>
            </div>
            <!-- 标签 -->
            <div class="post-tags" th:if="${post.tags}">
                <a th:each="tag : ${post.tags}" th:href="${tag.status.permalink}" class="post-tag bg-rose-100 dark:bg-rose-900 text-rose-700 dark:text-rose-300 hover:bg-rose-200 dark:hover:bg-rose-800"
                    th:text="${tag.spec.displayName}"></a>
            </div>
        </header>
        <div id="content" class="post-content text-gray-800 dark:text-gray-200" th:utext="${content}"></div>
    </article>
</th:block>
