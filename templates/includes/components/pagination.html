<!--
  =============================================
  分页组件 - 对齐 Catalyst Pagination API
  class 规范：
    nav.pagination                  容器
    a/span.pagination-previous      上一页（无 href 则 span.disabled）
    a/span.pagination-next          下一页（无 href 则 span.disabled）
    ol/div.pagination-list          页码列表
    a.pagination-page               页码链接
    a.pagination-page.current       当前页
    span.pagination-gap             省略号 …

  =============================================
  【完整版】pagination fragment
  - 含页码列表（智能省略号）
  - 用于：tag、category 等精确分页场景

  调用示例（tag.html / category.html）：
  <div th:replace="includes/components/pagination :: pagination(
    page=${posts.page},
    totalPages=${posts.totalPages},
    baseUrl=${tag.status.permalink}
  )"></div>

  =============================================
-->

<!--/* ---- 完整版：有页码列表 ---- */-->
<nav th:fragment="pagination(page, totalPages, baseUrl)"
     aria-label="Page navigation"
     class="pagination"
     th:if="${totalPages > 1}">

  <!--/* 上一页 */-->
  <a th:if="${page > 1}"
     th:href="${page == 2 ? baseUrl : baseUrl + '/page/' + (page - 1)}"
     class="pagination-previous">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z"
            clip-rule="evenodd"/>
    </svg>
    上一页
  </a>
  <span th:unless="${page > 1}" class="pagination-previous disabled" aria-disabled="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z"
            clip-rule="evenodd"/>
    </svg>
    上一页
  </span>

  <!--/* 页码列表 */-->
  <div class="pagination-list">
    <th:block th:with="urlPrefix=${baseUrl == '/' ? '' : baseUrl}">

      <!--/* 页码 ≤ 7：全部显示 */-->
      <th:block th:if="${totalPages <= 7}">
        <a th:each="i : ${#numbers.sequence(1, totalPages)}"
           th:href="${i == 1 ? baseUrl : urlPrefix + '/page/' + i}"
           th:text="${i}"
           th:class="${i == page} ? 'pagination-page current' : 'pagination-page'"></a>
      </th:block>

      <!--/* 页码 > 7：智能省略号 */-->
      <th:block th:if="${totalPages > 7}">
        <!--/* 第 1 页 */-->
        <a th:href="${baseUrl}"
           th:class="${page == 1} ? 'pagination-page current' : 'pagination-page'">1</a>

        <!--/* 左省略号：当前页 > 4 */-->
        <span th:if="${page > 4}" class="pagination-gap">…</span>

        <!--/* 中间页码 */-->
        <th:block th:with="
          start=${page <= 4 ? 2 : (page >= totalPages - 3 ? totalPages - 5 : page - 2)},
          end=${page <= 4   ? 6 : (page >= totalPages - 3 ? totalPages - 1 : page + 2)}">
          <a th:each="i : ${#numbers.sequence(start, end)}"
             th:href="${urlPrefix + '/page/' + i}"
             th:text="${i}"
             th:class="${i == page} ? 'pagination-page current' : 'pagination-page'"></a>
        </th:block>

        <!--/* 右省略号：当前页 < totalPages - 3 */-->
        <span th:if="${page < totalPages - 3}" class="pagination-gap">…</span>

        <!--/* 最后一页 */-->
        <a th:href="${urlPrefix + '/page/' + totalPages}"
           th:class="${page == totalPages} ? 'pagination-page current' : 'pagination-page'"
           th:text="${totalPages}"></a>
      </th:block>

    </th:block>
  </div>

  <!--/* 下一页 */-->
  <a th:if="${page < totalPages}"
     th:href="${baseUrl + '/page/' + (page + 1)}"
     class="pagination-next">
    下一页
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"/>
    </svg>
  </a>
  <span th:unless="${page < totalPages}" class="pagination-next disabled" aria-disabled="true">
    下一页
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"/>
    </svg>
  </span>

</nav>


<!--
  =============================================
  【简化版】simple-pagination fragment
  - 同样含页码列表（更简洁）
  - 用于：首页、归档、友链等场景

  调用示例（index.html / archives.html）：
  <div th:replace="includes/components/pagination :: simple-pagination(
    page=${posts.page},
    totalPages=${posts.totalPages},
    baseUrl=@{/}
  )"></div>
  =============================================
-->
<nav th:fragment="simple-pagination(page, totalPages, baseUrl)"
     aria-label="Page navigation"
     class="pagination"
     th:if="${totalPages > 1}">

  <!--/* 上一页 */-->
  <a th:if="${page > 1}"
     th:href="${page == 2 ? baseUrl : (baseUrl == '/' ? '' : baseUrl) + '/page/' + (page - 1)}"
     class="pagination-previous">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z"
            clip-rule="evenodd"/>
    </svg>
    上一页
  </a>
  <span th:unless="${page > 1}" class="pagination-previous disabled" aria-disabled="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z"
            clip-rule="evenodd"/>
    </svg>
    上一页
  </span>

  <!--/* 页码列表 - 简洁版：始终显示首页、末页和省略号 */-->
  <div class="pagination-list">
    <th:block th:with="urlPrefix=${baseUrl == '/' ? '' : baseUrl}">

      <!--/* 页码 ≤ 5：全部显示 */-->
      <th:block th:if="${totalPages le 5}">
        <a th:each="i : ${#numbers.sequence(1, totalPages)}"
           th:href="${i == 1 ? baseUrl : urlPrefix + '/page/' + i}"
           th:text="${i}"
           th:class="${i == page} ? 'pagination-page current' : 'pagination-page'"></a>
      </th:block>

      <!--/* 页码 > 5：始终显示首页、末页和省略号 */-->
      <th:block th:if="${totalPages gt 5}">
        <!--/* 首页 */-->
        <a th:href="${baseUrl}"
           th:class="${page == 1} ? 'pagination-page current' : 'pagination-page'">1</a>

        <!--/* 左边省略号：当前页 > 3 */-->
        <span th:if="${page gt 3}" class="pagination-gap">…</span>

        <!--/* 左边第2页：当前页 <= 3 */-->
        <th:block th:if="${page le 3}">
          <a th:href="${urlPrefix + '/page/2'}"
             th:class="${page == 2} ? 'pagination-page current' : 'pagination-page'">2</a>
        </th:block>

        <!--/* 左边倒数第2页：当前页 >= totalPages - 2 */-->
        <th:block th:if="${page ge totalPages - 2 and page lt totalPages}">
          <a th:href="${urlPrefix + '/page/' + (totalPages - 2)}" class="pagination-page"
             th:text="${totalPages - 2}"></a>
        </th:block>

        <!--/* 中间页：当前页不在首页末页且不是上面情况时 */-->
        <th:block th:if="${page gt 3 and page lt totalPages - 2}">
          <a th:href="${urlPrefix + '/page/' + (page - 1)}" class="pagination-page" th:text="${page - 1}"></a>
          <a th:class="'pagination-page current'" th:text="${page}"></a>
          <a th:href="${urlPrefix + '/page/' + (page + 1)}" class="pagination-page" th:text="${page + 1}"></a>
        </th:block>

        <!--/* 右边省略号：当前页 < totalPages - 2 */-->
        <span th:if="${page lt totalPages - 2}" class="pagination-gap">…</span>

        <!--/* 右边第2页：当前页 >= totalPages - 2 */-->
        <th:block th:if="${page ge totalPages - 2}">
          <a th:href="${urlPrefix + '/page/' + (totalPages - 1)}"
             th:class="${page == totalPages - 1} ? 'pagination-page current' : 'pagination-page'"
             th:text="${totalPages - 1}"></a>
        </th:block>

        <!--/* 右边第2页：当前页 <= 3 */-->
        <th:block th:if="${page le 3 and totalPages gt 4}">
          <a th:href="${urlPrefix + '/page/3'}"
             th:class="${page == 3} ? 'pagination-page current' : 'pagination-page'">3</a>
        </th:block>

        <!--/* 末页 */-->
        <a th:href="${urlPrefix + '/page/' + totalPages}"
           th:class="${page == totalPages} ? 'pagination-page current' : 'pagination-page'"
           th:text="${totalPages}"></a>
      </th:block>

    </th:block>
  </div>

  <!--/* 下一页 */-->
  <a th:if="${page < totalPages}"
     th:href="${(baseUrl == '/' ? '' : baseUrl) + '/page/' + (page + 1)}"
     class="pagination-next">
    下一页
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"/>
    </svg>
  </a>
  <span th:unless="${page < totalPages}" class="pagination-next disabled" aria-disabled="true">
    下一页
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"
         style="width:1em;height:1em;flex-shrink:0">
      <path fill-rule="evenodd"
            d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z"
            clip-rule="evenodd"/>
    </svg>
  </span>

</nav>
