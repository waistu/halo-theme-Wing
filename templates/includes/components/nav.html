<div th:fragment="nav" class="nav side-nav widget-box bg-white dark:bg-gray-800 rounded-xl shadow-md border border-gray-200 dark:border-gray-700">
    <!-- 获取主菜单 -->
    <th:block th:with="menu = ${menuFinder.getPrimary()}">
        <!-- 判断是否有自定义菜单 -->
        <th:block th:if="${menu != null and not #lists.isEmpty(menu.menuItems)}">
            <!-- 有自定义菜单：动态渲染 -->
            <ul class="nav-list">
                <li class="nav-item" th:each="menuItem : ${menu.menuItems}" 
                    th:data-path="${menuItem.status.href}"
                    th:classappend="${menuItem.status.href == currentPath || (menuItem.status.href == '/' && (currentPath == '/' || currentPath == '/index' || currentPath == '/index.html'))} ? 'active' : ''">
                    <a th:href="${menuItem.status.href}" th:target="${menuItem.spec.target?.value}">
                        <!-- 使用元数据获取图标 -->
                        <i th:if="${#annotations.contains(menuItem, 'icon')}"
                            th:class="${#annotations.get(menuItem, 'icon')}"></i>
                        <i th:unless="${#annotations.contains(menuItem, 'icon')}" class="czs czs-link-l"></i>
                        <span th:text="${menuItem.status.displayName}"></span>
                        <!-- 显示子菜单箭头 -->
                        <i th:if="${not #lists.isEmpty(menuItem.children)}" class="czs czs-down sub-arrow"></i>
                    </a>
                    <!-- 二级子菜单 -->
                    <ul class="nav-sublist" th:if="${not #lists.isEmpty(menuItem.children)}">
                        <li class="nav-subitem" th:each="subItem : ${menuItem.children}" 
                            th:data-path="${subItem.status.href}"
                            th:data-fullpath="${currentPath}"
                            th:classappend="${subItem.status.href == currentPath} ? 'active'">
                            <a th:href="${subItem.status.href}" th:target="${subItem.spec.target?.value}">
                                <i th:if="${#annotations.contains(subItem, 'icon')}"
                                    th:class="${#annotations.get(subItem, 'icon')}"></i>
                                <i th:unless="${#annotations.contains(subItem, 'icon')}" class="czs czs-link-l"></i>
                                <span th:text="${subItem.status.displayName}"></span>
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </th:block>

        <!-- 没有自定义菜单：显示默认菜单 -->
        <th:block th:unless="${menu != null and not #lists.isEmpty(menu.menuItems)}">
            <ul class="nav-list">
                <li class="nav-item" data-path="/">
                    <a href="/"><i class="czs czs-home-l"></i>首页</a>
                </li>
                <li class="nav-item" data-path="/works">
                    <a href="/archives"><i class="czs-clothes-l"></i>作品</a>
                </li>
                <li class="nav-item" data-path="/code">
                    <a href="/archives"><i class="czs-code-l"></i>代码</a>
                </li>
                <li class="nav-item" data-path="/notes">
                    <a href="/archives"><i class="czs-gift-l"></i>随笔</a>
                </li>
            </ul>
        </th:block>
    </th:block>
    <script>
        (function() {
            var currentPath = window.location.pathname;
            
            // 处理一级菜单选中
            var navItems = document.querySelectorAll('.nav-item');
            for (var i = 0; i < navItems.length; i++) {
                var item = navItems[i];
                var itemPath = item.getAttribute('data-path');
                if (itemPath && currentPath === itemPath) {
                    item.classList.add('active');
                }
                if (itemPath === '/' && (currentPath === '/' || currentPath === '/index.html' || currentPath === '/index')) {
                    item.classList.add('active');
                }
            }
            
            // 处理二级子菜单选中
            var navSubItems = document.querySelectorAll('.nav-subitem');
            for (var j = 0; j < navSubItems.length; j++) {
                var subItem = navSubItems[j];
                var subPath = subItem.getAttribute('data-path');
                if (subPath && currentPath === subPath) {
                    subItem.classList.add('active');
                    var parent = subItem.closest('.nav-item');
                    if (parent) {
                        parent.classList.add('has-active-child');
                    }
                }
            }
        })();
    </script>
</div>
