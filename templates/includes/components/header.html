<header id="header" th:fragment="header">
    <!-- 左侧：LOGO -->
    <div class="fullname">
        <h1>
            <a th:href="${site.url}">[[${theme.config.basic.site_title} ?: '我的网站']]</a>
        </h1>
    </div>
    <!-- 右侧：搜索框 -->
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="请输入搜索内容...">
        <!-- 搜索图标 -->
        <div class="search-icon" id="searchIcon">
            <i class="czs czs-search-l"></i>
        </div>
        <div class="menu-icon " id="menuIcon">
            <i class="czs czs-menu-l"></i>
        </div>
    </div>
</header>
