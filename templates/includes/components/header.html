<header id="header" th:fragment="header" class="--bg-page dark:--bg-page-dark text-gray-600 dark:text-gray-400">
    <!-- 左侧：LOGO -->
    <div class="fullname">
        <h1>
            <a th:href="${site.url}" class="text-gray-900 dark:text-white">[[${theme.config.basic.site_title} ?:
                '我的网站']]</a>
        </h1>
    </div>
    <!-- 右侧：搜索框 -->
    <div class="search-box">
        <input type="text" id="searchInput"
            class="search-input bg-transparent dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600"
            placeholder="请输入搜索内容...">
        <!-- 搜索图标 -->
        <div class="search-icon text-gray-500 dark:text-gray-400" id="searchIcon">
            <i class="czs czs-search-l"></i>
        </div>
        <div class="menu-icon text-gray-500 dark:text-gray-400" id="menuIcon">
            <i class="czs czs-menu-l"></i>
        </div>
        <!-- 主题模式下拉选择 -->
        <div class="theme-dropdown" id="themeDropdown">
            <!-- 触发器按钮 -->
            <button class="theme-dropdown-trigger" id="themeDropdownTrigger" title="切换主题">
                <i class="czs czs-sun-l icon-sun"></i>
                <i class="czs czs-moon-l icon-moon" style="display:none;"></i>
                <i class="czs czs-clothes-l icon-auto" style="display:none;"></i>
            </button>
            <!-- 下拉菜单 -->
            <div class="theme-dropdown-menu" id="themeDropdownMenu" aria-hidden="true">
                <div class="theme-dropdown-item" data-mode="auto" id="themeOptAuto">
                    <span class="theme-opt-icon"><i class="czs czs-clothes-l"></i></span>
                    <span class="theme-opt-label">自动</span>
                    <span class="theme-opt-check"><i class="czs czs-check-l"></i></span>
                </div>
                <div class="theme-dropdown-item" data-mode="light" id="themeOptLight">
                    <span class="theme-opt-icon"><i class="czs czs-sun-l"></i></span>
                    <span class="theme-opt-label">浅色</span>
                    <span class="theme-opt-check"><i class="czs czs-check-l"></i></span>
                </div>
                <div class="theme-dropdown-item" data-mode="dark" id="themeOptDark">
                    <span class="theme-opt-icon"><i class="czs czs-moon-l"></i></span>
                    <span class="theme-opt-label">深色</span>
                    <span class="theme-opt-check"><i class="czs czs-check-l"></i></span>
                </div>
            </div>
        </div>
    </div>
</header>
