<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${site.title}"></title>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
  <!-- 打开搜索弹窗 -->
  <script>
    if (window.location.hash === '#open-search') {
      setTimeout(() => {
        if (window.SearchWidget) SearchWidget.open('');
      }, 100);
    }
  </script>
  <!-- Header 样式：防止遮挡内容 + 滚动隐藏 -->
  <style>
    #header {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      z-index: 1000;
      transition: transform 0.3s ease;
    }
    .container {
      margin-top: 100px !important;
    }
    #header.header-hidden {
      transform: translateY(-100%);
    }
  </style>
  <!-- Header 滚动隐藏脚本 -->
  <script>
    (function() {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      var ticking = false;
      
      function updateHeader() {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
        ticking = false;
      }
      
      window.addEventListener('scroll', function() {
        if (!ticking) {
          requestAnimationFrame(updateHeader);
          ticking = true;
        }
      }, { passive: true });
    })();
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
  <!-- 插入头部组件 -->
  <div th:replace="includes/components/header :: header"></div>
  <!-- 页面主体容器 -->
  <div class="container"
    th:with="allPosts=${postFinder.listAll()}, stats=${siteStatsFinder.getStats()}, hasPosts=${posts != null and !posts.items.isEmpty()}, momentsForHeatmap=${momentFinder != null ? momentFinder.list(1, 100) : null}, momentsList=${momentFinder != null ? momentFinder.list(1, 20) : null}">
    <!-- 左侧：窄栏（菜单 + 小组件） -->
    <aside class="sidebar" th:style="${theme.config.basic.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <!-- nav -->
      <div th:replace="includes/components/nav :: nav"></div>
      <!-- author card -->
      <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${allPosts.size()}, stats=${stats})"></div>
    </aside>
    <!-- 右侧：主内容大盒子 -->
    <div class="content">
      <div id="notes" class="notes-layout">
        <main class="notes-core">
          <div class="notes-tabbar sticky bg-blur">
            <ul class="tab global-list">
              <li class="tab-item" data-type="all">
                <a th:href="@{/}">文章</a>
              </li>
              <li class="tab-item" data-type="note" th:with="pluginInstalled=${momentFinder != null}">
                <a th:if="${pluginInstalled}" th:href="@{/moments}">笔记</a>
                <a th:unless="${pluginInstalled}" href="javascript:;" onclick="showPluginNotice()">笔记</a>
              </li>
            </ul>
          </div>

          <!-- 数据容器 -->
          <script th:inline="javascript">
            /*<![CDATA[*/
            var momentsData = /*[[${momentsList != null ? momentsList.items : {}}]]*/ {};
            window.momentsData = momentsData || [];
            /*]]>*/
          </script>

          <!-- 文章列表区域 -->
          <div class="article-list" id="articleList">
            <!-- 文章卡片列表 -->
            <th:block th:if="${hasPosts}" th:each="post : ${posts.items}">
              <div th:replace="includes/widgets/noteCard :: noteCard(
                type='post',
                title=${post.spec.title},
                excerpt=${post.status.excerpt},
                date=${post.spec.publishTime},
                cover=${post.spec.cover},
                permalink=${post.status.permalink},
                comments=${post.stats.comment}
              )"></div>
            </th:block>
            <!-- 空态提示 -->
            <div id="emptyState" class="empty-state" th:unless="${hasPosts}" style="display: none;">
              <p>暂无内容</p>
            </div>
            <!-- 瞬间卡片容器（JS 追加） -->
            <div id="momentsContainer"></div>
          </div>

          <!-- 分页 -->
          <div class="pagination" th:if="${hasPosts}">
            <span class="page-info">
              第 <span th:text="${posts.page}">1</span> 页，
              共 <span th:text="${posts.totalPages}">1</span> 页 ·
              <span th:text="${posts.total}">0</span> 篇文章
            </span>
            <div class="page-nav">
              <a class="page-prev" th:if="${posts.hasPrevious}" th:href="${posts.prevUrl}">← 上一页</a>
              <a class="page-next" th:if="${posts.hasNext}" th:href="${posts.nextUrl}">下一页 →</a>
            </div>
          </div>
        </main>
        <aside class="notes-aside"
          th:style="${theme.config.basic.right_sidebar_toggle == 'hide' ? 'display:none' : ''}">
          <div class="heatmap-box">
            <div th:replace="includes/widgets/heatmap :: heatmap(${null}, ${momentsForHeatmap})"></div>
          </div>
        </aside>
      </div>
    </div>
  </div>
  <!-- 页脚部分 -->
  <div th:replace="includes/components/footer :: footer"></div>
  <script>
    (function () {
      var path = window.location.pathname;
      var tabs = document.querySelectorAll('.notes-tabbar .tab-item');
      tabs.forEach(function (tab) {
        var link = tab.querySelector('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href) return;

        // 首页
        if (path === '/' || path === '' || path === '/index' || path === '/index.html') {
          if (href === '/' || href.endsWith('/')) {
            tab.classList.add('active');
          }
        }
        // 笔记页面
        else if (path.startsWith('/moments')) {
          if (href === '/moments') {
            tab.classList.add('active');
          }
        }
      });
    })();
  </script>

  <!-- 插件未安装提示弹窗 -->
  <div id="pluginNoticeModal" class="plugin-notice-modal" style="display: none;">
    <div class="plugin-notice-backdrop" onclick="closePluginNotice()"></div>
    <div class="plugin-notice-dialog">
      <button class="plugin-notice-close" onclick="closePluginNotice()">&times;</button>
      <div class="plugin-notice-icon">📦</div>
      <h3>请安装瞬间插件</h3>
      <p>笔记功能需要安装 <a href="https://www.halo.run/store/apps/app-SnwWD" target="_blank">瞬间插件</a> 才能正常使用</p>
      <p class="plugin-notice-hint">安装插件后，点击导航栏"笔记"即可查看瞬间</p>
    </div>
  </div>
  <script>
    function showPluginNotice() {
      document.getElementById('pluginNoticeModal').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }
    function closePluginNotice() {
      document.getElementById('pluginNoticeModal').style.display = 'none';
      document.body.style.overflow = '';
    }
    // ESC 关闭
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closePluginNotice();
    });
  </script>
</body>

</html>
