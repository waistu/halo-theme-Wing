<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章丨[[${site.title}]]</title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
  <script>
    if (window.location.hash === '#open-search') {
      setTimeout(() => { if (window.SearchWidget) SearchWidget.open(''); }, 100);
    }
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
  <!-- 插入头部组件 -->
  <div th:replace="includes/components/header :: header"></div>

  <!--
    自定义页面模板不自动注入 posts 变量，需要用 postFinder.list(page, size) 手动查询。
    用三层嵌套解决 th:with 内变量相互依赖的问题：
      第1层：解析 page 参数和 postsSlug（基础参数）
      第2层：用 postsPage 查询 postsList
      第3层：用 postsList 计算 hasPosts，渲染 container
  -->
  <th:block th:with="
      postsPage=${T(java.lang.Integer).parseInt(#strings.isEmpty(#strings.toString(param.page)) ? '1' : #strings.toString(param.page))},
      postsSlug=${theme.config.layout.posts_page_slug ?: 'posts'}
    ">
  <th:block th:with="postsList=${postFinder.list(postsPage, 10)}">
  <div class="container"
    th:with="
      allPosts=${postFinder.listAll()},
      stats=${siteStatsFinder.getStats()},
      hasPosts=${postsList != null and postsList.items != null and !postsList.items.isEmpty()},
      momentsForHeatmap=${momentFinder != null ? momentFinder.list(1, 100) : null}
    ">
    <!-- 左侧：窄栏（菜单 + 小组件） -->
    <aside class="sidebar" th:style="${theme.config.layout != null and theme.config.layout.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <div th:replace="includes/components/nav :: nav"></div>
      <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${allPosts.size()}, stats=${stats})"></div>
    </aside>

    <!-- 右侧：主内容大盒子 -->
    <div class="content">
      <div id="notes" class="notes-layout">
        <main class="notes-core">

          <!-- Tab 栏：笔记(/) 在前不高亮，文章（当前页）高亮 -->
          <div class="notes-tabbar sticky">
            <ul class="tab global-list">
              <li class="tab-item" data-type="note">
                <a th:href="@{/}" class="text-gray-700 dark:text-gray-300">笔记</a>
              </li>
              <li class="tab-item active" data-type="all">
                <a th:href="'/' + ${postsSlug}" class="text-gray-700 dark:text-gray-300">文章</a>
              </li>
            </ul>
          </div>

          <!-- 文章列表 -->
          <div class="article-list" id="articleList">
            <th:block th:if="${hasPosts}" th:each="post : ${postsList.items}">
              <div th:replace="includes/widgets/noteCard :: noteCard(
                type='post',
                title=${post.spec.title},
                excerpt=${post.status.excerpt},
                date=${post.spec.publishTime},
                cover=${post.spec.cover},
                permalink=${post.status.permalink},
                comments=${post.stats.comment}
              )"></div>
            </th:block>
            <div class="empty-state" th:unless="${hasPosts}">
              <p>暂无内容</p>
            </div>
          </div>

          <!-- 分页（使用查询参数形式 ?page=x，减少页码显示，确保按钮显示） -->
          <nav aria-label="Page navigation" class="pagination" th:if="${postsList.totalPages > 1}" style="justify-content: center;">
            <!-- 上一页 -->
            <a th:if="${postsList.page > 1}"
               th:href="@{/posts(page=${postsList.page - 1})}"
               class="pagination-previous">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd"/></svg>
              上一页
            </a>
            <span th:unless="${postsList.page > 1}" class="pagination-previous disabled">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd"/></svg>
              上一页
            </span>

            <!-- 页码：始终显示首页、末页，最多显示3个中间页码 -->
            <div class="pagination-list" style="justify-content: center;">
              <th:block th:if="${postsList.totalPages le 3}">
                <a th:each="i : ${#numbers.sequence(1, postsList.totalPages)}"
                   th:href="@{/posts(page=${i})}"
                   th:text="${i}"
                   th:class="${i == postsList.page} ? 'pagination-page current' : 'pagination-page'"></a>
              </th:block>
              <th:block th:if="${postsList.totalPages gt 3}">
                <!-- 首页 -->
                <a th:href="@{/posts(page=1)}" th:class="${postsList.page == 1} ? 'pagination-page current' : 'pagination-page'">1</a>
                <!-- 左边省略号 -->
                <span th:if="${postsList.page gt 2}" class="pagination-gap">…</span>
                <!-- 当前页及相邻页（最多3个） -->
                <th:block th:if="${postsList.page == 1}">
                  <a th:href="@{/posts(page=2)}" class="pagination-page">2</a>
                  <a th:href="@{/posts(page=3)}" class="pagination-page">3</a>
                </th:block>
                <th:block th:if="${postsList.page == 2}">
                  <a th:href="@{/posts(page=2)}" class="pagination-page current">2</a>
                  <a th:href="@{/posts(page=3)}" class="pagination-page">3</a>
                </th:block>
                <th:block th:if="${postsList.page == postsList.totalPages}">
                  <a th:href="@{/posts(page=${postsList.totalPages - 2})}" class="pagination-page" th:text="${postsList.totalPages - 2}"></a>
                  <a th:href="@{/posts(page=${postsList.totalPages - 1})}" class="pagination-page" th:text="${postsList.totalPages - 1}"></a>
                </th:block>
                <th:block th:if="${postsList.page == postsList.totalPages - 1}">
                  <a th:href="@{/posts(page=${postsList.page - 1})}" class="pagination-page" th:text="${postsList.page - 1}"></a>
                  <a th:href="@{/posts(page=${postsList.page})}" class="pagination-page current" th:text="${postsList.page}"></a>
                </th:block>
                <th:block th:if="${postsList.page gt 2 and postsList.page lt postsList.totalPages - 1}">
                  <a th:href="@{/posts(page=${postsList.page - 1})}" class="pagination-page" th:text="${postsList.page - 1}"></a>
                  <a th:href="@{/posts(page=${postsList.page})}" class="pagination-page current" th:text="${postsList.page}"></a>
                  <a th:href="@{/posts(page=${postsList.page + 1})}" class="pagination-page" th:text="${postsList.page + 1}"></a>
                </th:block>
                <!-- 右边省略号 -->
                <span th:if="${postsList.page lt postsList.totalPages - 1}" class="pagination-gap">…</span>
                <!-- 末页 -->
                <a th:href="@{/posts(page=${postsList.totalPages})}" th:class="${postsList.page == postsList.totalPages} ? 'pagination-page current' : 'pagination-page'" th:text="${postsList.totalPages}"></a>
              </th:block>
            </div>

            <!-- 下一页 -->
            <a th:if="${postsList.page < postsList.totalPages}"
               th:href="@{/posts(page=${postsList.page + 1})}"
               class="pagination-next">
              下一页
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
            </a>
            <span th:unless="${postsList.page < postsList.totalPages}" class="pagination-next disabled">
              下一页
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
            </span>
          </nav>

        </main>
        <aside class="notes-aside"
          th:style="${theme.config.layout != null and theme.config.layout.right_sidebar_toggle == 'hide' ? 'display:none' : ''}">
          <div class="heatmap-box">
            <div th:replace="includes/widgets/heatmap :: heatmap(${null}, ${momentsForHeatmap})"></div>
          </div>
        </aside>
      </div>
    </div>
  </div>
  </th:block>
  </th:block>

  <!-- 页脚部分 -->
  <div th:replace="includes/components/footer :: footer"></div>
</body>

</html>
