<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<body>

  <!-- 密码重置确认表单片段 -->
  <th:block th:fragment="form">

    <div class="login-card" data-border-beam data-beam-duration="8" data-beam-size="250">
      <!-- 左侧眼睛区域 -->
      <div class="login-card-left">
        <div class="eye-container">
          <div class="eye">
            <div class="pupil"></div>
          </div>
          <div class="eye">
            <div class="pupil"></div>
          </div>
        </div>
      </div>

      <!-- 右侧重置密码表单 -->
      <div class="login-card-right">
        <!-- Logo -->
        <div class="login-logo">
          <img th:if="${theme.config.style.login_logo != null and theme.config.style.login_logo != ''}"
            th:src="${theme.config.style.login_logo}" alt="Logo" />
          <div class="login-logo-text"
            th:unless="${theme.config.style.login_logo != null and theme.config.style.login_logo != ''}"
            th:text="${site.title}">站点标题</div>
        </div>

        <!-- 标题 -->
        <div class="login-title" data-i18n="reset.title">设置新密码</div>

        <!-- 错误提示 -->
        <div th:if="${param.error != null and param.error.size() > 0}" class="error-message">
          <span th:if="${param.error[0] == 'invalid-token'}" data-i18n="reset.error.invalid_token">链接已失效，请重新申请</span>
          <span th:if="${param.error[0] == 'token-expired'}" data-i18n="reset.error.token_expired">链接已过期，请重新申请</span>
          <span th:if="${param.error[0] == 'password-too-weak'}" data-i18n="reset.error.weak_password">密码强度不足，请设置更复杂的密码</span>
          <span
            th:unless="${param.error[0] == 'invalid-token' or param.error[0] == 'token-expired' or param.error[0] == 'password-too-weak'}"
            data-i18n="reset.error.general">操作失败，请重试</span>
        </div>

        <!-- 成功提示 -->
        <div th:if="${param.success != null and param.success.size() > 0}" class="success-message" data-i18n="reset.success">
          密码重置成功，请使用新密码登录
        </div>

        <!-- 重置密码表单（成功时不显示） -->
        <th:block th:unless="${param.success != null and param.success.size() > 0}">
          <form class="login-form" id="reset-password-form" th:action="@{/password-reset/email/reset}" method="post">
            <!-- CSRF Token -->
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- 新密码 -->
            <div class="form-group">
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-input"
                  data-i18n-attr="placeholder:placeholder.new_password"
                  placeholder="请输入新密码"
                  required
                  autocomplete="new-password"
                  maxlength="257"
                />
                <button type="button" class="password-toggle" id="password-toggle" aria-label="显示/隐藏密码">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                  </svg>
                </button>
              </div>
              <!-- 密码强度提示 -->
              <div class="password-strength" id="password-strength">
                <div class="strength-bar">
                  <div class="strength-fill" id="strength-fill"></div>
                </div>
                <span class="strength-text" id="strength-text"></span>
              </div>
            </div>

            <!-- 确认新密码 -->
            <div class="form-group">
              <div class="password-wrapper">
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  class="form-input"
                  data-i18n-attr="placeholder:placeholder.confirm_password"
                  placeholder="请再次输入新密码"
                  required
                  autocomplete="new-password"
                  maxlength="257"
                />
                <button type="button" class="password-toggle" id="confirm-toggle" aria-label="显示/隐藏密码">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                      d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z" />
                  </svg>
                </button>
              </div>
              <div class="input-hint" id="confirm-password-hint" style="display: none;"></div>
            </div>

            <!-- 提交按钮 -->
            <button type="submit" class="login-btn" data-i18n="reset.btn">确认重置</button>
          </form>
        </th:block>

        <!-- 成功时显示：返回登录按钮 -->
        <th:block th:if="${param.success != null and param.success.size() > 0}">
          <div class="login-reset-row" style="justify-content: center; margin-top: 8px;">
            <a th:href="@{/login}" class="login-btn" data-i18n="reset.back_login">前往登录</a>
          </div>
        </th:block>

        <!-- 返回登录 -->
        <th:block th:unless="${param.success != null and param.success.size() > 0}">
          <div class="login-reset-row">
            <a th:href="@{/login}" class="login-reset-link" data-i18n="reset.back_login">返回登录</a>
          </div>
        </th:block>

        <!-- 语言切换 -->
        <div class="login-lang-switcher">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path
              d="M12.87 15.07l-2.54-2.51.03-.03A17.5 17.5 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35C8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2zm-2.62 7l1.62-4.33L19.12 17z" />
          </svg>
          <select id="lang-select">
            <option value="en" th:selected="${#locale.toLanguageTag() == 'en'}">English</option>
            <option value="zh-CN" th:selected="${#locale.toLanguageTag() == 'zh-CN'}">简体中文</option>
            <option value="zh-TW" th:selected="${#locale.toLanguageTag() == 'zh-TW'}">繁体中文</option>
            <option value="ja" th:selected="${#locale.toLanguageTag() == 'ja'}">日本語</option>
          </select>
        </div>

        <!-- 底部链接 -->
        <div class="login-footer">
          <a th:href="@{/}" class="login-link" data-i18n="home">返回首页</a>
        </div>
      </div>
    </div>

    <!-- 国际化 + 密码强度脚本 -->
    <script th:inline="javascript">
      (function () {
        'use strict';

        var i18n = {
          'zh-CN': {
            'placeholder.new_password': '请输入新密码',
            'placeholder.confirm_password': '请再次输入新密码',
            'reset.title': '设置新密码',
            'reset.btn': '确认重置',
            'reset.back_login': '返回登录',
            'reset.success': '密码重置成功，请使用新密码登录',
            'home': '返回首页',
            'signup.strength_weak': '弱',
            'signup.strength_medium': '中等',
            'signup.strength_strong': '强',
            'signup.password_mismatch': '两次输入的密码不一致',
            'reset.error.invalid_token': '链接已失效，请重新申请',
            'reset.error.token_expired': '链接已过期，请重新申请',
            'reset.error.weak_password': '密码强度不足，请设置更复杂的密码',
            'reset.error.general': '操作失败，请重试'
          },
          'en': {
            'placeholder.new_password': 'Enter new password',
            'placeholder.confirm_password': 'Confirm new password',
            'reset.title': 'Set New Password',
            'reset.btn': 'Reset Password',
            'reset.back_login': 'Back to login',
            'reset.success': 'Password reset successfully. Please log in with your new password.',
            'home': 'Back to home',
            'signup.strength_weak': 'Weak',
            'signup.strength_medium': 'Medium',
            'signup.strength_strong': 'Strong',
            'signup.password_mismatch': 'Passwords do not match',
            'reset.error.invalid_token': 'The link is invalid. Please request a new one.',
            'reset.error.token_expired': 'The link has expired. Please request a new one.',
            'reset.error.weak_password': 'Password is too weak. Please use a stronger password.',
            'reset.error.general': 'Operation failed, please try again.'
          },
          'zh-TW': {
            'placeholder.new_password': '請輸入新密碼',
            'placeholder.confirm_password': '請再次輸入新密碼',
            'reset.title': '設定新密碼',
            'reset.btn': '確認重置',
            'reset.back_login': '返回登入',
            'reset.success': '密碼重置成功，請使用新密碼登入',
            'home': '返回首頁',
            'signup.strength_weak': '弱',
            'signup.strength_medium': '中等',
            'signup.strength_strong': '強',
            'signup.password_mismatch': '兩次輸入的密碼不一致',
            'reset.error.invalid_token': '鏈接已失效，請重新申請',
            'reset.error.token_expired': '鏈接已過期，請重新申請',
            'reset.error.weak_password': '密碼強度不足，請設置更複雜的密碼',
            'reset.error.general': '操作失敗，請重試'
          },
          'ja': {
            'placeholder.new_password': '新しいパスワードを入力',
            'placeholder.confirm_password': 'パスワード確認',
            'reset.title': '新しいパスワードを設定',
            'reset.btn': 'リセットする',
            'reset.back_login': 'ログインに戻る',
            'reset.success': 'パスワードがリセットされました。新しいパスワードでログインしてください。',
            'home': 'ホームに戻る',
            'signup.strength_weak': '弱い',
            'signup.strength_medium': '普通',
            'signup.strength_strong': '強い',
            'signup.password_mismatch': 'パスワードが一致しません',
            'reset.error.invalid_token': 'リンクが無効です。再度リクエストしてください。',
            'reset.error.token_expired': 'リンクの有効期限が切れています。再度リクエストしてください。',
            'reset.error.weak_password': 'パスワードの強度が弱いです。より複雑なパスワードを設定してください。',
            'reset.error.general': '操作に失敗しました。もう一度お試しください。'
          }
        };

        function getCurrentLang() {
          var urlParams = new URLSearchParams(window.location.search);
          var langParam = urlParams.get('lang');
          if (langParam && i18n[langParam]) return langParam;
          var savedLang = localStorage.getItem('login-lang');
          if (savedLang && i18n[savedLang]) return savedLang;
          return 'zh-CN';
        }

        function t(key) {
          var lang = getCurrentLang();
          return (i18n[lang] && i18n[lang][key]) || (i18n['zh-CN'] && i18n['zh-CN'][key]) || key;
        }

        function updateTranslations() {
          var lang = getCurrentLang();
          localStorage.setItem('login-lang', lang);
          var langSelect = document.getElementById('lang-select');
          if (langSelect) langSelect.value = lang;
          document.querySelectorAll('[data-i18n]').forEach(function (el) {
            el.textContent = t(el.getAttribute('data-i18n'));
          });
          document.querySelectorAll('[data-i18n-attr]').forEach(function (el) {
            var attrConfig = el.getAttribute('data-i18n-attr');
            var parts = attrConfig.split(':');
            if (parts.length === 2) {
              el.setAttribute(parts[0], t(parts[1]));
            }
          });
        }

        function switchLang(lang) {
          var url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          window.location.href = url.toString();
        }

        // 密码显示/隐藏切换
        function initPasswordToggles() {
          var toggles = document.querySelectorAll('.password-toggle');
          toggles.forEach(function (toggle) {
            toggle.addEventListener('click', function () {
              var input = this.closest('.password-wrapper').querySelector('input');
              if (!input) return;
              var type = input.getAttribute('type') === 'password' ? 'text' : 'password';
              input.setAttribute('type', type);
              var svg = this.querySelector('svg');
              if (type === 'text') {
                svg.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
              } else {
                svg.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
              }
            });
          });
        }

        // 密码强度检测
        function checkPasswordStrength(password) {
          var score = 0;
          if (!password) return 0;
          if (password.length >= 8) score++;
          if (password.length >= 12) score++;
          if (/[A-Z]/.test(password)) score++;
          if (/[a-z]/.test(password)) score++;
          if (/[0-9]/.test(password)) score++;
          if (/[^A-Za-z0-9]/.test(password)) score++;
          return Math.min(score, 3);
        }

        function updateStrengthUI(score) {
          var fill = document.getElementById('strength-fill');
          var text = document.getElementById('strength-text');
          if (!fill || !text) return;
          var colors = ['', '#ef4444', '#f59e0b', '#16a34a'];
          var labels = ['', t('signup.strength_weak'), t('signup.strength_medium'), t('signup.strength_strong')];
          var widths = ['0%', '33%', '66%', '100%'];
          fill.style.width = widths[score] || '0%';
          fill.style.background = colors[score] || '';
          text.textContent = labels[score] || '';
        }

        // 确认密码检查
        function checkConfirmPassword() {
          var pw = document.getElementById('password');
          var cpw = document.getElementById('confirmPassword');
          var hint = document.getElementById('confirm-password-hint');
          if (!pw || !cpw || !hint) return;
          if (cpw.value && pw.value !== cpw.value) {
            hint.textContent = t('signup.password_mismatch');
            hint.style.display = 'block';
            hint.className = 'input-hint error';
          } else if (cpw.value) {
            hint.style.display = 'none';
            hint.className = 'input-hint';
          }
        }

        // 表单提交校验
        function initFormValidation() {
          var form = document.getElementById('reset-password-form');
          if (!form) return;
          form.addEventListener('submit', function (e) {
            var pw = document.getElementById('password');
            var cpw = document.getElementById('confirmPassword');
            if (pw && cpw && pw.value !== cpw.value) {
              e.preventDefault();
              var hint = document.getElementById('confirm-password-hint');
              if (hint) {
                hint.textContent = t('signup.password_mismatch');
                hint.style.display = 'block';
                hint.className = 'input-hint error';
              }
              cpw.focus();
            }
          });
        }

        // 眼睛跟随鼠标
        function initEyeTracking() {
          var eyeContainer = document.querySelector('.eye-container');
          var pupils = document.querySelectorAll('.pupil');
          if (!eyeContainer || pupils.length === 0) return;
          var maxMove = 8;
          document.addEventListener('mousemove', function (e) {
            pupils.forEach(function (pupil) {
              var rect = pupil.parentElement.getBoundingClientRect();
              var dx = e.clientX - (rect.left + rect.width / 2);
              var dy = e.clientY - (rect.top + rect.height / 2);
              var angle = Math.atan2(dy, dx);
              var distance = Math.min(Math.sqrt(dx * dx + dy * dy), maxMove);
              pupil.style.transform = 'translate(' + (Math.cos(angle) * distance) + 'px, ' + (Math.sin(angle) * distance) + 'px)';
            });
          });
        }

        document.addEventListener('DOMContentLoaded', function () {
          updateTranslations();
          initPasswordToggles();
          initEyeTracking();
          initFormValidation();

          var pwInput = document.getElementById('password');
          if (pwInput) {
            pwInput.addEventListener('input', function () {
              updateStrengthUI(checkPasswordStrength(this.value));
            });
          }

          var cpwInput = document.getElementById('confirmPassword');
          if (cpwInput) {
            cpwInput.addEventListener('input', checkConfirmPassword);
          }

          var langSelect = document.getElementById('lang-select');
          if (langSelect) {
            langSelect.addEventListener('change', function () {
              switchLang(this.value);
            });
          }
        });
      })();
    </script>
  </th:block>

</body>
</html>
