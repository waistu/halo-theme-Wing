<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<body>

  <!-- 找回密码表单片段 -->
  <th:block th:fragment="form(sent)">

    <div class="login-card" data-border-beam data-beam-duration="5" data-beam-size="200">
      <!-- 左侧眼睛区域 -->
      <div class="login-card-left">
        <div class="eye-container">
          <div class="eye">
            <div class="pupil"></div>
          </div>
          <div class="eye">
            <div class="pupil"></div>
          </div>
        </div>
      </div>

      <!-- 右侧找回密码表单 -->
      <div class="login-card-right">
        <!-- Logo -->
        <div class="login-logo">
          <img th:if="${theme.config.style.login_logo != null and theme.config.style.login_logo != ''}"
            th:src="${theme.config.style.login_logo}" alt="Logo" />
          <div class="login-logo-text"
            th:unless="${theme.config.style.login_logo != null and theme.config.style.login_logo != ''}"
            th:text="${site.title}">站点标题</div>
        </div>

    <!-- 发送成功后显示（官方用 ${sent} 判断） -->
    <th:block th:if="${sent}">
      <div id="success-view">
        <h2 class="reset-title" data-i18n="reset.success_title">发送成功</h2>
        <p class="reset-desc" data-i18n="reset.success_desc">请查收您的邮箱，按照邮件中的链接重置密码。</p>
      </div>
    </th:block>

    <!-- 发送表单（默认显示） -->
    <th:block th:unless="${sent}">
      <!-- 错误提示 -->
      <div class="alert alert-error" th:if="${param.error.size() > 0}" style="display: none;" id="error-alert">
        <span data-i18n="reset.error">发送失败，请重试</span>
      </div>

      <form class="login-form" id="reset-form" th:action="@{/password-reset/email}" method="post">
        <!-- CSRF Token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- 邮箱输入框 -->
        <div class="form-group">
          <input type="email" id="email" name="email" class="form-input"
            data-i18n-attr="placeholder:placeholder.email" placeholder="请输入注册邮箱" required
            autofocus autocomplete="email" />
        </div>

        <!-- 发送按钮 -->
        <button type="submit" class="login-btn" data-i18n="reset.send">发送重置链接</button>
      </form>
    </th:block>

        <!-- 返回登录 -->
        <div class="login-reset-row">
          <a th:href="@{/login}" class="login-reset-link" data-i18n="reset.back_login">返回登录</a>
        </div>

        <!-- 语言切换 -->
        <div class="login-lang-switcher">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path
              d="M12.87 15.07l-2.54-2.51.03-.03A17.5 17.5 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35C8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2zm-2.62 7l1.62-4.33L19.12 17z" />
          </svg>
          <select id="lang-select">
            <option value="en" th:selected="${#locale.toLanguageTag() == 'en'}">English</option>
            <option value="zh-CN" th:selected="${#locale.toLanguageTag() == 'zh-CN'}">简体中文</option>
            <option value="zh-TW" th:selected="${#locale.toLanguageTag() == 'zh-TW'}">繁体中文</option>
            <option value="ja" th:selected="${#locale.toLanguageTag() == 'ja'}">日本語</option>
          </select>
        </div>

        <!-- 底部链接 -->
        <div class="login-footer">
          <a th:href="@{/}" class="login-link" data-i18n="home">返回首页</a>
        </div>
      </div>
    </div>

    <!-- 国际化脚本 -->
    <script th:inline="javascript">
      (function () {
        'use strict';

        // ========== 国际化配置 ==========
        const i18n = {
          'zh-CN': {
            'reset.send': '发送重置链接',
            'reset.back_login': '返回登录',
            'reset.success_title': '发送成功',
            'reset.success_desc': '请查收您的邮箱，按照邮件中的链接重置密码。',
            'reset.error': '发送失败，请重试',
            'placeholder.email': '请输入注册邮箱',
            'home': '返回首页'
          },
          'en': {
            'reset.send': 'Send Reset Link',
            'reset.back_login': 'Back to Login',
            'reset.success_title': 'Email Sent',
            'reset.success_desc': 'Please check your email and follow the link to reset your password.',
            'reset.error': 'Failed to send, please try again',
            'placeholder.email': 'Enter your registered email',
            'home': 'Back to home'
          },
          'zh-TW': {
            'reset.send': '發送重置鏈接',
            'reset.back_login': '返回登入',
            'reset.success_title': '發送成功',
            'reset.success_desc': '請查收您的郵箱，按照郵件中的鏈接重置密碼。',
            'reset.error': '發送失敗，請重試',
            'placeholder.email': '請輸入註冊郵箱',
            'home': '返回首頁'
          },
          'ja': {
            'reset.send': 'リセットリンクを送信',
            'reset.back_login': 'ログインに戻る',
            'reset.success_title': '送信完了',
            'reset.success_desc': 'メールをご確認ください。メール内のリンクからパスワードをリセットしてください。',
            'reset.error': '送信に失敗しました。再試行してください',
            'placeholder.email': '登録したメールアドレスを入力',
            'home': 'ホームに戻る'
          }
        };

        // 获取当前语言
        function getCurrentLang() {
          const urlParams = new URLSearchParams(window.location.search);
          const langParam = urlParams.get('lang');
          if (langParam && i18n[langParam]) {
            return langParam;
          }
          const savedLang = localStorage.getItem('login-lang');
          if (savedLang && i18n[savedLang]) {
            return savedLang;
          }
          return 'zh-CN';
        }

        // 翻译函数
        function t(key) {
          const lang = getCurrentLang();
          return i18n[lang][key] || i18n['zh-CN'][key] || key;
        }

        // 更新页面翻译
        function updateTranslations() {
          const lang = getCurrentLang();
          localStorage.setItem('login-lang', lang);

          const langSelect = document.getElementById('lang-select');
          if (langSelect) {
            langSelect.value = lang;
          }

          document.querySelectorAll('[data-i18n]').forEach(function(el) {
            const key = el.getAttribute('data-i18n');
            el.textContent = t(key);
          });

          document.querySelectorAll('[data-i18n-attr]').forEach(function(el) {
            const attrConfig = el.getAttribute('data-i18n-attr');
            const [attr, key] = attrConfig.split(':');
            if (attr && key) {
              el.setAttribute(attr, t(key));
            }
          });
        }

        // 语言切换
        function switchLang(lang) {
          const url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          window.location.href = url.toString();
        }

        // 绑定语言选择器事件
        const langSelect = document.getElementById('lang-select');
        if (langSelect) {
          langSelect.addEventListener('change', function() {
            switchLang(this.value);
          });
        }

        // ========== 眼睛跟随鼠标效果 ==========
        const eyeContainer = document.querySelector('.eye-container');
        const pupils = document.querySelectorAll('.pupil');

        if (eyeContainer && pupils.length > 0) {
          const maxMove = 8;

          function updatePupils(e) {
            pupils.forEach(pupil => {
              const rect = pupil.parentElement.getBoundingClientRect();
              const eyeCenterX = rect.left + rect.width / 2;
              const eyeCenterY = rect.top + rect.height / 2;

              const dx = e.clientX - eyeCenterX;
              const dy = e.clientY - eyeCenterY;

              const angle = Math.atan2(dy, dx);
              const distance = Math.min(Math.sqrt(dx * dx + dy * dy), maxMove);

              const moveX = Math.cos(angle) * distance;
              const moveY = Math.sin(angle) * distance;

              pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
          }

          document.addEventListener('mousemove', updatePupils);
        }

        // 页面加载完成后应用翻译
        document.addEventListener('DOMContentLoaded', function() {
          updateTranslations();

          // 检测 URL 中的 error 参数
          const urlParams = new URLSearchParams(window.location.search);
          if (urlParams.has('error')) {
            const errorAlert = document.getElementById('error-alert');
            if (errorAlert) errorAlert.style.display = 'block';
          }
        });
      })();
    </script>

  </th:block>

</body>

</html>
