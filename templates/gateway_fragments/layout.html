<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="https://www.thymeleaf.org" th:fragment="layout (title,head,body)">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title}">登录</title>

  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme}"></th:block>

  <!-- 主题初始化（防闪烁） -->
  <th:block th:replace="~{includes/head/theme-init}"></th:block>

  <!-- 主题主样式（包含 CSS 变量定义 + gateway 样式） -->
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />

  <!-- Magic UI  -->
  <link rel="stylesheet" th:href="@{/assets/vendor/magic-ui/border-beam.css}" />
  <link rel="stylesheet" th:href="@{/assets/vendor/magic-ui/ripple.css}" />
  <link rel="stylesheet" th:href="@{/assets/vendor/magic-ui/meteors.css}" />

  <!-- 自定义头部内容 -->
  <th:block th:if="${head != null}">
    <th:block th:replace="${head}" />
  </th:block>
</head>

<body>
  <div class="login-page" data-ripple data-ripple-gap="150" data-ripple-opacity="0.95" data-ripple-count="12"
    th:classappend="${theme.config.style.login_bg_image != null and theme.config.style.login_bg_image != ''} ? 'has-bg-image' : ''"
    th:style="${theme.config.style.login_bg_image != null and theme.config.style.login_bg_image != ''} ? 'background-image: url(' + ${theme.config.style.login_bg_image} + ')' : ''">
    <th:block th:replace="${body}" />
  </div>

  <!-- Magic UI -->
  <script th:src="@{/assets/vendor/magic-ui/border-beam.js}"></script>
  <script th:src="@{/assets/vendor/magic-ui/ripple.js}"></script>
  <script th:src="@{/assets/vendor/magic-ui/meteors.js}"></script>
  <script>
    // JS 方式初始化
    document.addEventListener('DOMContentLoaded', () => {
      // 蓝色主题 - JS 初始化
      new Ripple(document.getElementById('blue-ripple'), {
        mainCircleSize: 250,
        mainCircleOpacity: 0.2,
        numCircles: 7,
        borderColor: 'rgba(59, 130, 246, 0.35)',
        duration: 4,
      });
    });
  </script>
</body>

</html>
