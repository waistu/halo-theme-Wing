<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档丨[[${site.title}]]</title>
  <!-- 防闪烁脚本：在 CSS 加载前应用深色模式 -->
  <script>try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
  <style>
    /* 防止页面加载时的闪烁 - 使用 CSS 变量 */
    html { background-color: var(--bg-page, #f9fafb); }
    html.dark { background-color: var(--bg-page-dark, #111827); }
    body { background-color: var(--bg-page, #f9fafb); color: var(--text-secondary, #4b5563); }
    html.dark body { background-color: var(--bg-page-dark, #111827); color: var(--text-secondary-dark, #d1d5db); }
  </style>
  <script>
    if (window.location.hash === '#open-search') {
      setTimeout(() => {
        if (window.SearchWidget) SearchWidget.open('');
      }, 100);
    }
  </script>
  <!-- Header 滚动隐藏脚本 -->
  <script>
    (function() {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      window.onscroll = function() {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
      };
    })();
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
  <div th:replace="includes/components/header :: header"></div>

  <div class="container">
    <aside class="sidebar" th:with="stats=${siteStatsFinder.getStats()}">
      <div th:replace="includes/components/nav :: nav"></div>
      <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
      </div>
    </aside>

    <div class="content">
      <div class="tags-wrapper">
        <div class="page-header">
          <h1 class="tags-title">文章归档</h1>
        </div>

        <div class="archives-content">
          <th:block th:each="archive : ${archives.items}">
            <h1 class="archive-year-title">
              <span class="year-text" th:text="${archive.year}"></span>
            </h1>
            <ul class="archive-list">
              <th:block th:each="month : ${archive.months}">
                <li th:each="post : ${month.posts}">
                  <a th:href="@{${post.status.permalink}}">
                    <span th:text="${post.spec.title}"></span>
                    <span class="archive-date" th:text="${#strings.substring(post.spec.publishTime, 5, 10)}"></span>
                  </a>
                </li>
              </th:block>
            </ul>
          </th:block>
        </div>

        <!-- 分页 -->
        <div th:replace="includes/components/pagination :: simple-pagination(
               page=${archives.page},
               totalPages=${archives.totalPages},
               baseUrl=@{/archives}
             )"></div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var yearTitles = document.querySelectorAll('.archive-year-title');
      var archiveLists = document.querySelectorAll('.archive-list');
      yearTitles.forEach(function (title, index) {
        var count = 0;
        if (archiveLists[index]) {
          var lis = archiveLists[index].querySelectorAll('li');
          count = lis.length;
        }
        if (count > 0) {
          title.innerHTML += '<span class="year-count">' + count + '</span>';
        }
      });
    });
  </script>

  <div th:replace="includes/components/footer :: footer"></div>
</body>

</html>
