<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>归档丨[[${site.title}]]</title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
  <script>
    if (window.location.hash === '#open-search') {
      setTimeout(() => {
        if (window.SearchWidget) SearchWidget.open('');
      }, 100);
    }
  </script>
  <!-- Header 滚动隐藏脚本 -->
  <script>
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
  <div th:replace="includes/components/header :: header"></div>

  <div class="container">
    <aside class="sidebar" th:with="stats=${siteStatsFinder.getStats()}" th:style="${theme.config.layout.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <div th:replace="includes/components/nav :: nav"></div>
      <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
      </div>
    </aside>

    <div class="content">
      <div class="tags-wrapper">
        <div class="page-header">
          <h1 class="tags-title">文章归档</h1>
        </div>

        <div class="archives-content">
          <th:block th:each="archive : ${archives.items}">
            <div class="archive-wrapper">
              <h1 class="archive-year-title">
                <span class="year-text" th:text="${archive.year}"></span>
              </h1>
              <ul class="archive-list">
                <th:block th:each="month : ${archive.months}">
                  <li th:each="post : ${month.posts}">
                    <a th:href="@{${post.status.permalink}}" class="archive-card">
                      <th:block th:with="defaultCover=${theme.config.style?.default_cover}">
                        <th:block th:if="${not #strings.isEmpty(post.spec.cover)}">
                          <div class="archive-cover">
                            <img th:src="${post.spec.cover}" alt="封面">
                          </div>
                        </th:block>
                        <th:block th:if="${#strings.isEmpty(post.spec.cover) and not #strings.isEmpty(defaultCover)}">
                          <div class="archive-cover">
                            <img th:src="${defaultCover}" alt="封面">
                          </div>
                        </th:block>
                      </th:block>
                      <div class="archive-content">
                        <div class="archive-title-row">
                          <span class="archive-title" th:text="${post.spec.title}"></span>
                          <span class="archive-date" th:text="${#strings.substring(post.spec.publishTime, 5, 10)}"></span>
                        </div>
                        <p class="archive-excerpt" th:text="${not #strings.isEmpty(post.status.excerpt) ? post.status.excerpt : #strings.abbreviate(post.spec.title, 50)}"></p>
                      </div>
                    </a>
                  </li>
                </th:block>
              </ul>
            </div>
          </th:block>
        </div>

        <!-- 分页：archives.page 从 0 开始 -->
        <nav aria-label="Page navigation" class="pagination" th:if="${archives.totalPages > 1}"
             th:with="cp=${archives.page + 1}">
          <!-- 上一页 -->
          <a th:if="${archives.hasPrevious}"
             th:href="${archives.prevUrl}"
             class="pagination-previous">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd"/></svg>
            上一页
          </a>
          <span th:unless="${archives.hasPrevious}" class="pagination-previous disabled">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M9.78 4.22a.75.75 0 0 1 0 1.06L7.06 8l2.72 2.72a.75.75 0 1 1-1.06 1.06L5.47 8.53a.75.75 0 0 1 0-1.06l3.25-3.25a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd"/></svg>
            上一页
          </span>

          <!-- 移动端分页：最多显示 4 个页码 -->
          <div class="pagination-list sm:hidden" style="justify-content: center;">
            <th:block th:if="${archives.totalPages le 4}">
              <th:block th:each="i : ${#numbers.sequence(1, archives.totalPages)}">
                <a th:href="${i == 1} ? @{/archives} : @{/archives/page/{page}(page=${i})}"
                   th:text="${i}"
                   th:class="${i == cp} ? 'pagination-page current' : 'pagination-page'"></a>
              </th:block>
            </th:block>
            <th:block th:if="${archives.totalPages gt 4}">
              <!-- 首页 -->
              <a th:href="@{/archives}" th:class="${cp == 1} ? 'pagination-page current' : 'pagination-page'">1</a>
              <!-- 当前页 = 1：显示 2, 3 -->
              <th:block th:if="${cp == 1}">
                <span class="pagination-gap">…</span>
                <a th:href="@{/archives/page/2}" class="pagination-page">2</a>
                <a th:href="@{/archives/page/3}" class="pagination-page">3</a>
              </th:block>
              <!-- 当前页 = 2：显示 2, 3, 4 -->
              <th:block th:if="${cp == 2}">
                <span class="pagination-gap">…</span>
                <a th:href="@{/archives/page/2}" class="pagination-page current">2</a>
                <a th:href="@{/archives/page/3}" class="pagination-page">3</a>
                <a th:href="@{/archives/page/4}" class="pagination-page">4</a>
              </th:block>
              <!-- 当前页在中间（3 ~ total-2） -->
              <th:block th:if="${cp ge 3 and cp le archives.totalPages - 2}">
                <span class="pagination-gap">…</span>
                <a th:href="@{/archives/page/{page}(page=${cp - 1})}" class="pagination-page" th:text="${cp - 1}"></a>
                <a th:href="@{/archives/page/{page}(page=${cp})}" class="pagination-page current" th:text="${cp}"></a>
                <a th:href="@{/archives/page/{page}(page=${cp + 1})}" class="pagination-page" th:text="${cp + 1}"></a>
                <span class="pagination-gap">…</span>
              </th:block>
              <!-- 当前页 = total-1：显示 total-2, total-1, total -->
              <th:block th:if="${cp == archives.totalPages - 1}">
                <span class="pagination-gap">…</span>
                <a th:href="@{/archives/page/{page}(page=${cp - 1})}" class="pagination-page" th:text="${cp - 1}"></a>
                <a th:href="@{/archives/page/{page}(page=${cp})}" class="pagination-page current" th:text="${cp}"></a>
                <a th:href="@{/archives/page/{page}(page=${cp + 1})}" class="pagination-page" th:text="${cp + 1}"></a>
              </th:block>
              <!-- 当前页 = total -->
              <th:block th:if="${cp == archives.totalPages}">
                <span class="pagination-gap">…</span>
                <a th:href="@{/archives/page/{page}(page=${cp - 2})}" class="pagination-page" th:text="${cp - 2}"></a>
                <a th:href="@{/archives/page/{page}(page=${cp - 1})}" class="pagination-page" th:text="${cp - 1}"></a>
                <a th:href="@{/archives/page/{page}(page=${cp})}" class="pagination-page current" th:text="${cp}"></a>
              </th:block>
            </th:block>
          </div>

          <!-- PC 端分页：最多显示 7 个页码 -->
          <div class="pagination-list hidden md:flex" style="justify-content: center;">
            <th:block th:if="${archives.totalPages le 7}">
              <th:block th:each="i : ${#numbers.sequence(1, archives.totalPages)}">
                <a th:href="${i == 1} ? @{/archives} : @{/archives/page/{page}(page=${i})}"
                   th:text="${i}"
                   th:class="${i == cp} ? 'pagination-page current' : 'pagination-page'"></a>
              </th:block>
            </th:block>
            <th:block th:if="${archives.totalPages gt 7}">
              <!-- 首页 -->
              <a th:href="@{/archives}" th:class="${cp == 1} ? 'pagination-page current' : 'pagination-page'">1</a>
              <!-- 当前页在前 4 页 -->
              <th:block th:if="${cp le 4}">
                <span class="pagination-gap">…</span>
                <th:block th:each="i : ${#numbers.sequence(2, 5)}">
                  <a th:href="@{/archives/page/{page}(page=${i})}" th:text="${i}" th:class="${i == cp} ? 'pagination-page current' : 'pagination-page'"></a>
                </th:block>
                <span class="pagination-gap">…</span>
              </th:block>
              <!-- 当前页在中间 -->
              <th:block th:if="${cp ge 5 and cp le archives.totalPages - 4}">
                <span class="pagination-gap">…</span>
                <th:block th:each="i : ${#numbers.sequence(cp - 2, cp + 2)}">
                  <a th:href="@{/archives/page/{page}(page=${i})}" th:text="${i}" th:class="${i == cp} ? 'pagination-page current' : 'pagination-page'"></a>
                </th:block>
                <span class="pagination-gap">…</span>
              </th:block>
              <!-- 当前页在后 4 页 -->
              <th:block th:if="${cp gt archives.totalPages - 4}">
                <span class="pagination-gap">…</span>
                <th:block th:each="i : ${#numbers.sequence(archives.totalPages - 4, archives.totalPages - 1)}">
                  <a th:href="@{/archives/page/{page}(page=${i})}" th:text="${i}" th:class="${i == cp} ? 'pagination-page current' : 'pagination-page'"></a>
                </th:block>
              </th:block>
              <!-- 末页 -->
              <a th:href="@{/archives/page/{page}(page=${archives.totalPages})}" th:class="${cp == archives.totalPages} ? 'pagination-page current' : 'pagination-page'" th:text="${archives.totalPages}"></a>
            </th:block>
          </div>

          <!-- 下一页 -->
          <a th:if="${archives.hasNext}"
             th:href="${archives.nextUrl}"
             class="pagination-next">
            下一页
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </a>
          <span th:unless="${archives.hasNext}" class="pagination-next disabled">
            下一页
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" style="width:1em;height:1em;flex-shrink:0"><path fill-rule="evenodd" d="M6.22 4.22a.75.75 0 0 1 1.06 0l3.25 3.25a.75.75 0 0 1 0 1.06l-3.25 3.25a.75.75 0 0 1-1.06-1.06L8.94 8 6.22 5.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
          </span>
        </nav>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var wrappers = document.querySelectorAll('.archive-wrapper');
      wrappers.forEach(function (wrapper) {
        var yearTitle = wrapper.querySelector('.archive-year-title');
        var archiveList = wrapper.querySelector('.archive-list');
        var count = 0;
        if (archiveList) {
          var lis = archiveList.querySelectorAll('li');
          count = lis.length;
        }
        if (count > 0 && yearTitle) {
          yearTitle.innerHTML += '<span class="year-count">' + count + '</span>';
        }
      });
    });
  </script>

  <div th:replace="includes/components/footer :: footer"></div>
</body>

</html>
