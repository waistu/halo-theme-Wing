<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链丨[[${site.title}]]</title>
    <!-- 主题防闪烁初始化（必须在最前面） -->
    <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
    <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
    <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
    <!-- 主题配色方案 -->
    <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
    <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
    <!-- 主题配置透传给 main.js -->
    <script th:inline="javascript">
      window.__WING_THEME__ = {
        serverMode: /*[[${theme.config.style?.theme_mode ?: 'auto'}]]*/ 'auto',
        lightStart: /*[[${theme.config.style?.auto_theme_time?.light_start ?: '06:00'}]]*/ '06:00',
        darkStart: /*[[${theme.config.style?.auto_theme_time?.dark_start ?: '22:00'}]]*/ '22:00'
      };
    </script>
    <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
    <script th:src="@{/assets/vendor/relativeTime.js}"></script>
    <script th:src="@{/assets/vendor/zh-cn.js}"></script>
    <!-- 打开搜索弹窗 -->
    <script>
        if (window.location.hash === '#open-search') {
            setTimeout(() => {
                if (window.SearchWidget) SearchWidget.open('');
            }, 100);
        }
    </script>
    <!-- Header 滚动隐藏脚本 -->
    <script>
        (function () {
            var header = document.getElementById('header');
            if (!header) return;
            var lastScrollY = 0;
            window.onscroll = function () {
                var currentScrollY = window.scrollY;
                if (currentScrollY > 100) {
                    if (currentScrollY > lastScrollY) {
                        header.classList.add('header-hidden');
                    } else {
                        header.classList.remove('header-hidden');
                    }
                } else {
                    header.classList.remove('header-hidden');
                }
                lastScrollY = currentScrollY;
            };
        })();
    </script>
    <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
    <!-- 插入头部组件 -->
    <div th:replace="includes/components/header :: header"></div>
    <!-- 页面主体容器 -->
    <div class="container"
        th:with="allPosts=${postFinder.listAll()}, stats=${siteStatsFinder.getStats()}, momentsForHeatmap=${momentFinder != null ? momentFinder.list(1, 100) : null}, linkGroups=${linkFinder.groupBy()}">
        <!-- 左侧：窄栏（菜单 + 小组件） -->
        <aside class="sidebar" th:style="${theme.config.layout.sidebar_toggle == 'hide' ? 'display:none' : ''}">
            <!-- nav -->
            <div th:replace="includes/components/nav :: nav"></div>
            <!-- author card -->
            <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${allPosts.size()}, stats=${stats})">
            </div>
        </aside>
        <!-- 右侧：主内容大盒子 -->
        <div class="content">
            <div id="notes" class="notes-layout">
                <main class="notes-core full-width">
                    <div class="page-header">
                        <h1 class="page-title">友链</h1>
                        <p class="page-description">交换友链请联系博主</p>
                    </div>
                    <!-- 友链列表区域 -->
                    <div class="links-list" th:if="${#lists.isEmpty(linkGroups)}">
                        <div class="empty-state">
                            <p>暂无友链</p>
                        </div>
                    </div>
                    <!-- 友链分组列表 -->
                    <th:block th:each="group : ${linkGroups}">
                        <th:block th:with="groupStyle=${group.metadata.annotations['theme-wing/link-group-style']}">
                            <div class="link-group" th:if="${not #lists.isEmpty(group.links)}">
                                <h2 class="link-group-title" th:text="${group.spec.displayName}">分组名称</h2>
                                <div class="link-items">
                                    <a th:each="link : ${group.links}" th:href="${link.spec.url}"
                                        th:title="${link.spec.displayName}" class="link-item"
                                        th:classappend="${groupStyle == 'recommend' ? ' style-recommend' : (groupStyle == 'lost' ? ' style-lost' : '')}"
                                        target="_blank" rel="noopener noreferrer">
                                        <div class="link-logo">
                                            <img th:src="${link.spec.logo}" th:alt="${link.spec.displayName}"
                                                onerror="this.src=@{/assets/images/author-avatar.png}" />
                                        </div>
                                        <div class="link-info">
                                            <h3 class="link-name" th:text="${link.spec.displayName}">网站名称</h3>
                                            <p class="link-desc" th:text="${link.spec.description}">网站描述</p>
                                        </div>
                                    </a>
                                </div>
                            </div>
                        </th:block>

                    </th:block>
                    <!-- 评论区 -->
                    <th:block th:with="allSinglePagesList=${singlePageFinder.list(1, 50)}">
                        <th:block th:each="sp : ${allSinglePagesList.items}" th:if="${sp.spec.template == 'links.html' and sp.spec.allowComment}">
                            <div class="comments-section">
                                <div class="comments-header">
                                    <i class="czs czs-comment-l"></i>
                                    <span class="comments-title">评论</span>
                                </div>
                                <div th:replace="~{includes/comment/comment :: comment}" th:with="singlePage=${sp}"></div>
                            </div>
                        </th:block>
                    </th:block>
                </main>
            </div>
        </div>
    </div>
    <!-- 页脚部分 -->
    <div th:replace="includes/components/footer :: footer"></div>
    <script>
        (function () {
            var path = window.location.pathname;
            var tabs = document.querySelectorAll('.notes-tabbar .tab-item');
            tabs.forEach(function (tab) {
                var link = tab.querySelector('a');
                if (!link) return;
                var href = link.getAttribute('href');
                if (!href) return;

                // 首页
                if (path === '/' || path === '' || path === '/index' || path === '/index.html') {
                    if (href === '/' || href.endsWith('/')) {
                        tab.classList.add('active');
                    }
                }
                // 笔记页面
                else if (path.startsWith('/moments')) {
                    if (href === '/moments') {
                        tab.classList.add('active');
                    }
                }
            });
        })();
    </script>
</body>

</html>
