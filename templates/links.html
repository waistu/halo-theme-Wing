<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友链丨[[${site.title}]]</title>
    <!-- 主题防闪烁初始化（必须在最前面） -->
    <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
    <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
    <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
    <!-- 主题配色方案 -->
    <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
    <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
    <!-- 主题配置透传给 main.js -->
    <script th:inline="javascript">
        window.__WING_THEME__ = {
            serverMode: /*[[${theme.config.style?.theme_mode ?: 'auto'}]]*/ 'auto',
            lightStart: /*[[${theme.config.style?.auto_theme_time?.light_start ?: '06:00'}]]*/ '06:00',
            darkStart: /*[[${theme.config.style?.auto_theme_time?.dark_start ?: '22:00'}]]*/ '22:00'
        };
    </script>
    <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
    <script th:src="@{/assets/vendor/relativeTime.js}"></script>
    <script th:src="@{/assets/vendor/zh-cn.js}"></script>
    <!-- 打开搜索弹窗 -->
    <script>
        if (window.location.hash === '#open-search') {
            setTimeout(() => {
                if (window.SearchWidget) SearchWidget.open('');
            }, 100);
        }
    </script>
    <!-- Header 滚动隐藏脚本 -->
    <script>
        (function () {
            var header = document.getElementById('header');
            if (!header) return;
            var lastScrollY = 0;
            window.onscroll = function () {
                var currentScrollY = window.scrollY;
                if (currentScrollY > 100) {
                    if (currentScrollY > lastScrollY) {
                        header.classList.add('header-hidden');
                    } else {
                        header.classList.remove('header-hidden');
                    }
                } else {
                    header.classList.remove('header-hidden');
                }
                lastScrollY = currentScrollY;
            };
        })();
    </script>
    <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
    <!-- 插入头部组件 -->
    <div th:replace="includes/components/header :: header"></div>
    <!-- 页面主体容器 -->
    <div class="container"
        th:with="allPosts=${postFinder.listAll()}, stats=${siteStatsFinder.getStats()}, momentsForHeatmap=${momentFinder != null ? momentFinder.list(1, 100) : null}, linkGroups=${linkFinder.groupBy()}">
        <!-- 左侧：窄栏（菜单 + 小组件） -->
        <aside class="sidebar" th:style="${theme.config.layout.sidebar_toggle == 'hide' ? 'display:none' : ''}">
            <!-- nav -->
            <div th:replace="includes/components/nav :: nav"></div>
            <!-- author card -->
            <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${allPosts.size()}, stats=${stats})">
            </div>
        </aside>
        <!-- 右侧：主内容大盒子 -->
        <div class="content">
            <div id="notes" class="notes-layout">
                <main class="notes-core full-width">
                    <div class="page-header">
                        <div class="flex items-center justify-between">
                            <h1 class="page-title">友链</h1>
                            <!-- HeroUI 风格按钮：申请友链 -->
                            <th:block th:if="${pluginFinder.available('link-submit')}">
                                <a href="javascript:LinkSubmitWidget.open()" class="link-apply-btn-solid">
                                    <span>申请友链</span>
                                    <i class="czs czs-add"></i>
                                </a>
                            </th:block>
                            <th:block th:unless="${pluginFinder.available('link-submit')}">
                                <a href="mailto:[[${site.owner?.email ?: ''}]]?subject=友链申请"
                                    class="link-apply-btn-solid">
                                    <span>申请友链</span>
                                    <i class="czs czs-add"></i>
                                </a>
                            </th:block>
                        </div>
                        <p class="page-description mt-2">交换友链请联系博主</p>
                    </div>
                    <!-- 友链列表区域 -->
                    <div class="links-list" th:if="${#lists.isEmpty(linkGroups)}">
                        <div class="empty-state">
                            <p>暂无友链</p>
                        </div>
                    </div>
                    <!-- 友链分组列表 -->
                    <th:block th:each="group : ${linkGroups}">
                        <th:block th:with="groupStyle=${group.metadata.annotations['theme-wing/link-group-style']}">
                            <div class="link-group" th:if="${not #lists.isEmpty(group.links)}">
                                <h2 class="link-group-title" th:text="${group.spec.displayName}">分组名称</h2>
                                <div class="link-items">
                                    <a th:each="link : ${group.links}" th:href="${link.spec.url}"
                                        th:title="${link.spec.displayName}" class="link-item"
                                        th:classappend="${groupStyle == 'recommend' ? ' style-recommend' : (groupStyle == 'lost' ? ' style-lost' : '')}"
                                        target="_blank" rel="noopener noreferrer">
                                        <div class="link-logo">
                                            <img th:src="${link.spec.logo}" th:alt="${link.spec.displayName}"
                                                onerror="this.src=@{/assets/images/author-avatar.png}" />
                                        </div>
                                        <div class="link-info">
                                            <h3 class="link-name" th:text="${link.spec.displayName}">网站名称</h3>
                                            <p class="link-desc" th:text="${link.spec.description}">网站描述</p>
                                        </div>
                                    </a>
                                </div>
                            </div>
                        </th:block>

                    </th:block>
                    <!-- 折叠信息区域 -->
                    <th:block th:if="${not #lists.isEmpty(theme.config.links?.link_accordions)}">
                        <div class="link-accordions">
                            <div th:each="item, iterStat : ${theme.config.links.link_accordions}" class="accordion-item"
                                th:class="'accordion-item' + (${item.expanded} ? ' expanded' : '')">
                                <div class="accordion-header" th:data-index="${iterStat.index}">
                                    <div class="accordion-title-wrapper">
                                        <h3 class="accordion-title" th:text="${item.title}">标题</h3>
                                        <p class="accordion-subtitle" th:if="${item.subtitle}"
                                            th:text="${item.subtitle}">副标题</p>
                                    </div>
                                    <div class="accordion-indicator">
                                        <i class="czs czs-angle-down"></i>
                                    </div>
                                </div>
                                <div class="accordion-content">
                                    <div class="accordion-body" th:utext="${item.content}">内容</div>
                                </div>
                            </div>
                        </div>
                    </th:block>
                    <!-- 评论区 -->
                    <div class="comments-section" th:if="${pluginFinder.available('PluginCommentWidget')}">
                        <div class="comments-header" style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <i class="czs czs-comment-l"></i>
                                <span class="comments-title">评论</span>
                            </div>
                            <div style="display: flex; gap: 16px;">
                                <th:block th:if="${theme.config.comment?.comment_provider == 'twikoo' and theme.config.comment?.anonymous_comment == true}">
                                    <a href="javascript:void(0)" id="anonymous-comment-btn" 
                                       th:data-email="${theme.config.comment?.anonymous_config?.anonymous_email}" 
                                       th:data-nickname="${theme.config.comment?.anonymous_config?.anonymous_nickname}">匿名评论</a>
                                </th:block>
                                <th:block th:if="${theme.config.comment?.privacy_policy_url}">
                                    <a th:href="${theme.config.comment.privacy_policy_url}" target="_blank">隐私协议</a>
                                </th:block>
                            </div>
                        </div>
                        <div class="article-comment round" id="comment-wrapper">
                            <div id="comment-plugin-halo-run-Plugin-PluginLinks"></div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <!-- 页脚部分 -->
    <div th:replace="includes/components/footer :: footer"></div>
    <!-- LinkSubmitWidget 插件资源 -->
    <th:block th:if="${pluginFinder.available('link-submit')}">
        <script src="/plugins/link-submit/assets/static/link-submit-widget.iife.js?version=1.0.6" defer></script>
        <link rel="stylesheet" href="/plugins/link-submit/assets/static/var.css?version=1.0.6" />
    </th:block>
    <script>
        (function () {
            var path = window.location.pathname;
            var tabs = document.querySelectorAll('.notes-tabbar .tab-item');
            tabs.forEach(function (tab) {
                var link = tab.querySelector('a');
                if (!link) return;
                var href = link.getAttribute('href');
                if (!href) return;

                // 首页
                if (path === '/' || path === '' || path === '/index' || path === '/index.html') {
                    if (href === '/' || href.endsWith('/')) {
                        tab.classList.add('active');
                    }
                }
                // 笔记页面
                else if (path.startsWith('/moments')) {
                    if (href === '/moments') {
                        tab.classList.add('active');
                    }
                }
            });
        })();
    </script>
    <!-- Markdown 解析器 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <!-- Accordion 折叠组件脚本 -->
    <script>
        (function () {
            // 渲染 Markdown 内容
            var bodies = document.querySelectorAll('.accordion-body');
            bodies.forEach(function (body) {
                var rawContent = body.textContent || body.innerText || '';
                if (rawContent && typeof marked !== 'undefined') {
                    body.innerHTML = marked.parse(rawContent);
                }
            });

            // 折叠交互
            var accordions = document.querySelectorAll('.accordion-item');
            accordions.forEach(function (accordion) {
                var header = accordion.querySelector('.accordion-header');
                if (!header) return;

                header.addEventListener('click', function () {
                    var isExpanded = accordion.classList.contains('expanded');

                    // 切换当前项状态
                    if (isExpanded) {
                        accordion.classList.remove('expanded');
                    } else {
                        accordion.classList.add('expanded');
                    }
                });
            });
        })();
    </script>
    <!-- Link Submit 插件资源加载 -->
    <th:block th:if="${pluginFinder.available('link-submit')}">
        <link rel="stylesheet" th:href="@{/plugins/link-submit/assets/static/var.css}">
        <script th:src="@{/plugins/link-submit/assets/static/link-submit-widget.iife.js}"></script>
    </th:block>
    <!-- 匿名评论功能 -->
    <script th:inline="javascript">
        (function() {
            var anonymousBtn = document.getElementById('anonymous-comment-btn');
            if (!anonymousBtn) return;
            
            var email = anonymousBtn.getAttribute('data-email');
            var nickname = anonymousBtn.getAttribute('data-nickname');
            
            if (!email || !nickname) return;
            
            anonymousBtn.addEventListener('click', function() {
                // 等待评论组件加载完成
                var fillAnonymous = function() {
                    // 查找所有可能的输入框
                    var allInputs = document.querySelectorAll('input[type="text"], input[type="email"], input:not([type])');
                    var emailInput = null;
                    var nickInput = null;
                    
                    allInputs.forEach(function(input) {
                        var placeholder = (input.placeholder || '').toLowerCase();
                        var name = (input.name || '').toLowerCase();
                        
                        // 通过 placeholder 或 name 判断
                        if (!emailInput && (placeholder.includes('邮') || name.includes('mail') || name.includes('email'))) {
                            emailInput = input;
                        }
                        if (!nickInput && (placeholder.includes('昵') || placeholder.includes('名') || placeholder.includes('作者') || name.includes('nick') || name.includes('author') || name.includes('name'))) {
                            nickInput = input;
                        }
                    });
                    
                    if (emailInput) {
                        emailInput.value = email;
                        emailInput.dispatchEvent(new Event('input', { bubbles: true }));
                        emailInput.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                    if (nickInput) {
                        nickInput.value = nickname;
                        nickInput.dispatchEvent(new Event('input', { bubbles: true }));
                        nickInput.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                    
                    // 如果还没找到，短暂重试
                    if ((!emailInput || !nickInput) && window.commentWidget) {
                        setTimeout(fillAnonymous, 500);
                    }
                };
                
                fillAnonymous();
            });
        })();
    </script>
</body>

</html>
