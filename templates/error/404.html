<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面不存在</title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <!-- Header 滚动隐藏脚本 -->
  <script>
    (function () {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      window.onscroll = function () {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
      };
    })();
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
  <div th:replace="includes/components/header :: header"></div>
  <div class="container">
    <aside class="sidebar">
      <div th:replace="includes/components/nav :: nav"></div>
      <div
        th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
      </div>
    </aside>
    <main class="main-content content">
      <div class="page-404">
        <div class="container-404">
          <h1 class="code-404">404</h1>
          <p class="desc-404">抱歉，你访问的页面不存在或已被移除</p>
        </div>
      </div>
    </main>
  </div>
  <div th:replace="includes/components/footer :: footer"></div>
</body>

</html>
