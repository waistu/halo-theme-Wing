<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>笔记丨[[${site.title}]]</title>
  <!-- 防闪烁脚本：在 CSS 加载前应用深色模式 -->
  <script>try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <style>
    /* 防止页面加载时的闪烁 - 使用 CSS 变量 */
    html { background-color: var(--bg-page, #f9fafb); }
    html.dark { background-color: var(--bg-page-dark, #111827); }
    body { background-color: var(--bg-page, #f9fafb); color: var(--text-secondary, #4b5563); }
    html.dark body { background-color: var(--bg-page-dark, #111827); color: var(--text-secondary-dark, #d1d5db); }
  </style>
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
  <!-- 打开搜索弹窗 -->
  <script>
    if (window.location.hash === '#open-search') {
      setTimeout(() => {
        if (window.SearchWidget) SearchWidget.open('');
      }, 100);
    }
  </script>
  <!-- Header 滚动隐藏脚本 -->
  <script>
    (function() {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      window.onscroll = function() {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
      };
    })();
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
  <!-- 插入头部组件 -->
  <div th:replace="includes/components/header :: header"></div>
  <!-- 页面主体容器 -->
  <div class="container"
    th:with="allPosts=${postFinder.listAll()}, stats=${siteStatsFinder.getStats()}, tagParam=${#strings.isEmpty(#strings.toString(param.tag)) ? null : #strings.toString(param.tag)}, moments=${tagParam != null ? momentFinder.list({tagName: tagParam, page: 1, size: 20}) : momentFinder.list(1, 20)}, momentTags=${tags}, momentsForHeatmap=${momentFinder != null ? momentFinder.list(1, 100) : null}, pluginInstalled=${momentFinder != null}, momentsUrl='/moments'">
    <!-- 左侧：窄栏（菜单 + 小组件） -->
    <aside class="sidebar" th:style="${theme.config.basic.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <!-- nav -->
      <div th:replace="includes/components/nav :: nav"></div>
      <!-- author card -->
      <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${allPosts.size()}, stats=${stats})"></div>
    </aside>
    <!-- 右侧：主内容大盒子 -->
    <div class="content">
      <div id="notes" class="notes-layout">
        <main class="notes-core">
          <!-- 插件未安装提示 -->
          <div class="plugin-notice" th:if="${!pluginInstalled}">
            <div class="plugin-notice-icon">📦</div>
            <div class="plugin-notice-content">
              <h3>瞬间插件未安装</h3>
              <p>请安装 <a href="https://www.halo.run/store/apps/app-SnwWD" target="_blank">瞬间插件</a> 来展示您的瞬间内容</p>
            </div>
          </div>
          <!-- 插件已安装时显示内容 -->
          <th:block th:if="${pluginInstalled}">
            <div class="notes-tabbar sticky bg-blur">
              <ul class="tab global-list">
                <li class="tab-item" data-type="all">
                  <a th:href="@{/}">文章</a>
                </li>
                <li class="tab-item" data-type="note">
                  <a th:href="${momentsUrl}">笔记</a>
                </li>
              </ul>
              <!-- 标签筛选提示 -->
              <div class="moment-filter-bar" th:if="${tagParam != null}">
                <span class="moment-filter-tag" th:text="${tagParam}"></span>
                <a class="moment-filter-clear" th:href="${momentsUrl}"></a>
              </div>
            </div>
            <!-- 瞬间列表 -->
            <div class="article-list" id="articleList">
              <th:block th:each="moment : ${moments.items}" th:with="content=${moment.spec.content}">
                <div class="moment-item">
                  <!-- 顶部：时间 -->
                  <div class="moment-header">
                    <span class="moment-time"
                      th:data-date="${moment.spec.releaseTime}">[[${moment.spec.releaseTime}]]</span>
                  </div>
                  <!-- 文字内容 -->
                  <div class="moment-content" th:if="${not #strings.isEmpty(content.html)}" th:utext="${content.html}">
                  </div>
                  <!-- 标签（带 #，可点击筛选） -->
                  <th:block th:if="${not #lists.isEmpty(moment.spec.tags)}">
                    <div class="moment-tags">
                      <th:block th:each="tag : ${moment.spec.tags}">
                        <a class="moment-tag" th:href="${momentsUrl} + '?tag=' + ${tag}" th:text="'#' + ${tag}"></a>
                      </th:block>
                    </div>
                  </th:block>
                  <!-- 媒体内容 -->
                  <th:block th:if="${not #lists.isEmpty(content.medium)}">
                    <div class="moment-media">
                      <!-- 图片 PHOTO -->
                      <div class="moment-photos">
                        <th:block th:each="item : ${content.medium}">
                          <div class="photo-item" th:if="${item.type.name == 'PHOTO'}">
                            <img th:src="${item.url}" alt="瞬间图片" />
                          </div>
                        </th:block>
                      </div>
                      <!-- 视频 VIDEO -->
                      <th:block th:each="item : ${content.medium}">
                        <th:block th:if="${item.type.name == 'VIDEO'}">
                          <div class="moment-video-wrapper" th:data-video-src="${item.url}">
                            <video class="moment-video" th:src="${item.url}" th:data-src="${item.url}" controls
                              onloadedmetadata="handleVideoMetadata(this)"></video>
                            <div class="moment-video-overlay" style="display: none;" onclick="openVideoPopup(this)">
                              <div class="moment-video-play-icon">▶</div>
                            </div>
                            <div class="moment-media-badge">
                              <span class="media-icon">🎬</span>
                              <span class="media-label">视频</span>
                            </div>
                          </div>
                        </th:block>
                      </th:block>
                      <!-- 音频 AUDIO -->
                      <th:block th:each="item : ${content.medium}">
                        <div class="moment-audio-wrapper" th:if="${item.type.name == 'AUDIO'}">
                          <audio th:src="${item.url}" controls></audio>
                          <div class="moment-media-badge">
                            <span class="media-icon">🎵</span>
                            <span class="media-label">音频</span>
                          </div>
                        </div>
                      </th:block>
                      <!-- 文章 POST -->
                      <th:block th:each="item : ${content.medium}">
                        <a class="moment-post-link" th:if="${item.type.name == 'POST'}" th:href="${item.url}"
                          target="_blank">
                          <div class="moment-post-card">
                            <div class="moment-post-cover" th:if="${item.cover}">
                              <img th:src="${item.cover}" alt="封面" />
                            </div>
                            <div class="moment-post-info">
                              <h4 class="moment-post-title" th:text="${item.title}">文章标题</h4>
                              <p class="moment-post-excerpt" th:if="${item.excerpt}" th:text="${item.excerpt}">文章摘要</p>
                              <div class="moment-post-meta">
                                <span class="moment-media-badge">
                                  <span class="media-icon">📄</span>
                                  <span class="media-label">文章</span>
                                </span>
                              </div>
                            </div>
                          </div>
                        </a>
                      </th:block>
                    </div>
                  </th:block>
                  <!-- 底部：互动和来源 -->
                  <div class="moment-footer">
                    <div class="moment-actions">
                      <!-- 点赞 -->
                      <a class="action-item moment-like" href="javascript:;"
                        th:data-moment-name="${moment.metadata.name}">
                        <i class="czs-heart-l"></i>
                        <span class="like-count" th:text="${moment.stats?.upvote ?: 0}">0</span>
                      </a>
                      <!-- 评论 -->
                      <a class="action-item moment-comments-toggle" href="javascript:;"
                        th:data-moment-name="${moment.metadata.name}">
                        <i class="czs-comment-l"></i>
                        <th:block th:if="${moment.stats != null and moment.stats.totalComment > 0}">
                          <span class="comment-count">[[${moment.stats.totalComment}]]</span>
                        </th:block>
                        <th:block th:unless="${moment.stats != null and moment.stats.totalComment > 0}">
                          <span class="comment-count"></span>
                        </th:block>
                      </a>
                    </div>
                    <div class="moment-source">
                      <i class="czs-image"></i>
                      <span>Write from Webpage</span>
                    </div>
                  </div>
                  <!-- Halo 官方评论组件（默认收起） -->
                  <div class="moment-comments-wrapper moment-comments-hidden" th:id="'comments-wrapper-' + ${moment.metadata.name}">
                    <halo:comment group="moment.halo.run" kind="Moment" version="v1alpha1"
                      th:attr="name=${moment.metadata.name}">
                    </halo:comment>
                  </div>
                </div>
              </th:block>
              <!-- 无瞬间时的提示 -->
              <div class="empty-moments" th:if="${#lists.isEmpty(moments.items)}">
                <p>暂无瞬间</p>
              </div>
            </div>
          </th:block>
        </main>
        <aside class="notes-aside"
          th:style="${theme.config.basic.right_sidebar_toggle == 'hide' ? 'display:none' : ''}">
          <div class="heatmap-box">
            <div
              th:replace="includes/widgets/heatmap :: heatmap(momentTags=${momentTags}, momentsForHeatmap=${momentsForHeatmap})">
            </div>
          </div>
        </aside>
      </div>
    </div>
  </div>
  <!-- 页脚部分 -->
  <div th:replace="includes/components/footer :: footer"></div>

  <!-- 图片灯箱 -->
  <div id="imageViewer" class="image-viewer" style="display: none;">
    <div class="viewer-backdrop"></div>
    <div class="viewer-content">
      <img id="viewerImage" src="" alt="查看大图" />
      <button class="viewer-prev" id="viewerPrev" style="display: none;">&#10094;</button>
      <button class="viewer-next" id="viewerNext" style="display: none;">&#10095;</button>
      <button class="viewer-close" id="viewerClose"></button>
      <div class="viewer-counter" id="viewerCounter" style="display: none;"></div>
    </div>
  </div>

  <!-- 视频弹窗 -->
  <div id="videoViewer" class="video-viewer" style="display: none;">
    <div class="video-viewer-backdrop"></div>
    <div class="video-viewer-content">
      <button class="video-viewer-close" id="videoViewerClose">&times;</button>
      <video id="viewerVideo" controls></video>
    </div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;
      var tabs = document.querySelectorAll('.notes-tabbar .tab-item');
      tabs.forEach(function (tab) {
        var link = tab.querySelector('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href) return;

        // 首页
        if (path === '/' || path === '' || path === '/index' || path === '/index.html') {
          if (href === '/' || href.endsWith('/')) {
            tab.classList.add('active');
          }
        }
        // 笔记页面
        else if (path.startsWith('/moments')) {
          if (href === '/moments') {
            tab.classList.add('active');
          }
        }
      });
    })();

    // ==================== 瞬间图片灯箱 ====================
    (function () {
      const viewer = document.getElementById('imageViewer');
      const viewerImage = document.getElementById('viewerImage');
      const viewerPrev = document.getElementById('viewerPrev');
      const viewerNext = document.getElementById('viewerNext');
      const viewerClose = document.getElementById('viewerClose');
      const viewerCounter = document.getElementById('viewerCounter');
      const backdrop = viewer.querySelector('.viewer-backdrop');

      let currentImages = [];
      let currentIndex = 0;

      // 绑定所有瞬间图片点击事件
      document.querySelectorAll('.moment-photos .photo-item img').forEach(function (img) {
        img.style.cursor = 'pointer';
        img.addEventListener('click', function (e) {
          e.preventDefault();
          // 找到该瞬间的所有图片
          const photosContainer = img.closest('.moment-photos');
          const images = Array.from(photosContainer.querySelectorAll('img')).map(function (i) {
            return i.src;
          });
          currentImages = images;
          currentIndex = images.indexOf(img.src);
          openViewer();
        });
      });

      function openViewer() {
        viewer.style.display = 'flex';
        updateImage();
        document.body.style.overflow = 'hidden';
      }

      function closeViewer() {
        viewer.style.display = 'none';
        document.body.style.overflow = '';
      }

      function updateImage() {
        viewerImage.src = currentImages[currentIndex];

        // 显示/隐藏切换按钮
        if (currentImages.length > 1) {
          viewerPrev.style.display = 'block';
          viewerNext.style.display = 'block';
          viewerCounter.style.display = 'block';
          viewerCounter.textContent = (currentIndex + 1) + ' / ' + currentImages.length;
        } else {
          viewerPrev.style.display = 'none';
          viewerNext.style.display = 'none';
          viewerCounter.style.display = 'none';
        }
      }

      function prevImage() {
        currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
        updateImage();
      }

      function nextImage() {
        currentIndex = (currentIndex + 1) % currentImages.length;
        updateImage();
      }

      // 绑定事件
      viewerClose.addEventListener('click', closeViewer);
      backdrop.addEventListener('click', closeViewer);
      viewerPrev.addEventListener('click', function (e) {
        e.stopPropagation();
        prevImage();
      });
      viewerNext.addEventListener('click', function (e) {
        e.stopPropagation();
        nextImage();
      });

      // ESC 关闭
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && viewer.style.display !== 'none') {
          closeViewer();
        }
        if (e.key === 'ArrowLeft' && viewer.style.display !== 'none') {
          prevImage();
        }
        if (e.key === 'ArrowRight' && viewer.style.display !== 'none') {
          nextImage();
        }
      });
    })();

    // ==================== 视频弹窗 ====================
    (function () {
      const videoViewer = document.getElementById('videoViewer');
      const viewerVideo = document.getElementById('viewerVideo');
      const videoViewerClose = document.getElementById('videoViewerClose');
      const videoViewerBackdrop = videoViewer.querySelector('.video-viewer-backdrop');

      // 视频比例检测：竖屏(>1)则弹窗播放
      window.handleVideoMetadata = function (video) {
        const wrapper = video.closest('.moment-video-wrapper');
        if (!wrapper) return;

        // 等待视频元数据加载完成
        if (video.videoWidth && video.videoHeight) {
          const ratio = video.videoWidth / video.videoHeight;
          // 如果宽高比 <= 1 (接近正方形或竖屏)，标记为竖屏
          if (ratio <= 1) {
            wrapper.classList.add('vertical');
          }
        }
      };

      // 备用方案：视频加载完成后也检测一次
      document.querySelectorAll('.moment-video').forEach(function (video) {
        video.addEventListener('loadedmetadata', function () {
          window.handleVideoMetadata(video);
        });
      });

      // 打开视频弹窗
      window.openVideoPopup = function (overlay) {
        const wrapper = overlay.closest('.moment-video-wrapper');
        const videoSrc = wrapper.dataset.videoSrc;
        if (!videoSrc) return;

        viewerVideo.src = videoSrc;
        videoViewer.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        viewerVideo.play();
      };

      // 关闭视频弹窗
      function closeVideoViewer() {
        videoViewer.style.display = 'none';
        viewerVideo.pause();
        viewerVideo.src = '';
        document.body.style.overflow = '';
      }

      videoViewerClose.addEventListener('click', closeVideoViewer);
      videoViewerBackdrop.addEventListener('click', closeVideoViewer);

      // ESC 关闭
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && videoViewer.style.display !== 'none') {
          closeVideoViewer();
        }
      });
    })();

    // ==================== 瞬间点赞功能 ====================
    (function () {
      var LIKED_KEY = 'halo_moment_liked';
      var isRequesting = false; // 页面状态：防止连续点击

      // 获取 localStorage 中已点赞的列表
      function getLikedMoments() {
        try {
          var stored = localStorage.getItem(LIKED_KEY);
          return stored ? JSON.parse(stored) : [];
        } catch (e) {
          return [];
        }
      }

      // 保存已点赞的列表到 localStorage
      function saveLikedMoments(list) {
        try {
          localStorage.setItem(LIKED_KEY, JSON.stringify(list));
        } catch (e) {
          console.error('保存点赞状态失败:', e);
        }
      }

      // 检查是否已点赞
      function isMomentLiked(momentName) {
        return getLikedMoments().indexOf(momentName) !== -1;
      }

      // 页面加载时：初始化已点赞状态
      (function initLikedState() {
        var likedList = getLikedMoments();
        document.querySelectorAll('.moment-like').forEach(function (btn) {
          var momentName = btn.dataset.momentName;
          if (isMomentLiked(momentName)) {
            var iconEl = btn.querySelector('i');
            iconEl.classList.remove('czs-heart-l');
            iconEl.classList.add('czs-heart', 'liked');
          }
        });
      })();

      // 点赞 API - 点赞
      function likeMoment(momentName) {
        return fetch('/apis/api.halo.run/v1alpha1/trackers/upvote', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            group: 'moment.halo.run',
            plural: 'moments',
            name: momentName
          })
        }).then(function (res) {
          if (res.status === 204 || res.status === 200) {
            return res.json().catch(function () { return { upvote: null }; });
          }
          return res.json();
        });
      }

      // 取消点赞 API
      function unlikeMoment(momentName) {
        return fetch('/apis/api.halo.run/v1alpha1/trackers/upvote', {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            group: 'moment.halo.run',
            plural: 'moments',
            name: momentName
          })
        }).then(function (res) {
          if (res.status === 204 || res.status === 200) {
            return res.json().catch(function () { return { upvote: null }; });
          }
          return res.json();
        });
      }

      // 防抖函数
      function debounce(fn, delay) {
        var timer = null;
        return function () {
          var context = this;
          var args = arguments;
          clearTimeout(timer);
          timer = setTimeout(function () {
            fn.apply(context, args);
          }, delay);
        };
      }

      // 绑定点赞按钮点击事件
      document.querySelectorAll('.moment-like').forEach(function (btn) {
        btn.addEventListener('click', debounce(function (e) {
          e.preventDefault();

          // 检查页面状态：防止连续点击
          if (isRequesting) {
            return;
          }

          var momentName = this.dataset.momentName;
          var iconEl = this.querySelector('i');
          var countEl = this.querySelector('.like-count');
          var isLiked = isMomentLiked(momentName); // 使用 localStorage 检查状态
          var currentCount = parseInt(countEl.textContent) || 0;

          // 状态：已点赞 -> 取消点赞，未点赞 -> 点赞
          var promise = isLiked ? unlikeMoment(momentName) : likeMoment(momentName);

          // 设置请求状态
          isRequesting = true;

          promise.then(function (result) {
            // 更新 localStorage
            var likedList = getLikedMoments();
            if (isLiked) {
              // 取消点赞：从列表中移除
              var idx = likedList.indexOf(momentName);
              if (idx !== -1) likedList.splice(idx, 1);
            } else {
              // 点赞成功：添加到列表
              if (likedList.indexOf(momentName) === -1) {
                likedList.push(momentName);
              }
            }
            saveLikedMoments(likedList);

            // 更新 UI
            var newCount = result.upvote || (isLiked ? currentCount - 1 : currentCount + 1);
            countEl.textContent = newCount;

            if (isLiked) {
              // 取消点赞成功
              iconEl.classList.remove('czs-heart', 'liked');
              iconEl.classList.add('czs-heart-l');
            } else {
              // 点赞成功
              iconEl.classList.remove('czs-heart-l');
              iconEl.classList.add('czs-heart', 'liked');
            }
          }).catch(function (err) {
            console.error('操作失败:', err);
          }).finally(function () {
            isRequesting = false; // 重置请求状态
          });
        }, 300));
      });
    })();

    // ==================== 瞬间评论展开/收起（互斥 + 动画） ====================
    (function () {
      var currentOpenWrapper = null;
      var currentOpenBtn = null;
      var hiddenClass = 'moment-comments-hidden';

      document.querySelectorAll('.moment-comments-toggle').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          var momentName = this.dataset.momentName;
          var wrapperEl = document.getElementById('comments-wrapper-' + momentName);
          var iconEl = this.querySelector('i');

          // 如果点击的是已经打开的评论，则收起
          if (currentOpenWrapper === wrapperEl && !wrapperEl.classList.contains(hiddenClass)) {
            wrapperEl.classList.add(hiddenClass);
            iconEl.classList.remove('active');
            currentOpenWrapper = null;
            currentOpenBtn = null;
            return;
          }

          // 如果有其他评论打开，先收起
          if (currentOpenWrapper && currentOpenWrapper !== wrapperEl) {
            currentOpenWrapper.classList.add(hiddenClass);
            if (currentOpenBtn) {
              currentOpenBtn.querySelector('i').classList.remove('active');
            }
          }

          // 展开当前评论
          wrapperEl.classList.remove(hiddenClass);
          iconEl.classList.add('active');
          currentOpenWrapper = wrapperEl;
          currentOpenBtn = this;
        });
      });

      // 点击页面其他位置收起评论
      document.addEventListener('click', function (e) {
        if (currentOpenWrapper && !e.target.closest('.moment-item')) {
          currentOpenWrapper.classList.add(hiddenClass);
          if (currentOpenBtn) {
            currentOpenBtn.querySelector('i').classList.remove('active');
          }
          currentOpenWrapper = null;
          currentOpenBtn = null;
        }
      });
    })();
  </script>
</body>

</html>
