<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${site.title}"></title>
  <link rel="stylesheet" th:href="@{/assets/css/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
  <link rel="stylesheet" th:href="@{/assets/iconfont/caomei/style.css}">
  <script th:src="@{/assets/js/dayjs.min.js}"></script>
  <script th:src="@{/assets/js/relativeTime.js}"></script>
  <script th:src="@{/assets/js/zh-cn.js}"></script>
  <!-- 打开搜索弹窗 -->
  <script>
    if (window.location.hash === '#open-search') {
      setTimeout(() => {
        if (window.SearchWidget) SearchWidget.open('');
      }, 100);
    }
  </script>
  <script th:src="@{/assets/js/main.js}"></script>
</head>

<body>
  <!-- 插入头部组件 -->
  <div th:replace="includes/header :: header"></div>
  <!-- 页面主体容器 -->
  <div class="container" th:with="allPosts=${postFinder.listAll()}, stats=${siteStatsFinder.getStats()}, moments=${momentFinder.list(1, 20)}">
    <!-- 左侧：窄栏（菜单 + 小组件） -->
    <aside class="sidebar" th:style="${theme.config.basic.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <!-- nav -->
      <div th:replace="includes/nav :: nav"></div>
      <!-- author card -->
      <div th:replace="includes/authorCard :: authorCard(postCount=${allPosts.size()}, stats=${stats})"></div>
    </aside>
    <!-- 右侧：主内容大盒子 -->
    <div class="content">
      <div id="notes" class="notes-layout">
        <main class="notes-core">
          <div class="notes-tabbar sticky bg-blur">
            <ul class="tab global-list">
              <li class="tab-item" data-type="all">
                <a th:href="@{/}">全部</a>
              </li>
              <li class="tab-item" data-type="note">
                <a th:href="@{/moments}">笔记</a>
              </li>
              <li class="tab-item" data-type="post">
                <a th:href="@{/article}">文章</a>
              </li>
            </ul>
          </div>
          <!-- 瞬间列表 -->
          <div class="article-list" id="articleList">
            <th:block th:each="moment : ${moments.items}" th:with="content=${moment.spec.content}">
              <div class="moment-item">
                <!-- 顶部：时间 -->
                <div class="moment-header">
                  <span class="moment-time" th:data-date="${moment.spec.releaseTime}">[[${moment.spec.releaseTime}]]</span>
                  <th:block th:if="${moment.stats != null}">
                    <span class="moment-likes" th:if="${moment.stats.upvote > 0}"> ♥ [[${moment.stats.upvote}]]</span>
                    <span class="moment-comments" th:if="${moment.stats.totalComment > 0}"> 💬 [[${moment.stats.totalComment}]]</span>
                  </th:block>
                </div>
                <!-- 文字内容 -->
                <div class="moment-content" th:if="${not #strings.isEmpty(content.html)}" th:utext="${content.html}"></div>
                <!-- 媒体内容 -->
                <th:block th:if="${not #lists.isEmpty(content.medium)}">
                  <div class="moment-media">
                    <!-- 九宫格图片 -->
                    <div class="moment-photos">
                      <th:block th:each="item : ${content.medium}">
                        <div class="photo-item" th:if="${item.type.name == 'PHOTO'}">
                          <img th:src="${item.url}" alt="瞬间图片" />
                        </div>
                      </th:block>
                    </div>
                    <!-- 视频 -->
                    <th:block th:each="item : ${content.medium}">
                      <video th:if="${item.type.name == 'VIDEO'}" th:src="${item.url}" controls></video>
                      <audio th:if="${item.type.name == 'AUDIO'}" th:src="${item.url}" controls></audio>
                    </th:block>
                  </div>
                </th:block>
              </div>
            </th:block>
            <!-- 无瞬间时的提示 -->
            <div class="empty-moments" th:if="${#lists.isEmpty(moments.items)}">
              <p>暂无瞬间</p>
            </div>
          </div>
        </main>
        <aside class="notes-aside"
          th:style="${theme.config.basic.right_sidebar_toggle == 'hide' ? 'display:none' : ''}">
          <div class="heatmap-box">
            <div th:replace="includes/heatmap :: heatmap"></div>
          </div>
        </aside>
      </div>
    </div>
  </div>
  <!-- 页脚部分 -->
  <div th:replace="includes/footer :: footer"></div>

  <!-- 图片灯箱 -->
  <div id="imageViewer" class="image-viewer" style="display: none;">
    <div class="viewer-backdrop"></div>
    <div class="viewer-content">
      <img id="viewerImage" src="" alt="查看大图" />
      <button class="viewer-prev" id="viewerPrev" style="display: none;">&#10094;</button>
      <button class="viewer-next" id="viewerNext" style="display: none;">&#10095;</button>
      <button class="viewer-close" id="viewerClose">&times;</button>
      <div class="viewer-counter" id="viewerCounter" style="display: none;"></div>
    </div>
  </div>

  <script>
    (function () {
      var path = window.location.pathname;
      var tabs = document.querySelectorAll('.notes-tabbar .tab-item');
      tabs.forEach(function (tab) {
        var link = tab.querySelector('a');
        if (!link) return;
        var href = link.getAttribute('href');
        if (!href) return;

        // 首页
        if (path === '/' || path === '' || path === '/index' || path === '/index.html') {
          if (href === '/' || href.endsWith('/')) {
            tab.classList.add('active');
          }
        }
        // 笔记页面
        else if (path.startsWith('/moments')) {
          if (href === '/moments') {
            tab.classList.add('active');
          }
        }
        // 文章页面
        else if (path.startsWith('/article')) {
          if (href === '/article') {
            tab.classList.add('active');
          }
        }
      });
    })();

    // ==================== 瞬间图片灯箱 ====================
    (function() {
      const viewer = document.getElementById('imageViewer');
      const viewerImage = document.getElementById('viewerImage');
      const viewerPrev = document.getElementById('viewerPrev');
      const viewerNext = document.getElementById('viewerNext');
      const viewerClose = document.getElementById('viewerClose');
      const viewerCounter = document.getElementById('viewerCounter');
      const backdrop = viewer.querySelector('.viewer-backdrop');

      let currentImages = [];
      let currentIndex = 0;

      // 绑定所有瞬间图片点击事件
      document.querySelectorAll('.moment-photos .photo-item img').forEach(function(img) {
        img.style.cursor = 'pointer';
        img.addEventListener('click', function(e) {
          e.preventDefault();
          // 找到该瞬间的所有图片
          const photosContainer = img.closest('.moment-photos');
          const images = Array.from(photosContainer.querySelectorAll('img')).map(function(i) {
            return i.src;
          });
          currentImages = images;
          currentIndex = images.indexOf(img.src);
          openViewer();
        });
      });

      function openViewer() {
        viewer.style.display = 'flex';
        updateImage();
        document.body.style.overflow = 'hidden';
      }

      function closeViewer() {
        viewer.style.display = 'none';
        document.body.style.overflow = '';
      }

      function updateImage() {
        viewerImage.src = currentImages[currentIndex];

        // 显示/隐藏切换按钮
        if (currentImages.length > 1) {
          viewerPrev.style.display = 'block';
          viewerNext.style.display = 'block';
          viewerCounter.style.display = 'block';
          viewerCounter.textContent = (currentIndex + 1) + ' / ' + currentImages.length;
        } else {
          viewerPrev.style.display = 'none';
          viewerNext.style.display = 'none';
          viewerCounter.style.display = 'none';
        }
      }

      function prevImage() {
        currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
        updateImage();
      }

      function nextImage() {
        currentIndex = (currentIndex + 1) % currentImages.length;
        updateImage();
      }

      // 绑定事件
      viewerClose.addEventListener('click', closeViewer);
      backdrop.addEventListener('click', closeViewer);
      viewerPrev.addEventListener('click', function(e) {
        e.stopPropagation();
        prevImage();
      });
      viewerNext.addEventListener('click', function(e) {
        e.stopPropagation();
        nextImage();
      });

      // ESC 关闭
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && viewer.style.display !== 'none') {
          closeViewer();
        }
        if (e.key === 'ArrowLeft' && viewer.style.display !== 'none') {
          prevImage();
        }
        if (e.key === 'ArrowRight' && viewer.style.display !== 'none') {
          nextImage();
        }
      });
    })();
  </script>
</body>

</html>
