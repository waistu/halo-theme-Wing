<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[[${singlePage.spec.title}]]丨[[${site.title}]]</title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- Meteor 流星背景 CSS -->
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
  <!-- 主题配置透传给 main.js -->
  <script th:inline="javascript">
    window.__WING_THEME__ = {
      serverMode: /*[[${theme.config.style?.theme_mode ?: 'auto'}]]*/ 'auto',
      lightStart: /*[[${theme.config.style?.auto_theme_time?.light_start ?: '06:00'}]]*/ '06:00',
      darkStart: /*[[${theme.config.style?.auto_theme_time?.dark_start ?: '22:00'}]]*/ '22:00'
    };
  </script>
</head>

<body>
  <!-- 头部 -->
  <div th:replace="includes/components/header :: header"></div>

  <!-- 主体：侧边栏 + 内容区 -->
  <div class="container">
    <aside class="sidebar" th:with="stats=${siteStatsFinder.getStats()}">
      <div th:replace="includes/components/nav :: nav"></div>
      <div
        th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
      </div>
    </aside>

    <!-- 右侧：主内容大盒子 -->
    <div class="content">
      <article class="age-article">
        <!-- 封面图 -->
        <th:block
          th:with="hideCover=${#annotations.get(singlePage, 'hideCover')}, hasCover=${not #strings.isEmpty(singlePage.spec.cover)}">
          <th:block th:if="${hideCover != 'true'}">
            <div th:if="${hasCover}" class="page-cover">
              <img th:src="${singlePage.spec.cover}" alt=""
                onerror="this.parentElement.className='page-cover-empty'; this.parentElement.innerHTML='<i class=\'czs-cup-l\'></i>'">
            </div>
            <div th:unless="${hasCover}" class="page-cover-empty">
              <i class="czs-cup-l"></i>
            </div>
          </th:block>
        </th:block>

        <!-- 页面头部信息 -->
        <th:block
          th:with="hideTitle=${#annotations.get(singlePage, 'hideTitle')}, hideMeta=${#annotations.get(singlePage, 'hideMeta')}">
          <header class="page-header" th:unless="${hideTitle == 'true'}">
            <h1 class="entry-title" th:text="${singlePage.spec.title}"></h1>

            <!-- 元信息：作者、发布时间、统计 -->
            <div class="page-meta" th:unless="${hideMeta == 'true'}">
              <span class="meta-item author" th:if="${singlePage.owner}">
                <img th:src="${singlePage.owner.avatar}" alt="" class="avatar">
                <span th:text="${singlePage.owner.displayName}"></span>
              </span>
              <span class="meta-item date">
                <i class="czs-calendar"></i>
                <span th:text="${#dates.format(singlePage.spec.publishTime, 'yyyy-MM-dd')}"></span>
              </span>
              <span class="meta-item visits">
                <i class="czs-eye"></i>
                <span th:text="${singlePage.stats.visit}"></span>
              </span>
              <th:block th:if="${singlePage.spec.allowComment}">
                <span class="meta-item comments">
                  <i class="czs-comment"></i>
                  <span th:text="${singlePage.status.commentsCount}"></span>
                </span>
              </th:block>
            </div>
          </header>
        </th:block>

        <!-- 页面内容 -->
        <div class="page-content" th:utext="${singlePage.content.content}"></div>
        <!-- 评论区（使用片段整合标题栏和评论组件） -->
        <div th:replace="~{includes/comment/comment :: commentSection(target=${singlePage})}"></div>
      </article>
    </div>
  </div>

  <!-- 页脚 -->
  <div th:replace="includes/components/footer :: footer"></div>
  <!-- Header 滚动隐藏脚本 -->
  <script>
    (function () {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      window.onscroll = function () {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
      };
    })();
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
  <!-- 匿名评论功能 -->
  <script th:inline="javascript">
    (function() {
      var anonymousBtns = document.querySelectorAll('.anonymous-comment-btn');
      if (!anonymousBtns.length) return;
      
      anonymousBtns.forEach(function(btn) {
        var email = btn.getAttribute('data-email');
        var nickname = btn.getAttribute('data-nickname');
        
        if (!email || !nickname) return;
        
        btn.addEventListener('click', function() {
          var fillAnonymous = function() {
            // 查找所有可能的输入框
            var allInputs = document.querySelectorAll('input[type="text"], input[type="email"], input:not([type])');
            var emailInput = null;
            var nickInput = null;
            
            allInputs.forEach(function(input) {
              var placeholder = (input.placeholder || '').toLowerCase();
              var name = (input.name || '').toLowerCase();
              var id = (input.id || '').toLowerCase();
              
              // 通过 placeholder 或 name 判断
              if (!emailInput && (placeholder.includes('邮') || name.includes('mail') || name.includes('email'))) {
                emailInput = input;
              }
              if (!nickInput && (placeholder.includes('昵') || placeholder.includes('名') || placeholder.includes('作者') || name.includes('nick') || name.includes('author') || name.includes('name'))) {
                nickInput = input;
              }
            });
            
            if (emailInput) {
              emailInput.value = email;
              emailInput.dispatchEvent(new Event('input', { bubbles: true }));
              emailInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            if (nickInput) {
              nickInput.value = nickname;
              nickInput.dispatchEvent(new Event('input', { bubbles: true }));
              nickInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            
            if ((!emailInput || !nickInput)) {
              setTimeout(fillAnonymous, 500);
            }
          };
          
          fillAnonymous();
        });
      });
    })();
  </script>
  <!-- Meteor 流星背景 JS -->
</body>

</html>
