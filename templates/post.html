<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${post.spec.title} + ' - ' + ${site.title}"></title>
  <!-- 防闪烁脚本：在 CSS 加载前应用深色模式 -->
  <script>try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')}catch(e){}</script>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <style>
    /* 防止页面加载时的闪烁 - 使用 CSS 变量 */
    html { background-color: var(--bg-page, #f9fafb); }
    html.dark { background-color: var(--bg-page-dark, #111827); }
    body { background-color: var(--bg-page, #f9fafb); color: var(--text-secondary, #4b5563); }
    html.dark body { background-color: var(--bg-page-dark, #111827); color: var(--text-secondary-dark, #d1d5db); }
  </style>

  <!-- Prism.js 代码高亮 - Okaidia 主题 -->
  <link rel="stylesheet" th:href="@{/assets/vendor/prism-okaidia.min.css}" />
  <!-- 代码高亮核心 -->
  <script th:src="@{/assets/vendor/prism.min.js}"></script>
  <!-- 语言支持（按依赖顺序） -->
  <script th:src="@{/assets/vendor/prism-components/prism-markup.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-css.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-clike.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-javascript.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-typescript.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-java.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-python.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-bash.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-json.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-sql.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-yaml.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-markdown.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-go.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-rust.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-c.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-cpp.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-csharp.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-ruby.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-swift.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-kotlin.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-docker.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-nginx.min.js}"></script>
  <!-- 行号插件 -->
  <script th:src="@{/assets/vendor/prism-line-numbers.min.js}"></script>
  <link rel="stylesheet" th:href="@{/assets/vendor/prism-line-numbers.css}" />
  <!-- 公共 vendor JS -->
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
</head>

<body>
  <div th:replace="~{includes/components/header :: header}"></div>

  <div class="container">
    <aside class="sidebar">
      <!-- 侧边栏切换组件 -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="toc" title="文章目录">
          <i class="czs-read-l"></i>
        </button>
        <button class="sidebar-tab" data-tab="nav" title="返回导航">
          <i class="czs-choose-list-l"></i>
        </button>
      </div>

      <!-- 目录视图 -->
      <div class="sidebar-content active " id="sidebar-toc">
        <div id="tocWidget" style="display: none;">
          <div id="toc" class="toc-list"></div>
        </div>
        <div class="toc-empty text-gray-500 dark:text-gray-400" id="tocEmpty" style="display: none;">暂无目录</div>
      </div>

      <!-- 导航视图 -->
      <div class="sidebar-content" id="sidebar-nav" th:with="stats=${siteStatsFinder.getStats()}">
        <div class="widget-box" th:replace="~{includes/components/nav :: nav}"></div>
        <div
          th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
        </div>
      </div>

    </aside>

    <div class="content">
      <div
        th:replace="~{includes/components/articleList :: articleContent(content = ${post.content.content}, post = ${post})}">
      </div>

      <!-- 评论区 -->
      <div th:replace="~{includes/comment/comment :: comment}"></div>
    </div>
  </div>
  <div th:replace="~{includes/components/footer :: footer}"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Prism.js 代码高亮
      if (window.Prism) {
        Prism.highlightAll();
      }

      // 侧边栏切换功能
      initSidebarTabs();

      // 生成文章目录
      generateTOC();

      // 点赞功能
      initLikeButton();
    });

    // 点赞功能
    function initLikeButton() {
      var likeBtn = document.getElementById('post-like-btn');
      var likeCount = document.getElementById('post-like-count');
      if (!likeBtn || !likeCount) return;

      likeBtn.addEventListener('click', function () {
        var postName = /*[[${post.metadata.name}]]*/ '';
        var currentCount = parseInt(likeCount.textContent) || 0;

        fetch('/api/content/posts/' + postName + '/upvote', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        })
          .then(function (response) {
            if (response.ok) {
              likeCount.textContent = currentCount + 1;
              likeBtn.classList.add('liked');
            } else if (response.status === 401) {
              alert('请先登录后再点赞');
            }
          });
      });
    }

    // 侧边栏切换
    function initSidebarTabs() {
      const tabs = document.querySelectorAll('.sidebar-tab');
      const tocContent = document.getElementById('sidebar-toc');
      const navContent = document.getElementById('sidebar-nav');

      if (tabs.length === 0 || !tocContent || !navContent) return;

      // 初始状态
      tocContent.classList.add('active');
      navContent.classList.remove('active');

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function (e) {
          e.preventDefault();
          const target = this.getAttribute('data-tab');

          // 移除所有 tab 的 active
          tabs.forEach(function (t) { t.classList.remove('active'); });
          // 给当前点击的 tab 添加 active
          this.classList.add('active');

          // 切换内容区域
          if (target === 'toc') {
            tocContent.classList.add('active');
            navContent.classList.remove('active');
          } else if (target === 'nav') {
            tocContent.classList.remove('active');
            navContent.classList.add('active');
          }
        });
      });
    }

    // 延迟生成目录，确保内容已加载
    function generateTOC() {
      function tryGenerateTOC() {
        const content = document.querySelector('.post-content');
        const tocWidget = document.getElementById('tocWidget');
        const tocEmpty = document.getElementById('tocEmpty');
        const toc = document.getElementById('toc');

        if (!content) {
          setTimeout(tryGenerateTOC, 500);
          return;
        }

        if (!tocWidget || !toc) return;

        const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');

        if (headings.length === 0) {
          tocWidget.style.display = 'none';
          tocEmpty.style.display = 'block';
          tocEmpty.textContent = '文章暂无标题';
          return;
        }

        tocWidget.style.display = 'block';
        tocEmpty.style.display = 'none';

        let html = '<ul class="toc-nav">';
        let index = 0;

        headings.forEach(function (heading) {
          const tagName = heading.tagName.toLowerCase();
          const level = parseInt(tagName.replace('h', ''));
          const id = 'heading-' + index;
          heading.id = id;

          const indent = (level - 1) * 12;
          html += '<li style="padding-left:' + indent + 'px"><a href="#' + id + '" class="toc-link" data-target="' + id + '">' + heading.textContent + '</a></li>';
          index++;
        });

        html += '</ul>';
        toc.innerHTML = html;

        // 点击平滑滚动
        toc.querySelectorAll('.toc-link').forEach(function (link) {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const target = document.getElementById(targetId);
            if (target) {
              const headerHeight = 80;
              const top = target.getBoundingClientRect().top + window.pageYOffset - headerHeight;
              window.scrollTo({ top: top, behavior: 'smooth' });
            }
          });
        });

        // 滚动高亮
        window.addEventListener('scroll', function () {
          const scrollY = window.pageYOffset;
          let current = null;

          headings.forEach(function (heading) {
            if (heading.offsetTop - 100 <= scrollY) {
              current = heading.id;
            }
          });

          toc.querySelectorAll('.toc-link').forEach(function (link) {
            link.classList.remove('active');
            if (link.getAttribute('data-target') === current) {
              link.classList.add('active');
            }
          });
        });
      }

      setTimeout(tryGenerateTOC, 100);
    }

  </script>
  <!-- Header 滚动隐藏脚本 -->
  <script>
    (function () {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      window.onscroll = function () {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
      };
    })();
  </script>
  <!-- 主脚本 -->
  <script th:src="@{/assets/dist/js/main.js}"></script>
</body>

</html>
