<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${post.spec.title} + ' - ' + ${site.title}"></title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  
  <!-- 主题配置透传给 main.js -->
  <script th:inline="javascript">
    window.__WING_THEME__ = {
      serverMode: /*[[${theme.config.style?.theme_mode ?: 'auto'}]]*/ 'auto',
      lightStart: /*[[${theme.config.style?.auto_theme_time?.light_start ?: '06:00'}]]*/ '06:00',
      darkStart: /*[[${theme.config.style?.auto_theme_time?.dark_start ?: '22:00'}]]*/ '22:00'
    };
  </script>

  <!-- 公共 vendor JS -->
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
</head>

<body>
  <div th:replace="~{includes/components/header :: header}"></div>

  <div class="container">
    <aside class="sidebar" th:style="${theme.config.layout.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <!-- 侧边栏切换组件 -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="toc" title="文章目录">
          <i class="czs-read-l"></i>
        </button>
        <button class="sidebar-tab" data-tab="nav" title="返回导航">
          <i class="czs-choose-list-l"></i>
        </button>
      </div>

      <!-- 目录视图 -->
      <div class="sidebar-content active " id="sidebar-toc">
        <div id="tocWidget" style="display: none;">
          <div id="toc" class="toc-list"></div>
        </div>
        <div class="toc-empty text-gray-500 dark:text-gray-400" id="tocEmpty" style="display: none;">暂无目录</div>
      </div>

      <!-- 导航视图 -->
      <div class="sidebar-content" id="sidebar-nav" th:with="stats=${siteStatsFinder.getStats()}">
        <div class="widget-box" th:replace="~{includes/components/nav :: nav}"></div>
        <div
          th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
        </div>
      </div>

    </aside>

    <div class="content">
      <div
        th:replace="~{includes/components/articleList :: articleContent(content = ${post.content.content}, post = ${post})}">
      </div>

      <!-- 评论区（使用片段整合标题栏和评论组件） -->
      <div th:replace="~{includes/comment/comment :: commentSection(target=${post})}"></div>
    </div>
  </div>
  <div th:replace="~{includes/components/footer :: footer}"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 侧边栏切换功能
      initSidebarTabs();

      // 生成文章目录
      generateTOC();

      // 点赞功能
      initLikeButton();
    });

    // 点赞功能
    function initLikeButton() {
      var likeBtn = document.getElementById('post-like-btn');
      var likeCount = document.getElementById('post-like-count');
      if (!likeBtn || !likeCount) return;

      likeBtn.addEventListener('click', function () {
        var postName = /*[[${post.metadata.name}]]*/ '';
        var currentCount = parseInt(likeCount.textContent) || 0;

        fetch('/api/content/posts/' + postName + '/upvote', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        })
          .then(function (response) {
            if (response.ok) {
              likeCount.textContent = currentCount + 1;
              likeBtn.classList.add('liked');
            } else if (response.status === 401) {
              alert('请先登录后再点赞');
            }
          });
      });
    }

    // 侧边栏切换
    function initSidebarTabs() {
      const tabs = document.querySelectorAll('.sidebar-tab');
      const tocContent = document.getElementById('sidebar-toc');
      const navContent = document.getElementById('sidebar-nav');

      if (tabs.length === 0 || !tocContent || !navContent) return;

      // 初始状态
      tocContent.classList.add('active');
      navContent.classList.remove('active');

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function (e) {
          e.preventDefault();
          const target = this.getAttribute('data-tab');

          // 移除所有 tab 的 active
          tabs.forEach(function (t) { t.classList.remove('active'); });
          // 给当前点击的 tab 添加 active
          this.classList.add('active');

          // 切换内容区域
          if (target === 'toc') {
            tocContent.classList.add('active');
            navContent.classList.remove('active');
          } else if (target === 'nav') {
            tocContent.classList.remove('active');
            navContent.classList.add('active');
          }
        });
      });
    }

    // 延迟生成目录，确保内容已加载
    function generateTOC() {
      function tryGenerateTOC() {
        const content = document.querySelector('.post-content');
        const tocWidget = document.getElementById('tocWidget');
        const tocEmpty = document.getElementById('tocEmpty');
        const toc = document.getElementById('toc');

        if (!content) {
          setTimeout(tryGenerateTOC, 500);
          return;
        }

        if (!tocWidget || !toc) return;

        const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');

        if (headings.length === 0) {
          tocWidget.style.display = 'none';
          tocEmpty.style.display = 'block';
          tocEmpty.textContent = '文章暂无标题';
          return;
        }

        tocWidget.style.display = 'block';
        tocEmpty.style.display = 'none';

        let html = '<ul class="toc-nav">';
        let index = 0;

        headings.forEach(function (heading) {
          const tagName = heading.tagName.toLowerCase();
          const level = parseInt(tagName.replace('h', ''));
          const id = 'heading-' + index;
          heading.id = id;

          const indent = (level - 1) * 12;
          html += '<li style="padding-left:' + indent + 'px"><a href="#' + id + '" class="toc-link" data-target="' + id + '">' + heading.textContent + '</a></li>';
          index++;
        });

        html += '</ul>';
        toc.innerHTML = html;

        // 点击平滑滚动
        toc.querySelectorAll('.toc-link').forEach(function (link) {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const target = document.getElementById(targetId);
            if (target) {
              const headerHeight = 80;
              const top = target.getBoundingClientRect().top + window.pageYOffset - headerHeight;
              window.scrollTo({ top: top, behavior: 'smooth' });
            }
          });
        });

        // 滚动高亮
        window.addEventListener('scroll', function () {
          const scrollY = window.pageYOffset;
          let current = null;

          headings.forEach(function (heading) {
            if (heading.offsetTop - 100 <= scrollY) {
              current = heading.id;
            }
          });

          toc.querySelectorAll('.toc-link').forEach(function (link) {
            link.classList.remove('active');
            if (link.getAttribute('data-target') === current) {
              link.classList.add('active');
            }
          });
        });
      }

      setTimeout(tryGenerateTOC, 100);
    }

  </script>
  <!-- 主脚本 -->
  <script th:src="@{/assets/dist/js/main.js}"></script>
  <!-- markdown-it 库（保留供备用） -->
  <script th:src="@{/assets/vendor/markdown-it.min.js}"></script>
  <!-- 匿名评论功能 -->
  <script th:inline="javascript">
    (function() {
      var anonymousBtns = document.querySelectorAll('.anonymous-comment-btn');
      if (!anonymousBtns.length) return;
      
      anonymousBtns.forEach(function(btn) {
        var email = btn.getAttribute('data-email');
        var nickname = btn.getAttribute('data-nickname');
        
        if (!email || !nickname) return;
        
        btn.addEventListener('click', function() {
          var fillAnonymous = function() {
            // 查找所有可能的输入框
            var allInputs = document.querySelectorAll('input[type="text"], input[type="email"], input:not([type])');
            var emailInput = null;
            var nickInput = null;
            
            allInputs.forEach(function(input) {
              var placeholder = (input.placeholder || '').toLowerCase();
              var name = (input.name || '').toLowerCase();
              var id = (input.id || '').toLowerCase();
              var parent = input.closest('form') || input.parentElement;
              var parentForm = parent ? parent.querySelector('button[type="submit"], input[type="submit"]') : null;
              
              // 通过 placeholder 或 name 判断
              if (!emailInput && (placeholder.includes('邮') || name.includes('mail') || name.includes('email'))) {
                emailInput = input;
              }
              if (!nickInput && (placeholder.includes('昵') || placeholder.includes('名') || placeholder.includes('作者') || name.includes('nick') || name.includes('author') || name.includes('name'))) {
                nickInput = input;
              }
            });
            
            if (emailInput) {
              emailInput.value = email;
              emailInput.dispatchEvent(new Event('input', { bubbles: true }));
              emailInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            if (nickInput) {
              nickInput.value = nickname;
              nickInput.dispatchEvent(new Event('input', { bubbles: true }));
              nickInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            
            if ((!emailInput || !nickInput)) {
              setTimeout(fillAnonymous, 500);
            }
          };
          
          fillAnonymous();
        });
      });
    })();
  </script>
  <!-- Meteor 流星背景 JS -->
</body>

</html>
