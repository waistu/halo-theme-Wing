<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300">
  <div th:replace="~{includes/components/header :: header}"></div>

  <div class="container">
    <aside class="sidebar">
      <!-- ن¾§è¾¹و ڈهˆ‡وچ¢ç»„ن»¶ -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="toc" title="و–‡ç« ç›®ه½•">
          <i class="czs-read-l"></i>
        </button>
        <button class="sidebar-tab" data-tab="nav" title="è؟”ه›‍ه¯¼èˆھ">
          <i class="czs-choose-list-l"></i>
        </button>
      </div>

      <!-- ç›®ه½•è§†ه›¾ -->
      <div class="sidebar-content active bg-white dark:bg-gray-800" id="sidebar-toc">
        <div id="tocWidget" style="display: none;">
          <div id="toc" class="toc-list"></div>
        </div>
        <div class="toc-empty text-gray-500 dark:text-gray-400" id="tocEmpty" style="display: none;">وڑ‚و— ç›®ه½•</div>
      </div>

      <!-- ه¯¼èˆھè§†ه›¾ -->
      <div class="sidebar-content bg-white dark:bg-gray-800" id="sidebar-nav" th:with="stats=${siteStatsFinder.getStats()}">
        <div class="widget-box" th:replace="~{includes/components/nav :: nav}"></div>
        <div
          th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
        </div>
      </div>

    </aside>

    <div class="content">
      <div
        th:replace="~{includes/components/articleList :: articleContent(content = ${post.content.content}, post = ${post})}">
      </div>

      <!-- è¯„è®؛هŒ؛ -->
      <div th:replace="~{includes/comment/comment :: comment}"></div>
    </div>
  </div>
  <div th:replace="~{includes/components/footer :: footer}"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Prism.js ن»£ç پé«کن؛®
      if (window.Prism) {
        Prism.highlightAll();
      }

      // ن¾§è¾¹و ڈهˆ‡وچ¢هٹںèƒ½
      initSidebarTabs();

      // ç”ںوˆگو–‡ç« ç›®ه½•
      generateTOC();

      // ç‚¹èµ‍هٹںèƒ½
      initLikeButton();
    });

    // ç‚¹èµ‍هٹںèƒ½
    function initLikeButton() {
      var likeBtn = document.getElementById('post-like-btn');
      var likeCount = document.getElementById('post-like-count');
      if (!likeBtn || !likeCount) return;

      likeBtn.addEventListener('click', function () {
        var postName = /*[[${post.metadata.name}]]*/ '';
        var currentCount = parseInt(likeCount.textContent) || 0;

        fetch('/api/content/posts/' + postName + '/upvote', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        })
          .then(function (response) {
            if (response.ok) {
              likeCount.textContent = currentCount + 1;
              likeBtn.classList.add('liked');
            } else if (response.status === 401) {
              alert('è¯·ه…ˆç™»ه½•هگژه†چç‚¹èµ‍');
            }
          });
      });
    }

    // ن¾§è¾¹و ڈهˆ‡وچ¢
    function initSidebarTabs() {
      const tabs = document.querySelectorAll('.sidebar-tab');
      const tocContent = document.getElementById('sidebar-toc');
      const navContent = document.getElementById('sidebar-nav');

      if (tabs.length === 0 || !tocContent || !navContent) return;

      // هˆ‌ه§‹çٹ¶و€پ
      tocContent.classList.add('active');
      navContent.classList.remove('active');

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function (e) {
          e.preventDefault();
          const target = this.getAttribute('data-tab');

          // ç§»é™¤و‰€وœ‰ tab çڑ„ active
          tabs.forEach(function (t) { t.classList.remove('active'); });
          // ç»™ه½“ه‰چç‚¹ه‡»çڑ„ tab و·»هٹ  active
          this.classList.add('active');

          // هˆ‡وچ¢ه†…ه®¹هŒ؛هںں
          if (target === 'toc') {
            tocContent.classList.add('active');
            navContent.classList.remove('active');
          } else if (target === 'nav') {
            tocContent.classList.remove('active');
            navContent.classList.add('active');
          }
        });
      });
    }

    // ه»¶è؟ںç”ںوˆگç›®ه½•ï¼Œç،®ن؟‌ه†…ه®¹ه·²هٹ è½½
    function generateTOC() {
      function tryGenerateTOC() {
        const content = document.querySelector('.post-content');
        const tocWidget = document.getElementById('tocWidget');
        const tocEmpty = document.getElementById('tocEmpty');
        const toc = document.getElementById('toc');

        if (!content) {
          setTimeout(tryGenerateTOC, 500);
          return;
        }

        if (!tocWidget || !toc) return;

        const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');

        if (headings.length === 0) {
          tocWidget.style.display = 'none';
          tocEmpty.style.display = 'block';
          tocEmpty.textContent = 'و–‡ç« وڑ‚و— و ‡é¢ک';
          return;
        }

        tocWidget.style.display = 'block';
        tocEmpty.style.display = 'none';

        let html = '<ul class="toc-nav">';
        let index = 0;

        headings.forEach(function (heading) {
          const tagName = heading.tagName.toLowerCase();
          const level = parseInt(tagName.replace('h', ''));
          const id = 'heading-' + index;
          heading.id = id;

          const indent = (level - 1) * 12;
          html += '<li style="padding-left:' + indent + 'px"><a href="#' + id + '" class="toc-link" data-target="' + id + '">' + heading.textContent + '</a></li>';
          index++;
        });

        html += '</ul>';
        toc.innerHTML = html;

        // ç‚¹ه‡»ه¹³و»‘و»ڑهٹ¨
        toc.querySelectorAll('.toc-link').forEach(function (link) {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const target = document.getElementById(targetId);
            if (target) {
              const headerHeight = 80;
              const top = target.getBoundingClientRect().top + window.pageYOffset - headerHeight;
              window.scrollTo({ top: top, behavior: 'smooth' });
            }
          });
        });

        // و»ڑهٹ¨é«کن؛®
        window.addEventListener('scroll', function () {
          const scrollY = window.pageYOffset;
          let current = null;

          headings.forEach(function (heading) {
            if (heading.offsetTop - 100 <= scrollY) {
              current = heading.id;
            }
          });

          toc.querySelectorAll('.toc-link').forEach(function (link) {
            link.classList.remove('active');
            if (link.getAttribute('data-target') === current) {
              link.classList.add('active');
            }
          });
        });
      }

      setTimeout(tryGenerateTOC, 100);
    }

  </script>
  <!-- Header و»ڑهٹ¨éڑگè—ڈè„ڑوœ¬ -->
  <script>
    (function () {
      var header = document.getElementById('header');
      if (!header) return;
      var lastScrollY = 0;
      window.onscroll = function () {
        var currentScrollY = window.scrollY;
        if (currentScrollY > 100) {
          if (currentScrollY > lastScrollY) {
            header.classList.add('header-hidden');
          } else {
            header.classList.remove('header-hidden');
          }
        } else {
          header.classList.remove('header-hidden');
        }
        lastScrollY = currentScrollY;
      };
    })();
  </script>
  <!-- ن¸»è„ڑوœ¬ -->
  <script th:src="@{/assets/dist/js/main.js}"></script>
