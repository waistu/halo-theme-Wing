<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${post.spec.title} + ' - ' + ${site.title}"></title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  
  <!-- 主题配置透传给 main.js -->
  <script th:inline="javascript">
    window.__WING_THEME__ = {
      serverMode: /*[[${theme.config.style?.theme_mode ?: 'auto'}]]*/ 'auto',
      lightStart: /*[[${theme.config.style?.auto_theme_time?.light_start ?: '06:00'}]]*/ '06:00',
      darkStart: /*[[${theme.config.style?.auto_theme_time?.dark_start ?: '22:00'}]]*/ '22:00'
    };
  </script>

  <!-- Prism.js 代码高亮主题 - 由主题设置控制 -->
  <link th:if="${theme.config.style?.code_highlight_theme == 'dracula'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-dracula.min.css}" />
  <link th:if="${theme.config.style?.code_highlight_theme == 'dark'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-dark.min.css}" />
  <link th:if="${theme.config.style?.code_highlight_theme == 'tomorrow'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-tomorrow.min.css}" />
  <link th:if="${theme.config.style?.code_highlight_theme == 'twilight'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-twilight.min.css}" />
  <link th:if="${theme.config.style?.code_highlight_theme == 'coy'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-coy.min.css}" />
  <link th:if="${theme.config.style?.code_highlight_theme == 'funky'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-funky.min.css}" />
  <link th:if="${theme.config.style?.code_highlight_theme == 'solarizedlight'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-solarizedlight.min.css}" />
  <!-- 默认主题：Okaidia -->
  <link th:unless="${theme.config.style?.code_highlight_theme}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-okaidia.min.css}" />
  <link th:if="${theme.config.style?.code_highlight_theme == 'okaidia'}" rel="stylesheet"
    th:href="@{/assets/vendor/prism-okaidia.min.css}" />
  <!-- 代码块背景色 CSS 变量（用于包装器和遮罩） -->
  <style th:inline="text">
    :root {
      --prism-bg: [[${theme.config.style?.code_highlight_theme=='dracula' ? '#282a36' : theme.config.style?.code_highlight_theme=='dark' ? '#4c3f33' : theme.config.style?.code_highlight_theme=='tomorrow' ? '#2d2d2d' : theme.config.style?.code_highlight_theme=='twilight' ? '#141414' : theme.config.style?.code_highlight_theme=='coy' ? '#fdfdfd' : theme.config.style?.code_highlight_theme=='funky' ? '#000' : theme.config.style?.code_highlight_theme=='solarizedlight' ? '#fdf6e3' : '#272822'}]];
      --prism-is-light: [[${theme.config.style?.code_highlight_theme=='coy' || theme.config.style?.code_highlight_theme=='solarizedlight' ? '1' : '0'}]];
    }
  </style>
  <!-- 代码高亮核心 -->
  <script th:src="@{/assets/vendor/prism.min.js}"></script>
  <!-- 语言支持（按依赖顺序） -->
  <script th:src="@{/assets/vendor/prism-components/prism-markup.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-css.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-clike.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-javascript.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-typescript.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-java.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-python.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-bash.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-json.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-sql.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-yaml.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-markdown.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-go.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-rust.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-c.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-cpp.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-csharp.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-ruby.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-swift.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-kotlin.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-docker.min.js}"></script>
  <script th:src="@{/assets/vendor/prism-components/prism-nginx.min.js}"></script>
  <!-- 行号插件 -->
  <script th:src="@{/assets/vendor/prism-line-numbers.min.js}"></script>
  <link rel="stylesheet" th:href="@{/assets/vendor/prism-line-numbers.css}" />
  <!-- 高亮行插件 -->
  <script th:src="@{/assets/vendor/prism-line-highlight.min.js}"></script>
  <link rel="stylesheet" th:href="@{/assets/vendor/prism-line-highlight.css}" />
  <!-- 复制按钮插件 -->
  <script th:src="@{/assets/vendor/prism-copy-to-clipboard.min.js}"></script>
  <!-- 高亮关键词插件 -->
  <script th:src="@{/assets/vendor/prism-highlight-keywords.min.js}"></script>
  <!-- Data URI 高亮插件 -->
  <script th:src="@{/assets/vendor/prism-data-uri-highlight.min.js}"></script>
  <!-- Prism 自定义配置（必须在插件之后） -->
  <script th:inline="javascript">
    // 语言别名映射（自动识别）
    Prism.plugins.autoloader = null;
    (function () {
      // 常见语言别名 → 实际已加载的语言
      var aliases = {
        'js': 'javascript', 'jsx': 'javascript',
        'ts': 'typescript', 'tsx': 'typescript',
        'py': 'python', 'rb': 'ruby',
        'sh': 'bash', 'shell': 'bash', 'zsh': 'bash',
        'yml': 'yaml', 'md': 'markdown',
        'dockerfile': 'docker', 'nginxconf': 'nginx',
        'c#': 'csharp', 'cs': 'csharp',
        'kts': 'kotlin',
        'objc': 'c', 'obj-c': 'c',
        'html': 'markup', 'xml': 'markup', 'svg': 'markup',
        'plain': 'none', 'text': 'none', 'plaintext': 'none'
      };
      // 拦截 highlightElement，自动修正语言 class
      var origHighlight = Prism.highlightElement;
      Prism.highlightElement = function (element) {
        if (!element) return;
        var classes = element.className.split(/\s+/);
        var changed = false;
        classes = classes.map(function (cls) {
          var match = cls.match(/^language-(.+)$/);
          if (match) {
            var lang = match[1].toLowerCase();
            if (aliases[lang]) {
              changed = true;
              return 'language-' + aliases[lang];
            }
          }
          return cls;
        });
        if (changed) {
          element.className = classes.join(' ');
        }
        origHighlight.call(this, element);
      };
    })();
  </script>
  <!-- 公共 vendor JS -->
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
</head>

<body>
  <div th:replace="~{includes/components/header :: header}"></div>

  <div class="container">
    <aside class="sidebar" th:style="${theme.config.layout.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <!-- 侧边栏切换组件 -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" data-tab="toc" title="文章目录">
          <i class="czs-read-l"></i>
        </button>
        <button class="sidebar-tab" data-tab="nav" title="返回导航">
          <i class="czs-choose-list-l"></i>
        </button>
      </div>

      <!-- 目录视图 -->
      <div class="sidebar-content active " id="sidebar-toc">
        <div id="tocWidget" style="display: none;">
          <div id="toc" class="toc-list"></div>
        </div>
        <div class="toc-empty text-gray-500 dark:text-gray-400" id="tocEmpty" style="display: none;">暂无目录</div>
      </div>

      <!-- 导航视图 -->
      <div class="sidebar-content" id="sidebar-nav" th:with="stats=${siteStatsFinder.getStats()}">
        <div class="widget-box" th:replace="~{includes/components/nav :: nav}"></div>
        <div
          th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
        </div>
      </div>

    </aside>

    <div class="content">
      <div
        th:replace="~{includes/components/articleList :: articleContent(content = ${post.content.content}, post = ${post})}">
      </div>

      <!-- 评论区（使用片段整合标题栏和评论组件） -->
      <div th:replace="~{includes/comment/comment :: commentSection(target=${post})}"></div>
    </div>
  </div>
  <div th:replace="~{includes/components/footer :: footer}"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Prism.js 代码块增强
      if (window.Prism) {
        // 给代码块添加包装器和语言标签
        document.querySelectorAll('pre[class*="language-"], pre[class*="line-numbers"]').forEach(function (pre) {
          if (pre.parentElement.classList.contains('code-block-wrapper')) return;

          // 提取语言名称
          var langClass = pre.className.match(/language-(\w+)/);
          var langName = langClass ? langClass[1] : '';

          // 语言显示名映射
          var langLabels = {
            'markup': 'HTML', 'html': 'HTML', 'xml': 'XML', 'svg': 'SVG',
            'css': 'CSS', 'javascript': 'JavaScript', 'js': 'JS',
            'typescript': 'TypeScript', 'ts': 'TS',
            'java': 'Java', 'python': 'Python', 'py': 'Python',
            'bash': 'Bash', 'shell': 'Shell', 'c': 'C', 'cpp': 'C++',
            'csharp': 'C#', 'cs': 'C#', 'go': 'Go', 'rust': 'Rust',
            'ruby': 'Ruby', 'swift': 'Swift', 'kotlin': 'Kotlin',
            'json': 'JSON', 'yaml': 'YAML', 'yml': 'YAML',
            'sql': 'SQL', 'docker': 'Docker', 'nginx': 'Nginx',
            'markdown': 'Markdown', 'md': 'Markdown', 'none': 'Text'
          };
          var displayLang = langLabels[langName] || langName.toUpperCase() || 'Text';

          // 如果没有行号 class，自动添加
          if (!pre.classList.contains('line-numbers')) {
            pre.classList.add('line-numbers');
          }

          // 创建包装器
          var wrapper = document.createElement('div');
          wrapper.className = 'code-block-wrapper';

          // 创建头部栏（语言标签 + 换行开关 + 收起按钮 + 复制按钮）
          var header = document.createElement('div');
          header.className = 'code-block-header';

          // 左侧：语言标签
          var langLabel = document.createElement('span');
          langLabel.className = 'code-block-lang';
          langLabel.textContent = displayLang;
          header.appendChild(langLabel);

          // 右侧按钮组容器
          var btnGroup = document.createElement('div');
          btnGroup.className = 'code-block-btn-group';

          // 换行开关按钮（默认关闭）
          var wrapBtn = document.createElement('button');
          wrapBtn.className = 'code-block-wrap';
          wrapBtn.setAttribute('data-wrap', 'off');
          wrapBtn.textContent = '换行:关';
          wrapBtn.title = '切换自动换行';
          // 初始状态：关闭换行
          pre.style.whiteSpace = 'pre';
          pre.style.wordWrap = 'normal';
          pre.style.wordBreak = 'normal';
          var codeEl = pre.querySelector('code');
          if (codeEl) {
            codeEl.style.whiteSpace = 'pre';
            codeEl.style.wordWrap = 'normal';
          }
          wrapBtn.addEventListener('click', function () {
            var isWrapOn = wrapBtn.getAttribute('data-wrap') === 'on';
            var code = pre.querySelector('code');
            if (isWrapOn) {
              // 关闭换行
              pre.style.whiteSpace = 'pre';
              pre.style.wordWrap = 'normal';
              pre.style.wordBreak = 'normal';
              if (code) {
                code.style.whiteSpace = 'pre';
                code.style.wordWrap = 'normal';
              }
              wrapBtn.setAttribute('data-wrap', 'off');
              wrapBtn.textContent = '换行:关';
            } else {
              // 开启换行
              pre.style.whiteSpace = 'pre-wrap';
              pre.style.wordWrap = 'break-word';
              pre.style.wordBreak = 'break-all';
              if (code) {
                code.style.whiteSpace = 'pre-wrap';
                code.style.wordWrap = 'break-word';
              }
              wrapBtn.setAttribute('data-wrap', 'on');
              wrapBtn.textContent = '换行:开';
            }
          });
          btnGroup.appendChild(wrapBtn);

          // 收起按钮（默认隐藏，展开后显示）
          var collapseBtn = document.createElement('button');
          collapseBtn.className = 'code-block-collapse';
          collapseBtn.textContent = '收起';
          collapseBtn.style.display = 'none';
          collapseBtn.addEventListener('click', function () {
            wrapper.classList.remove('code-expanded');
            wrapper.classList.add('code-collapsed');
            collapseBtn.style.display = 'none';
            // 同步底部展开按钮文字
            var footerToggle = wrapper.querySelector('.code-block-toggle');
            if (footerToggle) footerToggle.textContent = '展开代码';
            // 滚动到代码块顶部
            wrapper.scrollIntoView({ behavior: 'smooth', block: 'center' });
          });
          btnGroup.appendChild(collapseBtn);

          // 复制按钮
          var copyBtn = document.createElement('button');
          copyBtn.className = 'code-block-copy';
          copyBtn.setAttribute('data-copy-state', 'copy');
          copyBtn.textContent = '复制';
          copyBtn.addEventListener('click', function () {
            var code = pre.querySelector('code');
            if (!code) return;
            var text = code.textContent;
            if (navigator.clipboard) {
              navigator.clipboard.writeText(text).then(function () {
                copyBtn.textContent = '已复制!';
                copyBtn.setAttribute('data-copy-state', 'copied');
                setTimeout(function () {
                  copyBtn.textContent = '复制';
                  copyBtn.setAttribute('data-copy-state', 'copy');
                }, 2000);
              });
            }
          });
          btnGroup.appendChild(copyBtn);

          header.appendChild(btnGroup);

          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(header);
          wrapper.appendChild(pre);
        });

        // 代码折叠：高度 > 200px 时自动折叠
        document.querySelectorAll('.code-block-wrapper').forEach(function (wrapper) {
          var pre = wrapper.querySelector('pre');
          if (!pre || pre.scrollHeight <= 200) return;

          // 标记为折叠状态
          wrapper.classList.add('code-collapsed');

          // 创建底部栏（遮罩 + 按钮）
          var footer = document.createElement('div');
          footer.className = 'code-block-footer';

          var toggleBtn = document.createElement('button');
          toggleBtn.className = 'code-block-toggle';
          toggleBtn.textContent = '展开代码';

          toggleBtn.addEventListener('click', function () {
            var collapseBtn = wrapper.querySelector('.code-block-collapse');
            if (wrapper.classList.contains('code-collapsed')) {
              wrapper.classList.remove('code-collapsed');
              wrapper.classList.add('code-expanded');
              toggleBtn.textContent = '收起代码';
              if (collapseBtn) collapseBtn.style.display = 'inline-block';
            } else {
              wrapper.classList.remove('code-expanded');
              wrapper.classList.add('code-collapsed');
              toggleBtn.textContent = '展开代码';
              if (collapseBtn) collapseBtn.style.display = 'none';
            }
          });

          footer.appendChild(toggleBtn);
          wrapper.appendChild(footer);
        });

        // 执行高亮
        Prism.highlightAll();

        // 禁用 copy-to-clipboard 插件的默认按钮（我们用了自定义按钮）
        if (Prism.plugins.copyToClipboard) {
          Prism.plugins.copyToClipboard.register = function () { };
        }
      }

      // 侧边栏切换功能
      initSidebarTabs();

      // 生成文章目录
      generateTOC();

      // 点赞功能
      initLikeButton();
    });

    // 点赞功能
    function initLikeButton() {
      var likeBtn = document.getElementById('post-like-btn');
      var likeCount = document.getElementById('post-like-count');
      if (!likeBtn || !likeCount) return;

      likeBtn.addEventListener('click', function () {
        var postName = /*[[${post.metadata.name}]]*/ '';
        var currentCount = parseInt(likeCount.textContent) || 0;

        fetch('/api/content/posts/' + postName + '/upvote', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          }
        })
          .then(function (response) {
            if (response.ok) {
              likeCount.textContent = currentCount + 1;
              likeBtn.classList.add('liked');
            } else if (response.status === 401) {
              alert('请先登录后再点赞');
            }
          });
      });
    }

    // 侧边栏切换
    function initSidebarTabs() {
      const tabs = document.querySelectorAll('.sidebar-tab');
      const tocContent = document.getElementById('sidebar-toc');
      const navContent = document.getElementById('sidebar-nav');

      if (tabs.length === 0 || !tocContent || !navContent) return;

      // 初始状态
      tocContent.classList.add('active');
      navContent.classList.remove('active');

      tabs.forEach(function (tab) {
        tab.addEventListener('click', function (e) {
          e.preventDefault();
          const target = this.getAttribute('data-tab');

          // 移除所有 tab 的 active
          tabs.forEach(function (t) { t.classList.remove('active'); });
          // 给当前点击的 tab 添加 active
          this.classList.add('active');

          // 切换内容区域
          if (target === 'toc') {
            tocContent.classList.add('active');
            navContent.classList.remove('active');
          } else if (target === 'nav') {
            tocContent.classList.remove('active');
            navContent.classList.add('active');
          }
        });
      });
    }

    // 延迟生成目录，确保内容已加载
    function generateTOC() {
      function tryGenerateTOC() {
        const content = document.querySelector('.post-content');
        const tocWidget = document.getElementById('tocWidget');
        const tocEmpty = document.getElementById('tocEmpty');
        const toc = document.getElementById('toc');

        if (!content) {
          setTimeout(tryGenerateTOC, 500);
          return;
        }

        if (!tocWidget || !toc) return;

        const headings = content.querySelectorAll('h1, h2, h3, h4, h5, h6');

        if (headings.length === 0) {
          tocWidget.style.display = 'none';
          tocEmpty.style.display = 'block';
          tocEmpty.textContent = '文章暂无标题';
          return;
        }

        tocWidget.style.display = 'block';
        tocEmpty.style.display = 'none';

        let html = '<ul class="toc-nav">';
        let index = 0;

        headings.forEach(function (heading) {
          const tagName = heading.tagName.toLowerCase();
          const level = parseInt(tagName.replace('h', ''));
          const id = 'heading-' + index;
          heading.id = id;

          const indent = (level - 1) * 12;
          html += '<li style="padding-left:' + indent + 'px"><a href="#' + id + '" class="toc-link" data-target="' + id + '">' + heading.textContent + '</a></li>';
          index++;
        });

        html += '</ul>';
        toc.innerHTML = html;

        // 点击平滑滚动
        toc.querySelectorAll('.toc-link').forEach(function (link) {
          link.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const target = document.getElementById(targetId);
            if (target) {
              const headerHeight = 80;
              const top = target.getBoundingClientRect().top + window.pageYOffset - headerHeight;
              window.scrollTo({ top: top, behavior: 'smooth' });
            }
          });
        });

        // 滚动高亮
        window.addEventListener('scroll', function () {
          const scrollY = window.pageYOffset;
          let current = null;

          headings.forEach(function (heading) {
            if (heading.offsetTop - 100 <= scrollY) {
              current = heading.id;
            }
          });

          toc.querySelectorAll('.toc-link').forEach(function (link) {
            link.classList.remove('active');
            if (link.getAttribute('data-target') === current) {
              link.classList.add('active');
            }
          });
        });
      }

      setTimeout(tryGenerateTOC, 100);
    }

  </script>
  <!-- 主脚本 -->
  <script th:src="@{/assets/dist/js/main.js}"></script>
  <!-- 匿名评论功能 -->
  <script th:inline="javascript">
    (function() {
      var anonymousBtns = document.querySelectorAll('.anonymous-comment-btn');
      if (!anonymousBtns.length) return;
      
      anonymousBtns.forEach(function(btn) {
        var email = btn.getAttribute('data-email');
        var nickname = btn.getAttribute('data-nickname');
        
        if (!email || !nickname) return;
        
        btn.addEventListener('click', function() {
          var fillAnonymous = function() {
            // 查找所有可能的输入框
            var allInputs = document.querySelectorAll('input[type="text"], input[type="email"], input:not([type])');
            var emailInput = null;
            var nickInput = null;
            
            allInputs.forEach(function(input) {
              var placeholder = (input.placeholder || '').toLowerCase();
              var name = (input.name || '').toLowerCase();
              var id = (input.id || '').toLowerCase();
              var parent = input.closest('form') || input.parentElement;
              var parentForm = parent ? parent.querySelector('button[type="submit"], input[type="submit"]') : null;
              
              // 通过 placeholder 或 name 判断
              if (!emailInput && (placeholder.includes('邮') || name.includes('mail') || name.includes('email'))) {
                emailInput = input;
              }
              if (!nickInput && (placeholder.includes('昵') || placeholder.includes('名') || placeholder.includes('作者') || name.includes('nick') || name.includes('author') || name.includes('name'))) {
                nickInput = input;
              }
            });
            
            if (emailInput) {
              emailInput.value = email;
              emailInput.dispatchEvent(new Event('input', { bubbles: true }));
              emailInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            if (nickInput) {
              nickInput.value = nickname;
              nickInput.dispatchEvent(new Event('input', { bubbles: true }));
              nickInput.dispatchEvent(new Event('change', { bubbles: true }));
            }
            
            if ((!emailInput || !nickInput)) {
              setTimeout(fillAnonymous, 500);
            }
          };
          
          fillAnonymous();
        });
      });
    })();
  </script>
  <!-- Meteor 流星背景 JS -->
</body>
