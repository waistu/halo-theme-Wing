<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签丨[[${site.title}]]</title>
  <!-- 主题防闪烁初始化（必须在最前面） -->
  <th:block th:replace="~{includes/head/theme-init :: theme-init}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/vendor/normalize.css}" />
  <link rel="stylesheet" th:href="@{/assets/dist/css/main.css}" />
  <!-- 主题配色方案 -->
  <th:block th:replace="~{includes/color-scheme :: color-scheme}"></th:block>
  <link rel="stylesheet" th:href="@{/assets/fonts/caomei/style.css}">
  <script th:src="@{/assets/vendor/dayjs.min.js}"></script>
  <script th:src="@{/assets/vendor/relativeTime.js}"></script>
  <script th:src="@{/assets/vendor/zh-cn.js}"></script>
  <script>
    if (window.location.hash === '#open-search') {
      setTimeout(() => {
        if (window.SearchWidget) SearchWidget.open('');
      }, 100);
    }
  </script>
  <!-- Header 滚动隐藏脚本 -->
  <script>
  </script>
  <script th:src="@{/assets/dist/js/main.js}"></script>
</head>

<body>
  <!-- 头部 -->
  <div th:replace="includes/components/header :: header"></div>

  <!-- 主体：侧边栏 + 内容区 -->
  <div class="container">
    <aside class="sidebar" th:with="stats=${siteStatsFinder.getStats()}" th:style="${theme.config.layout.sidebar_toggle == 'hide' ? 'display:none' : ''}">
      <div th:replace="includes/components/nav :: nav"></div>
      <div th:replace="includes/widgets/authorCard :: authorCard(postCount=${postFinder.listAll().size()}, stats=${stats})">
      </div>
    </aside>

    <!-- 右侧：主内容大盒子 -->
    <div class="content">
      <div class="tags-wrapper">
        <!-- 页面标题 -->
        <div class="page-header">
          <h1 class="tags-title">标签</h1>
        </div>

        <!-- 标签列表 -->
        <th:block th:with="tags = ${tagFinder.listAll()}">
          <div class="tags-page" th:unless="${#lists.isEmpty(tags)}">
            <div class="tags-cloud">
              <a th:each="tag : ${tags}" th:href="${tag.status.permalink}" class="tag-block">
                <span class="tag-icon">#</span>
                <span class="tag-name" th:text="${tag.spec.displayName}"></span>
                <span class="tag-count" th:text="${tag.postCount}"></span>
              </a>
            </div>
          </div>
          <div class="tags-empty" th:if="${#lists.isEmpty(tags)}">暂无标签</div>
        </th:block>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <div th:replace="includes/components/footer :: footer"></div>
</body>

</html>
