name: Release Theme

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build theme
        run: npm run build

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Extract release notes
        id: release_notes
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, ver)) found=1
              next
            }
            found { print }
          ' RELEASE_NOTES.md > /tmp/release_notes.md
          
          # 如果提取为空，写兜底内容
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Theme Wing v$VERSION" > /tmp/release_notes.md
          fi
          
          cat /tmp/release_notes.md

      - name: Package theme
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          mkdir -p dist/pkg
          
          # 复制必要文件到临时目录
          cp -r templates dist/pkg/
          cp settings.yaml dist/pkg/
          cp theme.yaml dist/pkg/
          cp annotation-settings.yaml dist/pkg/ 2>/dev/null || true
          
          # 更新 theme.yaml 版本号
          sed -i "s/version: \".*\"/version: \"$VERSION\"/" dist/pkg/theme.yaml
          
          # 创建 zip（直接将内容打入根，不套子目录）
          cd dist/pkg
          zip -r ../theme-wing-$VERSION.zip .
          
          echo "Package created: dist/theme-wing-$VERSION.zip"
          ls -la ../theme-wing-$VERSION.zip

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body_path: /tmp/release_notes.md
          files: dist/theme-wing-${{ steps.get_version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theme-wing-${{ steps.get_version.outputs.version }}
          path: dist/theme-wing-${{ steps.get_version.outputs.version }}.zip

  # 发布到 Halo 应用市场
  appstore-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: theme-wing-${{ needs.build-and-release.outputs.version }}
          path: dist

      - name: Release to Halo App Store
        uses: halo-sigs/app-store-release-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          app-id: app-rumygxyf
          halo-backend-baseurl: https://www.halo.run
          release-id: ${{ needs.build-and-release.outputs.release_id }}
          assets-dir: dist
          halo-pat: ${{ secrets.HALO_PAT }}
